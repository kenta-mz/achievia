// ============================================================
function dividerRow(div) {
  return `
    <div class="divider-row" data-id="${div.id}"
      draggable="true"
      ondragstart="handleDragStart(event,'${div.id}')"
      ondragend="handleDragEnd(event)"
      ondragover="handleDragOver(event)"
      ondrop="handleDropOnTask(event,'${div.id}','${div.scheduledDate || ''}')">
      <span class="drag-handle">⋮⋮</span>
      <div class="divider-line"></div>
      <button class="divider-delete" onclick="deleteDivider('${div.id}');event.stopPropagation()" title="削除">×</button>
    </div>`;
}
function gapZone(afterId, dateStr) {
  return `<div class="task-gap"><button class="gap-insert-btn" onclick="addDivider('${afterId}','${dateStr}');event.stopPropagation()" title="区切り線を挿入">+</button></div>`;
}
function renderItems(items, d, dateStr) {
  if (!items.length) return '';
  return items.map((item, i) =>
    (item.type === 'divider' ? dividerRow(item) : taskRow(item, d)) +
    (i < items.length - 1 ? gapZone(item.id, dateStr) : '')
  ).join('');
}
function addDivider(afterId, dateStr) {
  const d = D();
  const date = dateStr || null;
  const inSection = d.tasks.filter(x => (x.scheduledDate || null) === date).sort((a,b) => a.order - b.order);
  const afterIdx = inSection.findIndex(x => x.id === afterId);
  if (afterIdx === -1) return;
  const newDiv = { id: genId(), type: 'divider', scheduledDate: date, order: 0, createdAt: new Date().toISOString() };
  inSection.splice(afterIdx + 1, 0, newDiv);
  inSection.forEach((x, i) => { x.order = i; });
  d.tasks.push(newDiv);
  commit();
}
function deleteDivider(id) {
  const d = D();
  const i = d.tasks.findIndex(x => x.id === id);
  if (i !== -1) { d.tasks.splice(i, 1); commit(); }
}

// ============================================================
// RENDER — TASK LIST
// ============================================================
function _offsetDate(days) {
  const d2 = new Date();
  d2.setDate(d2.getDate() + days);
  return `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}`;
}

function _renderDateSection(date, tasks, d, isPast) {
  const t   = todayStr();
  const col = collapsedSections[date];
  const isToday = date === t;
  const label = isToday
    ? `今日のタスク ${dateLabel(date).replace('今日 ', '')}`
    : `${dateLabel(date)}${isPast ? ' <span style="color:var(--gray-400);font-weight:400">（過去）</span>' : ''}`;
  const hdrStyle = 'date-section-header';
  const textStyle = isToday ? 'font-size:13px' : '';
  return `
    <div class="date-section" data-section-date="${date}">
      <div class="${hdrStyle}" onclick="toggleSec('${date}')"
        ondragover="handleDragOver(event)" ondrop="handleDropOnSection(event,'${date}')">
        <span class="section-toggle ${col?'closed':''}">▼</span>
        <span ${textStyle ? `style="${textStyle}"` : ''}>${label}</span>
        <span class="section-rule"></span>
        <span style="color:var(--gray-400);font-weight:400;font-size:12px">${tasks.filter(x=>x.type!=='divider').length}件</span>
      </div>
      ${col ? '' : `<div ondragover="handleDragOver(event)" ondrop="handleDropOnSection(event,'${date}')">${renderItems(tasks, d, date)}</div>`}
    </div>`;
}

function _expandFutureLabel(cur) {
  if (cur < 7)  return { label: `さらに1週間後までを表示`, next: 7 };
  const nextWeeks = Math.floor((cur + 7) / 7);
  return { label: `さらに1週間分を表示（${nextWeeks}週間後まで）`, next: cur + 7 };
}

function _expandPastLabel(cur) {
  if (cur < 7)  return { label: `さらに1週間前までを表示`, next: 7 };
  const nextWeeks = Math.floor((cur + 7) / 7);
  return { label: `さらに1週間分を表示（${nextWeeks}週間前まで）`, next: cur + 7 };
}

function expandFutureWindow(n) {
  _futureWindow = n;
  if (recurringWindow < n + 3) { recurringWindow = n + 3; refreshRecurringInstances(); }
  renderTaskList();
}

function expandPastWindow(n) { _pastWindow = n; renderTaskList(); }

function togglePastSection()   { _pastShown   = !_pastShown;   renderTaskList(); }
function toggleFutureSection() { _futureShown = !_futureShown; renderTaskList(); }

function resetTaskWindows() { _futureWindow = 3; _futureShown = true; _pastShown = false; _pastWindow = 3; renderTaskList(); }

function renderTaskList() {
  const el = document.getElementById('task-list'); if (!el) return;
  const d = D();
  if (viewMode === 'timeline') { el.innerHTML = renderTimeline(d); attachTimelineDragListeners(); return; }

  const t = todayStr();
  const byDate = {};
  d.tasks.forEach(task => {
    if (!task.scheduledDate) return;
    // 複数日タスク：estimatedHoursByDate の各日にスロットとして配置（重複日付は最初の1件のみ）
    const ebd = task.estimatedHoursByDate;
    if (Array.isArray(ebd) && ebd.length >= 2 && task.type !== 'divider' && task.status !== 'completed') {
      ebd.forEach((entry, idx) => {
        const slot = Object.assign({}, task, { _slotIdx: idx, _slotTotal: ebd.length, _slotHours: entry.hours, _slotDate: entry.date, order: entry.order ?? task.order });
        (byDate[entry.date] = byDate[entry.date] || []).push(slot);
      });
      return;
    }
    (byDate[task.scheduledDate] = byDate[task.scheduledDate] || []).push(task);
  });

  let html = '';

  // ── 過去セクション ────────────────────────────────────────
  const allPastDates = Object.keys(byDate).filter(d => d < t).sort((a,b) => a > b ? -1 : 1); // 新しい順
  const totalPastCount = allPastDates.reduce((s, d) => s + (byDate[d]||[]).filter(x=>x.type!=='divider').length, 0);

  html += `
    <div class="past-section">
      <div class="past-section-header" onclick="togglePastSection()">
        <span class="section-toggle ${_pastShown?'':'closed'}">▼</span>
        <span style="font-size:13px;font-weight:600;color:var(--gray-500)">過去のタスク</span>
      </div>`;

  if (_pastShown) {
    const pastCutoff  = _offsetDate(-_pastWindow);
    const hiddenOlder = allPastDates.some(d => d < pastCutoff);
    // 「さらに古い日を表示」ボタン（上部）
    if (hiddenOlder) {
      const { label, next } = _expandPastLabel(_pastWindow);
      html += `<div style="padding:4px 12px 2px"><button class="recurring-more-btn" onclick="expandPastWindow(${next})">▲ ${label}</button></div>`;
    }
    // ウィンドウ内の全日付を古い順に表示（タスク0件でも表示）
    for (let i = _pastWindow; i >= 1; i--) {
      const date  = _offsetDate(-i);
      const tasks = (byDate[date] || []).sort((a, b) => a.order - b.order);
      html += _renderDateSection(date, tasks, d, true);
    }
  }

  html += `</div>`;

  // ── 今日 ──────────────────────────────────────────────────
  const todayTasks = (byDate[t] || []).sort((a, b) => a.order - b.order);
  html += _renderDateSection(t, todayTasks, d, false);

  // ── 今後のタスク セクション ───────────────────────────────
  const futureTotalCount = (() => {
    let n = 0;
    for (let i = 1; i <= _futureWindow; i++) {
      n += (byDate[_offsetDate(i)] || []).filter(x => x.type !== 'divider').length;
    }
    return n;
  })();

  html += `
    <div class="future-section">
      <div class="past-section-header" onclick="toggleFutureSection()">
        <span class="section-toggle ${_futureShown ? '' : 'closed'}">▼</span>
        <span style="font-size:13px;font-weight:600;color:var(--gray-500)">今後のタスク</span>
      </div>`;

  if (_futureShown) {
    for (let i = 1; i <= _futureWindow; i++) {
      const date  = _offsetDate(i);
      const tasks = (byDate[date] || []).sort((a, b) => a.order - b.order);
      // 0件でもセクションを表示（D&Dのドロップ先として機能）
      html += _renderDateSection(date, tasks, d, false);
    }

    const { label: futureLabel, next: futureNext } = _expandFutureLabel(_futureWindow);
    const hasReset = _futureWindow > 3 || _pastShown;
    html += `<div style="padding:4px 12px 8px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="recurring-more-btn" onclick="expandFutureWindow(${futureNext})">${futureLabel} ▼</button>
      ${hasReset ? `<button class="recurring-more-btn" onclick="resetTaskWindows()" style="color:var(--gray-400)">表示をリセット ✕</button>` : ''}
    </div>`;
  }

  html += `</div>`;

  if (!html) html = `<div class="empty-state">タスクがありません</div>`;
  el.innerHTML = html;

  if (editingTaskId) {
    const inp = el.querySelector(`[data-edit="${editingTaskId}"]`);
    if (inp) {
      if (!_editCache[editingTaskId]) {
        const t = D().tasks.find(x => x.id === editingTaskId);
        if (t) _editCache[editingTaskId] = { title: t.title, notes: t.notes || '' };
      }
      inp.focus(); inp.select();
    }
  }
  attachTouchDragListeners();
}

function taskRow(task, d) {
  const proj = d.projects.find(p => p.id === task.projectId);
  const wt   = d.workTypes.find(w => w.id === task.workType);
  const done = task.status === 'completed';
  const editing = editingTaskId === task.id;
  const recTmpl = task.recurringId ? (d.recurringTemplates||[]).find(t => t.id === task.recurringId) : null;
  const recBadge = recTmpl?.recurring
    ? `<span class="tag" style="background:rgba(99,102,241,.1);color:#6366f1">🔁 ${_recurringLabel(recTmpl.recurring)}</span>`
    : '';
  const today = todayStr();
  const isSlot = task._slotIdx !== undefined;
  const isUnscheduled = !task.scheduledDate && !isSlot;
  const slotDate = task._slotDate || today;
  const slotDone = isSlot ? (task.completedSlots || []).includes(task._slotIdx) : false;
  const effectiveDone = isSlot ? slotDone : done;
  // スロットタスクは slotIdx で partialHours を特定（同日複数スロット対応）
  const _getSlotPartial = (ph, idx) => isSlot
    ? (ph || []).find(p => p.slotIdx === idx)?.hours ?? 0
    : (ph || []).filter(p => p.date === slotDate).reduce((s, p) => s + p.hours, 0);
  const partialOnDate = _getSlotPartial(task.partialHours, task._slotIdx);
  const slotH = task._slotHours ?? task.estimatedHours;
  const slotBadge = isSlot
    ? `<span class="tag" style="background:rgba(99,102,241,.08);color:#6366f1;font-size:10px">${task._slotIdx + 1}/${task._slotTotal}</span>`
    : '';
  const slotIdxParam = isSlot ? task._slotIdx : '';
  // いつかやる欄のクリックハンドラはドラッグ直後の誤クリックを防ぐガードを付与
  const _somedayClickGuard = isUnscheduled ? 'if(_somedayRecentDrag)return;' : '';
  // いつかやる欄は予定時間のみ表示・クリックで予定時間のみ編集
  // 予定アイコン◷は字面が小さいため一回り拡大（太さは変えない）
  const _planIcon = '<span style="font-size:14px;margin-right:3px">◷</span>';
  const _doneIcon = '<span style="margin-right:2px">✓</span>';
  const hoursBadge = isUnscheduled
    ? `<button class="tag-hours" onclick="${_somedayClickGuard}openEstModal('${task.id}');event.stopPropagation()">${_planIcon}${_fmtHorDash(task.estimatedHours)}</button>`
    : effectiveDone
    ? (partialOnDate > 0
      ? `<span class="tag-hours" style="cursor:default;color:var(--green-600)">${_doneIcon}${_fmtH(partialOnDate)}</span>`
      : `<span class="tag-hours" style="cursor:default;color:var(--green-600)">${_planIcon}${_fmtHorDash(slotH)}</span>`)
    : partialOnDate > 0
    ? `<button class="tag-hours" onclick="openPartialModal('${task.id}','${slotDate}',${slotIdxParam});event.stopPropagation()" style="color:var(--amber-500)">${_doneIcon}${_fmtH(partialOnDate)} / ${_planIcon}${_fmtHorDash(slotH)}</button>`
    : `<button class="tag-hours" onclick="openPartialModal('${task.id}','${slotDate}',${slotIdxParam});event.stopPropagation()">${_planIcon}${_fmtHorDash(slotH)}</button>`;
  // ステータスバッジ（いつかやる欄・showStatus:false の作業種類は非表示、完了時は「● 完了」を表示）
  const wtShowStatus = wt ? (wt.showStatus !== false) : true;
  const statusLabel = { pending: '未着手', in_progress: '進行中', waiting: '待ち', completed: '完了' };
  const statusBadge = (!isUnscheduled && wtShowStatus)
    ? (effectiveDone
      ? `<span class="tag-status" data-status="completed">● 完了</span>`
      : (task.status && task.status !== 'completed')
        ? `<button class="tag-status" data-status="${task.status}" onclick="toggleTaskStatus('${task.id}');event.stopPropagation()" title="クリックでステータス変更">● ${statusLabel[task.status] || task.status}</button>`
        : '')
    : '';

  // レース対策：timelineビューでは機能2（Pointer-based D&D）が「いつかやる」カードの
  // 主たるD&D経路。draggable属性をレンダリング時点（=ブラウザがこの要素を
  // ドラッグ候補として認識する一番最初のタイミング）で false にしておくことで、
  // ネイティブ dragstart 自体を発火不能にし、機能2との競合（.someday-section に
  // .drag-target/.drag-over-zone の緑破線が居座りドロップ不能になる現象）を根絶する。
  // pointerdown時や dragstart時に動的に draggable をfalseへトグルする方式は、
  // 「いつかやる」リストが render()/renderNotes() のたびに innerHTML で作り直される
  // ため、ドラッグ開始までの間に再描画が挟まると新DOMノードには反映されず
  // 「間欠的にNG」になることを実機検証で確認済み（render時点で決定するこの方式なら
  // 常に最新のDOMノードに反映されるため再描画タイミングに左右されない）。
  // timeline以外のビューでは「いつかやる→カレンダーへドロップして日付設定」が
  // ネイティブD&D側の正規の経路のため対象外（_doStartSomedayDrag の viewMode
  // ガードと同じ判断基準）。
  return `
    <div class="task-row${editing?' editing':''}" data-id="${task.id}" data-task-id="${task.id}" data-task-date="${isSlot ? slotDate : (task.scheduledDate || '')}" data-slot-idx="${isSlot ? task._slotIdx : -1}"
      draggable="${(editing || viewMode === 'timeline')?'false':'true'}"
      ondragstart="handleDragStart(event,'${task.id}','${isSlot?slotDate:''}',${isSlot?task._slotIdx:''})"
      ondragend="handleDragEnd(event)"
      ondragover="handleDragOver(event)"
      ondrop="handleDropOnTask(event,'${task.id}','${isSlot ? slotDate : (task.scheduledDate || '')}',${isSlot ? task._slotIdx : -1})">
      <div class="task-card">
        <span class="drag-handle">⋮⋮</span>
        ${isUnscheduled ? '' : `<button class="task-check${effectiveDone?' done':''}"${(!effectiveDone && proj) ? ` style="border-color:${proj.color}"` : ''} onclick="${_somedayClickGuard}${isSlot ? `toggleSlotComplete('${task.id}',${task._slotIdx})` : `toggleTask('${task.id}')`}">
          <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8"><path d="M2 5l2.5 2.5L8 3"/></svg>
        </button>`}
        <div class="task-title-wrap">
          ${editing
            ? `<input type="text" class="task-title-input" data-edit="${task.id}" value="${esc(task.title)}"
                 oninput="_cacheEdit('${task.id}','title',this.value)"
                 onkeydown="handleTitleEditKey(event,'${task.id}')"
                 onclick="event.stopPropagation()">
               <textarea class="task-memo-edit" data-memo="${task.id}" rows="2"
                 placeholder="メモ..."
                 oninput="_cacheEdit('${task.id}','notes',this.value)"
                 onkeydown="handleMemoEditKey(event,'${task.id}')"
                 onclick="event.stopPropagation()">${esc(task.notes||'')}</textarea>`
            : `<div class="task-title${effectiveDone?' done':''}" onclick="${_somedayClickGuard}startEdit('${task.id}')">${esc(task.title)}</div>
               ${task.notes
                 ? `<div class="task-memo-preview" onclick="${_somedayClickGuard}startEdit('${task.id}')">${esc(task.notes.split('\n')[0])}</div>`
                 : ''}`}
        </div>
        <div class="task-tags">
          ${proj ? `<span class="tag" style="background:${proj.color}20;color:${proj.color}">${esc(proj.name)}</span>` : ''}
          ${wt   ? `<span class="tag" style="background:${wt.color}20;color:${wt.color}">${esc(wt.label)}</span>` : ''}
          ${recBadge}
          ${slotBadge}
          ${statusBadge}
        </div>
        <div class="task-time"${isUnscheduled ? ' style="width:40px"' : ''}>${hoursBadge}</div>
        <div class="task-actions">
          <button class="task-action-btn" onclick="openEditModal('${task.id}');event.stopPropagation()" onmouseenter="_positionTip(this)" data-tip="編集" aria-label="編集">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10.5h2.5l5.5-5.5-2.5-2.5L2 8v2.5zm6.5-6.5 1 1"/></svg>
          </button>
          ${!isSlot ? `<button class="task-action-btn" onclick="cloneTask('${task.id}');event.stopPropagation()" onmouseenter="_positionTip(this)" data-tip="複製" aria-label="複製">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="4.5" width="7" height="7" rx="1"/><path d="M1.5 8.5V2.5a1 1 0 0 1 1-1h6"/></svg>
          </button>` : ''}
          ${!isUnscheduled ? `<button class="task-action-btn" onclick="taskToNote('${task.id}');event.stopPropagation()" onmouseenter="_positionTip(this)" data-tip="Noteに複製 →" aria-label="Noteに複製">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5h9M8 3.5l3 3-3 3"/></svg>
          </button>` : ''}
          <button class="task-action-btn danger" onclick="${isSlot ? `deleteSlotTask('${task.id}','${slotDate}',${task._slotIdx})` : `deleteTaskWithRecurringCheck('${task.id}')`};event.stopPropagation()" onmouseenter="_positionTip(this)" data-tip="削除" aria-label="削除">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2.5 2.5l8 8M10.5 2.5l-8 8"/></svg>
          </button>
        </div>
      </div>
    </div>`;
}

function startEdit(id) { if (editingTaskId && editingTaskId !== id) saveInlineEdit(editingTaskId); editingTaskId = id; renderTaskList(); renderNotes(); }

// ── Inline edit helpers ──────────────────────────────────────
let _editCache = {};

function _cacheEdit(id, field, val) {
  if (!_editCache[id]) _editCache[id] = {};
  _editCache[id][field] = val;
}

function handleTitleEditKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveInlineEdit(id); }
  else if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    const memo = document.querySelector(`[data-memo="${id}"]`);
    if (memo) { memo.focus(); memo.setSelectionRange(memo.value.length, memo.value.length); }
  }
  else if (e.key === 'Escape') { e.preventDefault(); saveInlineEdit(id); }
}

function handleMemoEditKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveInlineEdit(id); }
  else if (e.key === 'Escape') { e.preventDefault(); saveInlineEdit(id); }
}

function saveInlineEdit(id) {
  const d = D();
  const task = d.tasks.find(t => t.id === id);
  if (task && _editCache[id]) {
    if (_editCache[id].title !== undefined && _editCache[id].title.trim()) task.title = _editCache[id].title.trim();
    if (_editCache[id].notes !== undefined) task.notes = _editCache[id].notes;
  }
  delete _editCache[id];
  editingTaskId = null;
  commit();
}

// Capture-phase outside-click to close inline edit
document.addEventListener('click', function(e) {
  if (!editingTaskId) return;
  const row = document.querySelector(`.task-row[data-id="${editingTaskId}"]`);
  if (row && !row.contains(e.target)) saveInlineEdit(editingTaskId);
}, true);
function toggleMultiDay(id) {
  _multidayExpanded.has(id) ? _multidayExpanded.delete(id) : _multidayExpanded.add(id);
  renderMultiDay();
}

function toggleSec(key) {
  collapsedSections[key] = !collapsedSections[key];
  if (key === '_unsched') renderNotes();
  else if (key === '_multiday') renderMultiDay();
  else renderTaskList();
}

// ============================================================
// RENDER — TIMELINE
// ============================================================
function renderTimeline(d) {
  const t = heroAnchorDate;
  const realToday = todayStr();
  const TL_START = 7, TL_END = 23, PX = 75;
  const toM = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };

  // 分割タスク（estimatedHoursByDate >= 2件）は今日付きのスロットを展開
  const todayRaw = d.tasks.filter(x => x.type !== 'divider' && x.status !== 'cancelled');
  const todaySlots = [];
  todayRaw.forEach(task => {
    const ebd = task.estimatedHoursByDate;
    if (Array.isArray(ebd) && ebd.length >= 2 && task.status !== 'completed') {
      ebd.forEach((entry, idx) => {
        if (entry.date !== t) return;
        todaySlots.push(Object.assign({}, task, {
          _slotIdx:       idx,
          _slotTotal:     ebd.length,
          _slotHours:     entry.hours,
          _slotDate:      entry.date,
          _slotStartTime: entry.startTime ?? null,
          _slotEndTime:   entry.endTime   ?? null,
        }));
      });
    } else if (task.scheduledDate === t) {
      todaySlots.push(task);
    }
  });
  const withTime = todaySlots
    .filter(x => (x._slotStartTime ?? x.startTime))
    .sort((a, b) => {
      const as = a._slotStartTime ?? a.startTime;
      const bs = b._slotStartTime ?? b.startTime;
      return as.localeCompare(bs) || a.order - b.order;
    });
  const noTime = todaySlots
    .filter(x => !(x._slotStartTime ?? x.startTime))
    .sort((a, b) => a.order - b.order);

  // Greedy column assignment + overlap-aware width/left calculation
  function calcLayout(tasks) {
    const items = tasks.map(task => {
      const effStart = task._slotStartTime ?? task.startTime;
      const effEnd   = task._slotEndTime   ?? task.endTime;
      const effHours = task._slotHours     ?? task.estimatedHours;
      const startM = toM(effStart);
      const endM   = effEnd
        ? Math.max(toM(effEnd), startM + 15)
        : startM + Math.max(Math.round((effHours || 0.5) * 60), 15);
      return { task, startM, endM, col: 0 };
    });
    // 視覚的な下端（px）で列割り当て：min-height 28px を考慮し隣接短タスクを別列へ
    const colBots = []; // 各列の視覚的な下端 (px)
    items.forEach(item => {
      const topPx = (item.startM - TL_START * 60) / 60 * PX;
      const botPx = Math.max((item.endM - TL_START * 60) / 60 * PX, topPx + 28);
      let col = colBots.findIndex(b => b <= topPx);
      if (col === -1) { col = colBots.length; }
      colBots[col] = botPx;
      item.col = col;
    });
    return items.map(item => {
      const topPx = (item.startM - TL_START * 60) / 60 * PX;
      const botPx = Math.max((item.endM - TL_START * 60) / 60 * PX, topPx + 28);
      const overlap = items.filter(o => {
        if (o === item) return false;
        const oTop = (o.startM - TL_START * 60) / 60 * PX;
        const oBot = Math.max((o.endM - TL_START * 60) / 60 * PX, oTop + 28);
        return oTop < botPx && oBot > topPx;
      });
      const maxCol   = overlap.length ? Math.max(item.col, ...overlap.map(o => o.col)) : item.col;
      const totalCols = maxCol + 1;
      const top      = (item.startM - TL_START * 60) / 60 * PX + 2;
      const height   = Math.max((item.endM - item.startM) / 60 * PX - 3, 28);
      const wPct     = totalCols > 1 ? 100 / totalCols : 100;
      const lPct     = totalCols > 1 ? item.col / totalCols * 100 : 0;
      return { task: item.task, top, height, wPct, lPct };
    });
  }

  const layouts = calcLayout(withTime);

  // GCal イベントブロック（キャッシュから同期取得）
  const gcalEvents = Array.isArray(_gcalEventsCache[t]) ? _gcalEventsCache[t] : [];
  // タイムライン表示範囲（7:00–23:00）内に実際に表示されるイベントだけを対象に分割を判断する
  const visibleGcalEvents = gcalEvents.filter(ev => {
    const dtS = new Date(ev.start.dateTime), dtE = new Date(ev.end.dateTime);
    return (dtE.getHours()*60+dtE.getMinutes()) > TL_START*60 &&
           (dtS.getHours()*60+dtS.getMinutes()) < TL_END*60;
  });
  // 表示対象GCalがある日のみ右30%をGCal帯として確保。ない日はタスクが全幅を使う
  const GCAL_COL_PCT = 30;
  const taskColPct = visibleGcalEvents.length > 0 ? (100 - GCAL_COL_PCT) : 100;
  function gcalBlock(ev) {
    const dtStart = new Date(ev.start.dateTime);
    const dtEnd   = new Date(ev.end.dateTime);
    // ローカル時刻で分数に変換し、タイムライン範囲内にクリップ
    let sm = Math.max(dtStart.getHours() * 60 + dtStart.getMinutes(), TL_START * 60);
    let em = Math.min(dtEnd.getHours()   * 60 + dtEnd.getMinutes(),   TL_END   * 60);
    if (em <= sm) return '';
    const top    = (sm - TL_START * 60) / 60 * PX + 2;
    const height = Math.max((em - sm) / 60 * PX - 2, 18);
    const color  = ev._calBg || '#4285F4';
    return `<div class="gcal-event" style="left:${taskColPct}%;right:0;top:${top}px;height:${height}px;background:${color}22;border-left:3px solid ${color};color:${color};pointer-events:none">
      <span class="gcal-event-title">${esc(ev.summary || '(タイトルなし)')}</span>
      <button class="gcal-import-btn" data-ev-id="${esc(ev.id)}" onclick="openGCalImportModal(this.dataset.evId)" style="pointer-events:auto;background:${color}">＋</button>
    </div>`;
  }
  const gcalBlocks = visibleGcalEvents.map(gcalBlock).join('');

  // Current time line
  const now = new Date();
  const nowM = now.getHours() * 60 + now.getMinutes();
  const nowTop = (nowM - TL_START * 60) / 60 * PX;
  const showNow = t === realToday && nowM >= TL_START * 60 && nowM <= TL_END * 60;

  const hours = Array.from({ length: TL_END - TL_START }, (_, i) => i + TL_START);

  // プロジェクト色を白と混ぜて不透明なパステル色を作る
  // （アルファ透過だとグリッド線がカードを通して見えてしまうため）
  function _tlPastelize(hex, ratio) {
    const h = (hex || '').replace('#', '');
    if (h.length !== 6) return hex;
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    const mix = c => Math.round(255 * ratio + c * (1 - ratio));
    const toHex = n => n.toString(16).padStart(2, '0');
    return `#${toHex(mix(r))}${toHex(mix(g))}${toHex(mix(b))}`;
  }

  function tlCard(task, style, h) {
    const proj = d.projects.find(p => p.id === task.projectId);
    const done = task.status === 'completed' ||
      (task._slotIdx != null && (task.completedSlots || []).includes(task._slotIdx));
    const bgColor   = proj ? _tlPastelize(proj.color, 0.78) : 'var(--gray-200)';
    const textColor = proj ? proj.color        : 'var(--gray-700)';
    const bdColor   = proj ? _tlPastelize(proj.color, 0.4)  : 'var(--gray-400)';
    const effStart = task._slotStartTime ?? task.startTime;
    const effEnd   = task._slotEndTime   ?? task.endTime;
    const effHours = task._slotHours     ?? task.estimatedHours;
    const slotBadge = (task._slotIdx != null)
      ? ` [${task._slotIdx + 1}/${task._slotTotal}]`
      : '';
    const timeLabel = effStart
      ? (effEnd ? `${effStart}–${effEnd}` : `${effStart}`) + ` · ${_fmtHorDash(effHours)}${slotBadge}`
      : `${_fmtHorDash(effHours)}${slotBadge}`;
    const handleH = Math.max(6, Math.min(12, Math.floor(h / 4)));
    const pad    = h < 40 ? '2px 6px' : '5px 8px';
    const showSub = h >= 44;  // プロジェクト名 or 時刻ラベルを表示するか
    const showAll = h >= 58;  // 両方表示するか
    const subLine = proj
      ? `<div style="font-size:10px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(proj.name)}</div>`
      : '';
    const timeLine = `<div style="font-size:10px;opacity:.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${timeLabel}</div>`;
    return `<div class="timeline-task${done ? ' done' : ''}" data-id="${task.id}"
      style="${style};padding:${pad};background:${bgColor};color:${textColor};border:1.5px solid ${bdColor};--tl-handle-color:${bdColor}"
      onclick="_onTlTaskClick(event,'${task.id}'${task._slotIdx != null ? `,${task._slotIdx}` : ''})">
      <div style="font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px">${esc(task.title)}</div>
      ${showSub ? subLine : ''}
      ${showAll ? timeLine : (!showSub ? timeLine : (proj ? '' : timeLine))}
      <button class="tl-check-btn${done ? ' done' : ''}" onclick="event.stopPropagation();${task._slotIdx != null ? `toggleSlotComplete('${task.id}',${task._slotIdx})` : `_onTlCheck('${task.id}')`}" title="${done ? '完了を取り消す' : '完了にする'}">
        <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8"><polyline points="2,5 4,7.5 8,2.5"/></svg>
      </button>
      ${(h >= 28 && task._slotIdx == null) ? `<div class="tl-resize-top-handle" data-top-resize-id="${task.id}" style="--tl-handle-h:${handleH}px"></div>` : ''}
      ${task._slotIdx == null ? `<div class="tl-resize-handle" data-resize-id="${task.id}" style="--tl-handle-h:${handleH}px"></div>` : ''}
    </div>`;
  }

  const gridCards = layouts.map(({ task, top, height, wPct, lPct }) => {
    const adjLeft = lPct * taskColPct / 100;
    const adjW    = wPct * taskColPct / 100;
    return tlCard(task, `top:${top}px;height:${height}px;left:calc(${adjLeft}% + 2px);width:calc(${adjW}% - 4px)`, height);
  }).join('');

  const unschedCol = collapsedSections['_tlUnsched'];

  const unschedCards = noTime.map(task => {
    const proj = d.projects.find(p => p.id === task.projectId);
    const done = task.status === 'completed';
    return `<div class="timeline-unsched-task${done ? ' done' : ''}" data-id="${task.id}" onclick="_onTlUnschedTaskClick(event,'${task.id}')">
      <span style="font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(task.title)}</span>
      ${proj ? `<span class="task-tag" style="background:${proj.color}22;color:${proj.color};flex-shrink:0">${esc(proj.name)}</span>` : ''}
      <span style="font-size:11px;color:var(--gray-400);flex-shrink:0">${_fmtHorDash(task.estimatedHours)}</span>
    </div>`;
  }).join('');

  return `<div style="padding:12px">
    <div class="timeline-unscheduled${unschedCol ? ' collapsed' : ''}" style="margin-top:0;border-top:none;margin-bottom:16px;border-bottom:1px solid var(--gray-100);padding-bottom:12px;padding-top:0">
      <div class="timeline-unscheduled-title" onclick="toggleSec('_tlUnsched')">
        <span class="section-toggle ${unschedCol ? 'closed' : ''}">▼</span>
        <span>時刻未設定 (${noTime.length}件)</span>
      </div>
      ${unschedCol ? '' : unschedCards}
    </div>
    <div class="timeline-wrap">
      <div class="timeline-grid">
        ${[...hours, TL_END].map(h => {
          const top = (h - TL_START) * PX;
          const half = h < TL_END ? `<div class="tl-half-line" style="top:${top + PX / 2}px"></div>` : '';
          return `<div class="tl-hour-line" style="top:${top}px"><span class="tl-hour-label">${h}:00</span></div>${half}`;
        }).join('')}
        ${showNow ? `<div class="timeline-now-line" style="top:${nowTop}px"></div>` : ''}
        ${gcalBlocks}
        ${gridCards}
      </div>
    </div>
  </div>`;
}

function renderMultiDay() {
  const el = document.getElementById('multiday-panel'); if (!el) return;
  const d = D();
  const multiTasks = d.tasks.filter(x =>
    x.type !== 'divider' && x.status !== 'completed' &&
    Array.isArray(x.estimatedHoursByDate) && x.estimatedHoursByDate.length >= 2
  );
  if (multiTasks.length === 0) {
    const col = collapsedSections['_multiday'];
    el.innerHTML = `<div class="multiday-section">
      <div class="multiday-header" onclick="toggleSec('_multiday')">
        <span class="section-toggle ${col?'closed':''}">▼</span>
        <span>分割タスク</span>
        <span style="color:var(--gray-400);font-weight:400">0件</span>
      </div>
      ${col ? '' : `<div style="padding:10px 4px 10px 14px;font-size:12px;color:var(--gray-400)">分割タスクはありません</div>`}
    </div>`;
    return;
  }

  const col = collapsedSections['_multiday'];
  const wd = ['日','月','火','水','木','金','土'];

  const cards = multiTasks.map(task => {
    const ebd = task.estimatedHoursByDate;
    const totalDays = ebd.length;
    const doneDays = ebd.filter((_, i) => (task.completedSlots || []).includes(i)).length;
    const isExp = _multidayExpanded.has(task.id);
    const toggleIcon = isExp ? '▼' : '▶';

    const dayRows = ebd.map((e, i) => {
      // slotIdx ベース（分割タスクの正規キー）→ date ベース（旧形式 fallback）の順で検索
      const ph = (task.partialHours || []).find(p => p.slotIdx === i)
              || (task.partialHours || []).find(p => p.date === e.date && p.slotIdx === undefined);
      const actual = ph ? ph.hours : null;
      const slotChecked = (task.completedSlots || []).includes(i);
      const [y,m,dd] = e.date.split('-').map(Number);
      const dayW = wd[new Date(y, m-1, dd).getDay()];
      const label = `${m}/${dd}（${dayW}）`;
      const actualStr = actual !== null ? `${_fmtH(actual)}` : '—';
      return `<div class="multiday-day-row">
        <span class="task-check${slotChecked?' done':''}" style="width:16px;height:16px;min-width:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;pointer-events:none">
          <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8"><path d="M2 5l2.5 2.5L8 3"/></svg>
        </span>
        <span class="multiday-day-date">${label}</span>
        <span class="multiday-day-hours">${actualStr}/${_fmtH(e.hours)}</span>
      </div>`;
    }).join('');

    return `<div class="multiday-card">
      <div class="multiday-card-row">
        <span class="multiday-toggle" onclick="toggleMultiDay('${task.id}')">${toggleIcon}</span>
        <span class="multiday-title">${esc(task.title)}</span>
        <span class="multiday-meta">${doneDays}/${totalDays}</span>
        ${(() => {
          const hasPartial = (task.partialHours || []).some(p => p.hours > 0);
          if (doneDays === totalDays) return `<span class="multiday-status done">完了</span>`;
          if (doneDays > 0 || hasPartial) return `<span class="multiday-status doing">進行中</span>`;
          return `<span class="multiday-status todo">未着手</span>`;
        })()}
      </div>
      ${isExp ? `<div class="multiday-days">${dayRows}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="multiday-section">
      <div class="multiday-header" onclick="toggleSec('_multiday')">
        <span class="section-toggle ${col?'closed':''}">▼</span>
        <span>分割タスク</span>
        <span style="color:var(--gray-400);font-weight:400">${multiTasks.length}件</span>
      </div>
      ${col ? '' : cards}
    </div>`;
}

    const iconEdit   = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9h2.5l5-5-2.5-2.5-5 5V9z"/><path d="M7 3l2.5 2.5"/></svg>`;
    const iconDelete = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 2l8 8M10 2l-8 8"/></svg>`;
    // プロジェクト・作業種類の選択肢（展開カード用）
    const projOptsSel = `<option value="">プロジェクト</option>` +

function expandNote(id) {
  // 既存の外側クリックハンドラを解除
  if (_noteOutsideClickFn) {
    document.removeEventListener('click', _noteOutsideClickFn, true);
    _noteOutsideClickFn = null;
  }
  // 別のカードを開く場合は現在の編集を保存
  if (expandedNoteId && expandedNoteId !== id) _flushNoteEdit(expandedNoteId);
  expandedNoteId = expandedNoteId === id ? null : id;
  if (expandedNoteId === null && arguments[1] !== 'silent') {
    // カードを閉じるなら保存（第2引数'silent'のときはスキップ）
  }
  renderNotes();
  // 展開後に外側クリックで閉じるハンドラを設定
  if (expandedNoteId) {
    _noteOutsideClickFn = function(e) {
      const card = document.querySelector('.note-card.expanded');
      if (card && !card.contains(e.target)) closeExpandedNote();
    };
    setTimeout(() => document.addEventListener('click', _noteOutsideClickFn, true), 0);
  }
}
function _flushNoteEdit(id) {
  const content = _noteEditContent[id];
  if (content === undefined) return false;
  delete _noteEditContent[id];
  const n = D().notes.find(x => x.id === id);
  if (!n) return false;
  n.content = content; n.updatedAt = new Date().toISOString();
  return true;
}
function closeExpandedNote() {
  if (_noteOutsideClickFn) {
    document.removeEventListener('click', _noteOutsideClickFn, true);
    _noteOutsideClickFn = null;
  }
  if (expandedNoteId) {
    const changed = _flushNoteEdit(expandedNoteId);
    if (changed) Storage.save();
  }
  expandedNoteId = null;
  renderNotes();
}
function handleNoteTextareaKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Escape') { e.preventDefault(); closeExpandedNote(); }
  else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); closeExpandedNote(); }
}
function handleSomedayAdd() {
  const inp = document.getElementById('someday-add-input');
  const notesEl = document.getElementById('someday-notes');
  const title = inp ? inp.value.trim() : '';
  if (!title) return;
  const notes = notesEl ? notesEl.value.trim() : '';
  const d = D();
  d.tasks.push({ id: genId(), type: 'task', title, notes,
    projectId: _somedayProjectId, workType: _somedayWorkTypeId,
    priority: 'medium', estimatedHours: _predictedEstOrNull(title), actualHours: null, partialHours: [],
    startTime: null, endTime: null, deadline: null, status: 'pending', tagIds: [], scheduledDate: null,
    recurring: null, recurringId: null, order: d.tasks.length,
    completedAt: null, createdAt: new Date().toISOString() });
  commit();
  _resetSomedayState();
  if (inp) inp.value = '';
  if (notesEl) notesEl.value = '';
  const detail = document.getElementById('someday-detail');
  if (detail) detail.style.display = 'none';
}
function handleAddNote() {
  const inp = document.getElementById('note-input');
  if (!inp.value.trim()) return;
  addNote(inp.value, _noteProjectId, _noteWorkTypeId);
  inp.value = '';

}

// ── Calendar helpers ──────────────────────────────────────────
function _calDateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _getCalViewDays(view, anchor) {
  const base = new Date(anchor + 'T00:00:00');
  const days = [];
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let cols = 7;

  if (view === 'month') {
    const y = base.getFullYear(), m = base.getMonth();
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev  = new Date(y, m, 0).getDate();
    for (let i = firstDay-1; i >= 0; i--) {
      const dt = new Date(y, m-1, daysInPrev-i);
      days.push({ date: _calDateToStr(dt), cur: false });
    }
    for (let i = 1; i <= daysInMonth; i++) days.push({ date: `${y}-${pad(m+1)}-${pad(i)}`, cur: true });
    while (days.length % 7) {
      const dt = new Date(y, m+1, days.length - daysInMonth - firstDay + 1);
      days.push({ date: _calDateToStr(dt), cur: false });
    }
    cols = 7;
  } else if (view === '2week') {
    const ws = new Date(base); ws.setDate(base.getDate() - base.getDay());
    for (let i = 0; i < 14; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 7;
  } else if (view === 'week') {
    const ws = new Date(base); ws.setDate(base.getDate() - base.getDay());
    for (let i = 0; i < 7; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 7;
  } else if (view === 'workday') {
    const ws = new Date(base); ws.setDate(base.getDate() - ((base.getDay()||7) - 1)); // Monday
    for (let i = 0; i < 5; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 5;
  } else if (view === '3day') {
    for (let i = -1; i <= 1; i++) { const d = new Date(base); d.setDate(base.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 3;
  } else if (view === 'day') {
    days.push({ date: anchor, cur: true });
    cols = 1;
  }
  return { days, cols };
}
function _calViewTitle(view, anchor) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const base = new Date(anchor + 'T00:00:00');
  if (view === 'month') return `${base.getFullYear()}年${months[base.getMonth()]}`;
  const { days } = _getCalViewDays(view, anchor);
  if (!days.length) return '';
  const first = new Date(days[0].date + 'T00:00:00');
  const last  = new Date(days[days.length-1].date + 'T00:00:00');
  const fmt = d => `${d.getFullYear()}年${months[d.getMonth()]}${d.getDate()}日`;
  if (view === 'day') return fmt(first);
  // 全範囲：「2026年5月25日 - 2026年5月29日」形式（月またぎ・年またぎも同様）
  return `${fmt(first)} - ${fmt(last)}`;
}

function renderCalendar() {
  const el = document.getElementById('calendar-card'); if (!el) return;
  const d = D(); const t = todayStr();
  const wdaysAll = ['日','月','火','水','木','金','土'];
  const views = ['month','2week','week','workday','3day','day'];
  const viewLabels = { month:'月', '2week':'2週', week:'週', workday:'稼働日', '3day':'3日間', day:'日' };

  // Sync month view anchor
  if (calView === 'month') {
    const base = new Date(calAnchorDate + 'T00:00:00');
    calYear = base.getFullYear(); calMonth = base.getMonth();
  }

  const viewBtns = views.map(v =>
    `<button class="cal-view-btn${calView===v?' active':''}" onclick="setCalView('${v}')">${viewLabels[v]}</button>`
  ).join('');
  const title = _calViewTitle(calView, calAnchorDate);

  const { days, cols } = _getCalViewDays(calView, calAnchorDate);

  let gridHtml;
  if (calView === 'day') {
    // Day view: detailed list
    const dateStr = calAnchorDate;
    const dayTasks = d.tasks.filter(x => x.scheduledDate === dateStr && x.type !== 'divider').sort((a,b)=>(a.order||0)-(b.order||0));
    const review = (d.reviews||[]).find(r => r.date === dateStr);
    gridHtml = `<div class="cal-day-view">
      ${review ? `<div class="cal-day-review">★ ${review.score}/100 &nbsp;${review.scoreLabel}&nbsp;&nbsp;稼働 ${_fmtH(review.actualHours)}${review.reviewMemo ? `<div class="cal-day-memo">${esc(review.reviewMemo)}</div>` : ''}</div>` : ''}
      ${dayTasks.length ? dayTasks.map(task => `
        <div class="cal-day-task">
          <span class="cal-day-task-status">${task.status==='completed'?'✅':'○'}</span>
          <span class="cal-day-task-title">${esc(task.title)}</span>
          <span class="cal-day-task-h">${task.actualHours ? _fmtH(task.actualHours) : _fmtHorDash(task.estimatedHours)}</span>
        </div>`).join('')
      : `<div style="color:var(--gray-400);font-size:13px;padding:16px;text-align:center">タスクなし</div>`}
    </div>`;
  } else {
    // Grid view
    const wdayHdr = calView === 'workday'
      ? ['月','火','水','木','金'].map(w=>`<div class="cal-weekday">${w}</div>`).join('')
      : calView === '3day'
      ? days.map(({date})=>{ const dt=new Date(date+'T00:00:00'); return `<div class="cal-weekday">${wdaysAll[dt.getDay()]}</div>`; }).join('')
      : wdaysAll.map(w=>`<div class="cal-weekday">${w}</div>`).join('');

    const cellsHtml = days.map(({ date: ds, cur }) => {
      const dayTasks = d.tasks.filter(x => x.scheduledDate === ds && x.type !== 'divider');
      const doneCount = dayTasks.filter(x => x.status === 'completed').length;
      const review = (d.reviews||[]).find(r => r.date === ds);
      const dots = dayTasks.slice(0,5).map(x => `<div class="cal-dot${x.status==='completed'?' done':''}"></div>`).join('');
      return `<div class="cal-cell${ds===t?' today':''}${!cur?' other-month':''}" onclick="openDayDetail('${ds}')">
        <div class="cal-day-num">${new Date(ds+'T00:00:00').getDate()}</div>
        ${dayTasks.length ? `<div class="cal-dot-row">${dots}</div><div class="cal-count">${doneCount}/${dayTasks.length}</div>` : ''}
        ${review ? `<div class="cal-score">★${review.score}</div>` : ''}
      </div>`;
    }).join('');

    gridHtml = `<div class="cal-grid" style="grid-template-columns:repeat(${cols},1fr)">${wdayHdr}${cellsHtml}</div>`;
  }

  el.innerHTML = `
    <div class="cal-header" style="flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="goCalToday()" title="今日を含む期間へ">今日</button>
        <button class="btn btn-outline btn-sm" onclick="moveCalView(-1)">←</button>
        <button class="btn btn-outline btn-sm" onclick="moveCalView(1)">→</button>
        <span class="cal-title">${title}</span>
      </div>
      <div class="cal-view-btns">${viewBtns}</div>
    </div>
    ${gridHtml}`;
}

function setCalView(view) {
  calView = view;
  if (view === 'month') calAnchorDate = `${calYear}-${pad(calMonth+1)}-01`;
  renderCalendar();
}
function moveCalView(delta) {
  const base = new Date(calAnchorDate + 'T00:00:00');
  switch (calView) {
    case 'month': base.setMonth(base.getMonth()+delta); base.setDate(1); break;
    case '2week': base.setDate(base.getDate()+delta*14); break;
    case 'week':
    case 'workday': base.setDate(base.getDate()+delta*7); break;
    case '3day': base.setDate(base.getDate()+delta*3); break;
    case 'day':  base.setDate(base.getDate()+delta); break;
  }
  calAnchorDate = _calDateToStr(base);
  if (calView === 'month') { calYear = base.getFullYear(); calMonth = base.getMonth(); }
  renderCalendar();
}
// Keep old moveMonth/selDate as aliases for safety
function moveMonth(delta) { moveCalView(delta); }
function goCalToday() {
  calAnchorDate = todayStr();
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  renderCalendar();
}
function selDate(ds) { openDayDetail(ds); }

// ── Day detail popup ──────────────────────────────────────────
function openDayDetail(dateStr) {
  const d = D();
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const wdays  = ['日','月','火','水','木','金','土'];
  const dt = new Date(dateStr + 'T00:00:00');
  const titleStr = `${dt.getMonth()+1}月${dt.getDate()}日（${wdays[dt.getDay()]}）`;

  const tasks    = d.tasks.filter(x => x.scheduledDate === dateStr && x.type !== 'divider').sort((a,b)=>(a.order||0)-(b.order||0));
  const done     = tasks.filter(t => t.status === 'completed');
  const pending  = tasks.filter(t => t.status !== 'completed');
  const review   = (d.reviews||[]).find(r => r.date === dateStr);
  const totalH   = done.reduce((s, t) => s + (t.actualHours ?? t.estimatedHours ?? 0), 0);

  const taskLine = t => {
    const proj = t.projectId ? d.projects.find(p=>p.id===t.projectId) : null;
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px">
      <span style="color:var(--green-500);flex-shrink:0">${t.status==='completed'?'✅':'○'}</span>
      <span style="flex:1">${esc(t.title)}</span>
      ${proj ? `<span style="font-size:10px;padding:1px 6px;border-radius:100px;background:${proj.color}20;color:${proj.color};font-weight:600">${esc(proj.name)}</span>` : ''}
      <span style="font-size:11px;color:var(--gray-400);flex-shrink:0">${t.actualHours ? _fmtH(t.actualHours) : _fmtHorDash(t.estimatedHours)}</span>
    </div>`;
  };

  const statsHtml = `<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">
    合計 ${_fmtH(totalH)} &nbsp;·&nbsp; 完了 ${done.length}/${tasks.length}件${review ? ` &nbsp;·&nbsp; ★ ${review.score}/100` : ''}
  </div>`;

  const doneHtml  = done.length  ? `<div style="font-size:11px;font-weight:600;color:var(--gray-400);margin:8px 0 4px">✓ 完了（${done.length}件）</div>${done.map(taskLine).join('')}`  : '';
  const pendHtml  = pending.length ? `<div style="font-size:11px;font-weight:600;color:var(--gray-400);margin:8px 0 4px">未完了（${pending.length}件）</div>${pending.map(taskLine).join('')}` : '';
  const memoHtml  = review?.reviewMemo ? `<div style="margin-top:12px;font-size:12px;color:var(--gray-600);background:var(--gray-50);border-radius:7px;padding:8px 12px"><span style="font-weight:600">振り返りメモ</span><div style="margin-top:4px;white-space:pre-wrap">${esc(review.reviewMemo)}</div></div>` : '';

  document.getElementById('cal-day-popup-title').textContent = titleStr + ' のタスク';
  document.getElementById('cal-day-popup-content').innerHTML = tasks.length
    ? statsHtml + doneHtml + pendHtml + memoHtml
    : `<div style="color:var(--gray-400);font-size:13px;text-align:center;padding:16px">タスクなし</div>${memoHtml}`;
  document.getElementById('cal-day-popup').style.display = 'flex';
}
function closeDayDetail() {
  document.getElementById('cal-day-popup').style.display = 'none';
}

function renderReviewRecurring() {
  const el = document.getElementById('review-recurring-card'); if (!el) return;
  const d = D();
  const templates = d.recurringTemplates || [];
  const DN = ['日','月','火','水','木','金','土'];
  const freqLabel = rec => {
    if (!rec) return '';
    switch (rec.frequency) {
      case 'daily':    return '毎日';
      case 'weekdays': return '平日';
      case 'weekly':   return `毎週${(rec.days||[]).map(i=>DN[i]).join('')}`;
      case 'biweekly': return `隔週${(rec.days||[]).map(i=>DN[i]).join('')}`;
      case 'monthly':  return '毎月';
      default: return rec.frequency;
    }
  };

  const rows = templates.map(tmpl => {
    const proj = tmpl.projectId ? d.projects.find(p=>p.id===tmpl.projectId) : null;
    const instances = d.tasks.filter(t => t.recurringId === tmpl.id);
    const doneCount = instances.filter(t => t.status === 'completed').length;
    const freq = freqLabel(tmpl.recurring);
    const startDate = tmpl.recurring?.startDate || null;
    return `
      <div class="review-rec-row">
        <span class="review-freq-badge">🔁 ${esc(freq)}</span>
        <span class="review-rec-title">${esc(tmpl.title)}</span>
        ${proj ? `<span style="font-size:10px;padding:1px 6px;border-radius:100px;background:${proj.color}20;color:${proj.color};font-weight:600">${esc(proj.name)}</span>` : ''}
        <span class="review-rec-meta">${startDate ? `開始 ${startDate} · ` : ''}完了 ${doneCount}回</span>
        <button class="btn btn-outline btn-sm" onclick="openRecurringTemplateEdit('${tmpl.id}')" style="flex-shrink:0">✎</button>
        <button class="btn btn-outline btn-sm" onclick="deleteRecurringTemplate('${tmpl.id}')" style="color:var(--red-500,#ef4444);flex-shrink:0">×</button>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="review-section-hdr">
      <h3>🔁 繰り返しタスク（${templates.length}件）</h3>
    </div>
    ${templates.length
      ? rows
      : `<div style="color:var(--gray-400);font-size:13px;padding:8px 0">繰り返しタスクがありません。タスク編集モーダル（✎）から設定できます。</div>`
    }`;
}

function deleteRecurringTemplate(tmplId) {
  if (!confirm('このテンプレートと今日以降のすべての未完了繰り返しを削除しますか？\n（完了済みは保持されます）')) return;
  const d = D();
  const today = todayStr();
  d.recurringTemplates = (d.recurringTemplates||[]).filter(t => t.id !== tmplId);
  d.tasks = d.tasks.filter(t => {
    if (t.recurringId !== tmplId) return true;          // 無関係なタスクは保持
    if (t.status === 'completed') return true;           // 完了済みは保持
    if (t.scheduledDate && t.scheduledDate < today) return true;  // 過去の未完了は保持
    return false;                                        // 今日以降の未完了を削除
  });
  commit();
  renderReviewRecurring();
}

function handleSettingsDragStart(e, type, id) {

function handleSettingsDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  _settingsDragType = null;
  _settingsDragId   = null;
}
function handleSettingsDragOver(e, type, id) {
  if (_settingsDragType !== type) return;
  e.preventDefault();
  e.stopPropagation();
  const rect = e.currentTarget.getBoundingClientRect();
  _settingsDragAfter = e.clientY > rect.top + rect.height / 2;
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  e.currentTarget.classList.add(_settingsDragAfter ? 'drag-insert-after' : 'drag-insert-before');
}
function handleSettingsDrop(e, type, targetId) {
  e.preventDefault();
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  if (!_settingsDragId || _settingsDragId === targetId || _settingsDragType !== type) return;
  const d = D();
  const arr = type === 'worktype' ? d.workTypes : d.projects;
  const fromIdx = arr.findIndex(x => x.id === _settingsDragId);
  if (fromIdx === -1) return;
  const [item] = arr.splice(fromIdx, 1);       // 元の位置から取り出す
  let insertIdx = arr.findIndex(x => x.id === targetId);
  if (insertIdx === -1) insertIdx = arr.length;
  if (_settingsDragAfter) insertIdx++;
  arr.splice(insertIdx, 0, item);              // ターゲットの前/後に挿入
  commit();
}

// ============================================================
// GCAL PHASE 2 — カレンダー設定・インポート・重複チェック
// ============================================================

/* ③ 重複チェック */

// 同義語グループ（先頭が正規形、残りが表記揺れ）
const _DUP_SYNONYMS = (() => {
  const raw = [
    ['静止画', 'still', 'スチル', 'スチール'],
    ['動画', 'movie', 'video', 'ムービー', 'ビデオ'],
    ['ミーティング', '打ち合わせ', 'うちあわせ', 'イメージ合わせ', 'イメージあわせ',
     '認識合わせ', '認識あわせ', '相談', '会議', 'mtg', 'meeting'],
  ];
  const bn = s => s.normalize('NFKC').toLowerCase()
    .replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
  return raw.map(g => g.map(bn));
})();

function _normForDup(s) {
  let r = s.trim().normalize('NFKC').toLowerCase()
            .replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
  for (const group of _DUP_SYNONYMS) {
    const canonical = group[0];
    for (const v of group.slice(1)) {
      if (v) r = r.split(v).join(canonical);
    }
  }
  return r;
}

function _levenshteinSimilarity(a, b) {
  if (a === b) return 1;
  const la = a.length, lb = b.length;
  if (!la || !lb) return 0;
  let prev = Array.from({length: lb + 1}, (_, i) => i);
  for (let i = 1; i <= la; i++) {
    const curr = [i];
    for (let j = 1; j <= lb; j++)
      curr[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    prev = curr;
  }
  return 1 - prev[lb] / Math.max(la, lb);
}

// returns {task, reason} | null
// reason: 'exact' | 'contains' | 'similar' | 'overlap'
function findDuplicateTask(title, scheduledDate, evStartMin, evEndMin) {
  if (!title.trim()) return null;
  const a = _normForDup(title);
  const allSameDay = D().tasks.filter(t =>
    t.scheduledDate === scheduledDate &&
    t.type !== 'divider'
  );
  // 1st pass: 完全一致は done 含め全タスクを対象に
  for (const task of allSameDay) {
    const b = _normForDup(task.title);
    if (a === b) {
      const isDone = task.status === 'done' || task.status === 'completed';
      return { task, reason: isDone ? 'done-exact' : 'exact' };
    }
  }
  // 2nd pass: 類似・時間重複は active タスクのみ
  const active = allSameDay.filter(t => t.status !== 'done' && t.status !== 'completed');
  for (const task of active) {
    const b = _normForDup(task.title);
    const minLen = Math.min(a.length, b.length);
    if (minLen >= 4 && (a.includes(b) || b.includes(a))) return { task, reason: 'contains' };
    if (minLen >= 4 && _levenshteinSimilarity(a, b) >= 0.8) return { task, reason: 'similar' };
    if (evStartMin != null && evEndMin != null && task.startTime && task.endTime) {
      const [sh, sm] = task.startTime.split(':').map(Number);
      const [eh, em] = task.endTime.split(':').map(Number);
      if (evStartMin < (eh * 60 + em) && evEndMin > (sh * 60 + sm))
        return { task, reason: 'overlap' };
    }
  }
  return null;
}

// GCalイベントタイトルからプロジェクト・作業種類を推定する。
// workType推定はデフォルトworkTypesのid（'meeting'/'coding'/'design'/'document'）を前提にしており、
// ユーザーがデフォルトworkTypeを削除・再作成した場合は推定されない（idがgenId()になるため）。
function _predictGCalFields(title) {
  const lc = title.toLowerCase();

  // workType推定: キーワード優先マッチ（上から順に評価）
  let workType = null;
  const KW = {
    meeting:  ['mtg','ミーティング','会議','連絡会','打合せ','打ち合わせ','朝会','定例','面談'],
    coding:   ['コーディング','実装','開発','プログラム','coding','デバッグ'],
    design:   ['デザイン','design'],
    document: ['ドキュメント','文書','仕様書','資料'],
  };
  for (const [wt, kws] of Object.entries(KW)) {
    if (kws.some(k => lc.includes(k))) { workType = wt; break; }
  }
  if (workType && !D().workTypes.find(w => w.id === workType)) workType = null;

  // projectId推定①: プロジェクト名がタイトルに含まれる
  let projectId = null;
  for (const p of D().projects) {
    if (lc.includes(p.name.toLowerCase())) { projectId = p.id; break; }
  }

  // projectId推定②（①未確定時）: 既存タスクのタイトル前半一致 → 多数決
  // タイトルが短すぎる（4文字未満）場合は誤マッチを防ぐためスキップ
  if (!projectId && D().projects.length > 0) {
    const prefix = lc.slice(0, Math.max(4, Math.floor(lc.length / 2)));
    if (prefix.length >= 4) {
      const cnt = {};
      for (const t of D().tasks) {
        if (!t.projectId || !t.title) continue;
        if (t.title.toLowerCase().includes(prefix)) {
          cnt[t.projectId] = (cnt[t.projectId] || 0) + 1;
        }
      }
      const top = Object.entries(cnt).sort((a, b) => b[1] - a[1])[0];
      // 削除済みプロジェクトIDが返らないよう現在のprojectsに存在するか確認
      if (top && D().projects.find(p => p.id === top[0])) projectId = top[0];
    }
  }

  return { projectId, workType };
}

function openGCalImportModal(evId) {
  const evs = _gcalEventsCache[heroAnchorDate] || [];
  const ev = evs.find(e => e.id === evId);
  if (!ev) return;
  _gcalImportEv = ev;

  const dtStart = new Date(ev.start?.dateTime || (ev.start?.date + 'T00:00:00'));
  const dtEnd   = new Date(ev.end?.dateTime   || (ev.end?.date   + 'T00:00:00'));
  const startTime = ev.start?.dateTime ? `${pad(dtStart.getHours())}:${pad(dtStart.getMinutes())}` : '終日';
  const endTime   = ev.end?.dateTime   ? `${pad(dtEnd.getHours())}:${pad(dtEnd.getMinutes())}`   : '';
  const estH = ev.start?.dateTime ? Math.round((dtEnd - dtStart) / 360000) / 10 : 0;

  const titleInput = document.getElementById('gcal-import-title');
  titleInput.value = ev.summary || '';
  titleInput.oninput = () => _updateGCalImportDupWarn();

  // プロジェクト select 動的生成
  const projSel = document.getElementById('gcal-import-project');
  projSel.innerHTML = '<option value="">なし</option>' +
    D().projects.map(p => `<option value="${esc(p.id)}">${esc(p.name)}</option>`).join('');

  // 作業種類 select 動的生成
  const wtSel = document.getElementById('gcal-import-worktype');
  wtSel.innerHTML = '<option value="">なし</option>' +
    D().workTypes.map(w => `<option value="${esc(w.id)}">${esc(w.label)}</option>`).join('');

  // タイトルから推定して初期値セット（モーダルを開くたびに上書き）
  const _predicted = _predictGCalFields(ev.summary || '');
  projSel.value = _predicted.projectId || '';
  wtSel.value   = _predicted.workType  || '';

  document.getElementById('gcal-import-meta').innerHTML =
    `日付: ${heroAnchorDate}　開始: ${startTime}　終了: ${endTime}　所要時間: ${estH}h`;

  _updateGCalImportDupWarn();

  const modal = document.getElementById('gcal-import-modal');
  modal.style.display = 'flex';
}

}

function _updateGCalImportDupWarn() {
  const title = document.getElementById('gcal-import-title')?.value || '';
  const warn = document.getElementById('gcal-import-dup-warn');
  if (!warn) return;
  let evStartMin = null, evEndMin = null;
  if (_gcalImportEv?.start?.dateTime) {
    const dtS = new Date(_gcalImportEv.start.dateTime);
    const dtE = new Date(_gcalImportEv.end.dateTime);
    evStartMin = dtS.getHours() * 60 + dtS.getMinutes();
    evEndMin   = dtE.getHours() * 60 + dtE.getMinutes();
  }
  const dup = findDuplicateTask(title, heroAnchorDate, evStartMin, evEndMin);
  if (!dup) { warn.style.display = 'none'; return; }
  const msgs = { exact: '同名のタスクが既に存在', 'done-exact': '完了済みタスクが同名で存在', contains: '類似タスクが既に存在', similar: '類似タスクが既に存在', overlap: '同時間帯のタスクが存在' };
  warn.textContent = `⚠ 「${dup.task.title}」と重複の可能性（${msgs[dup.reason]}）`;
  warn.style.display = 'block';
}

function confirmGCalImport() {
  const ev = _gcalImportEv;
  if (!ev) return;
  const title = document.getElementById('gcal-import-title').value.trim();
  if (!title) return;

  const dtStart = new Date(ev.start?.dateTime || (ev.start?.date + 'T00:00:00'));
  const dtEnd   = new Date(ev.end?.dateTime   || (ev.end?.date   + 'T00:00:00'));

  const startH = dtStart.getHours() * 60 + dtStart.getMinutes();
  const endH   = dtEnd.getHours()   * 60 + dtEnd.getMinutes();
  const TL_START_M = 7 * 60;
  const TL_END_M   = 23 * 60;

  const startTime = (ev.start?.dateTime && startH >= TL_START_M)
    ? `${pad(dtStart.getHours())}:${pad(dtStart.getMinutes())}` : null;
  const endTime   = (ev.end?.dateTime && endH <= TL_END_M)
    ? `${pad(dtEnd.getHours())}:${pad(dtEnd.getMinutes())}` : null;
  // 終日イベント（ev.start.dateTimeなし）は所要時間が取得できないため null（未設定）にする。
  // 0にすると importGCalTask の `?? null` で保持されてしまい 0:00 表示になってしまう。
  const estH = ev.start?.dateTime
    ? Math.round((dtEnd - dtStart) / 360000) / 10 : null;

  importGCalTask({
    title,
    scheduledDate: heroAnchorDate,
    startTime,
    endTime,
    estimatedHours: estH,
    projectId: document.getElementById('gcal-import-project').value || null,
    workType:  document.getElementById('gcal-import-worktype').value  || null,
  });

  closeGCalImportModal();
}

// ============================================================
// REVIEW MODAL  (3-step: 振り返り → スコア → 今日の計画)
// ============================================================
let _reviewDate = null;
let _reviewMemo  = '';
let _reviewStep  = 1;

function _fmtH(h) {
  const m = Math.round(h * 60), hh = Math.floor(m / 60), mm = m % 60;
  return `${hh}:${String(mm).padStart(2, '0')}`;
} // 0→"0:00"  0.5→"0:30"  1→"1:00"  1.5→"1:30"  7.75→"7:45"
const _fmtHorDash = h => (h == null) ? '-:--' : _fmtH(h);

function checkReview() {
  const d = D(); const yest = yesterdayStr(); const t = todayStr();
  if (d.lastReviewShown === t) return;
  const yTasks = d.tasks.filter(x => x.scheduledDate === yest && x.type !== 'divider');
  if (!yTasks.length) return;
  if (d.reviews.some(r => r.date === yest)) return;
  openReview(yest);
}

function openReview(date) {
  _reviewDate = date;
  _reviewMemo  = '';
  _reviewStep  = 1;
  _renderReviewStep1();
  document.getElementById('review-modal').style.display = '';
}

// ── Step 1: 振り返り ──────────────────────────────────────
function _renderReviewStep1() {
  _reviewStep = 1;
  const date  = _reviewDate;
  const _isSplit  = t => Array.isArray(t.estimatedHoursByDate) && t.estimatedHoursByDate.length >= 2;
  const _splitDone = t => {
    const idxs = t.estimatedHoursByDate.map((e,i) => e.date === date ? i : -1).filter(i => i >= 0);
    return idxs.length > 0 && idxs.every(i => (t.completedSlots || []).includes(i));
  };
  const _splitH = t => t.estimatedHoursByDate.filter(e => e.date === date).reduce((s,e) => s+e.hours, 0);

  const tasks = D().tasks.filter(x => {
    if (x.type === 'divider') return false;
    if (_isSplit(x)) return x.estimatedHoursByDate.some(e => e.date === date);
    return x.scheduledDate === date;
  });
  const done    = tasks.filter(t => t.status === 'completed' || (_isSplit(t) && _splitDone(t)));
  const pending = tasks.filter(t => !done.includes(t));
  const doneActualH = done.reduce((s,t) => {
    if (_isSplit(t) && t.status !== 'completed') return s + _splitH(t);
    return s + (t.actualHours ?? t.estimatedHours ?? 0);
  }, 0);
  const dt = new Date(date + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'][dt.getDay()];
  const dl = `${dt.getMonth()+1}/${dt.getDate()}（${wd}）`;

  const doneRows = done.map(t => {
    const dH = (_isSplit(t) && t.status !== 'completed') ? _splitH(t) : (t.actualHours ?? t.estimatedHours);
    return `
    <div class="review-task-row">
      <span class="review-check" style="color:var(--green-500)">✓</span>
      <span class="review-title done">${esc(t.title)}</span>
      <span class="review-hours">${_fmtHorDash(dH)}</span>
    </div>`;
  }).join('');

  const pendingRows = pending.map(t => {
    const ph = _isSplit(t) ? _splitH(t) : t.estimatedHours;
    return `
    <div class="review-task-row">
      <span class="review-check" style="color:var(--gray-400)">◯</span>
      <span class="review-title">${esc(t.title)}</span>
      <div class="review-task-actions">
        <input type="number" id="rp-${t.id}" class="review-partial-input no-spin"
          placeholder="${ph ?? ''}" min="0" max="24" step="0.5">
        <span style="font-size:11px;color:var(--gray-400)">h</span>
        <button class="btn btn-outline btn-sm" onclick="reviewMarkDone('${t.id}')">完了</button>
        <button class="btn btn-outline btn-sm" onclick="reviewPostpone('${t.id}')">→今日</button>
        <button class="btn btn-outline btn-sm" style="color:var(--red-500)" onclick="reviewDelete('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('review-modal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${dl} の振り返り</span>
          <span style="font-size:12px;color:var(--gray-500)">合計労働時間 ${_fmtH(doneActualH)}</span>
        </div>
        <div class="modal-body">
          <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">完了済みタスクの確認 &amp; 未完了タスクの処理</div>
          ${done.length ? `<div class="review-section-title">✅ 完了（${done.length}件）</div>${doneRows}` : ''}
          ${pending.length ? `<div class="review-section-title">○ 未完了（${pending.length}件）</div>${pendingRows}` : ''}
          ${!done.length && !pending.length ? `<div class="empty-state">昨日のタスクはありません</div>` : ''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="skipReview()">スキップ</button>
          <button class="btn btn-primary" onclick="_renderReviewStep2()">次へ →</button>
        </div>
      </div>
    </div>`;
}

function reviewMarkDone(taskId) {
  const inp = document.getElementById(`rp-${taskId}`);
  const hours = inp && inp.value !== '' ? parseFloat(inp.value) : null;
  const t = D().tasks.find(x => x.id === taskId);
  if (!t) return;
  if (Array.isArray(t.estimatedHoursByDate) && t.estimatedHoursByDate.length >= 2) {
    if (!t.completedSlots) t.completedSlots = [];
    if (!t.partialHours) t.partialHours = [];
    t.estimatedHoursByDate.forEach((e, i) => {
      if (e.date === _reviewDate && !t.completedSlots.includes(i)) {
        t.completedSlots.push(i);
        const slotH = hours ?? e.hours;
        const ex = t.partialHours.find(p => p.slotIdx === i);
        if (ex) ex.hours = slotH;
        else t.partialHours.push({ date: _reviewDate, hours: slotH, slotIdx: i });
      }
    });
  } else {
    t.status = 'completed';
    t.completedAt = new Date().toISOString();
    t.actualHours = hours ?? t.estimatedHours;
  }
  Storage.save();
  _renderReviewStep1();
}

function reviewPostpone(taskId) {
  const t = D().tasks.find(x => x.id === taskId);
  if (!t) return;
  if (Array.isArray(t.estimatedHoursByDate) && t.estimatedHoursByDate.length >= 2) {
    const today = todayStr();
    t.estimatedHoursByDate = t.estimatedHoursByDate.map(e =>
      e.date === _reviewDate ? { ...e, date: today } : e
    );
    t.estimatedHoursByDate.sort((a, b) => a.date.localeCompare(b.date));
  } else {
    t.scheduledDate = todayStr();
  }
  Storage.save();
  _renderReviewStep1();
}

function reviewDelete(taskId) {
  const d = D();
  d.tasks = d.tasks.filter(x => x.id !== taskId);
  Storage.save();
  _renderReviewStep1();
}

// ── Step 2: スコア ────────────────────────────────────────
function _calcScore(date) {
  const d = D();
  const tasks   = d.tasks.filter(x => x.scheduledDate === date && x.type !== 'divider');
  const done    = tasks.filter(t => t.status === 'completed');
  const totalCount = tasks.length;
  const doneCount  = done.length;

  // 完了率スコア（40点満点）
  const completionRate  = totalCount > 0 ? doneCount / totalCount : 0;
  const completionScore = completionRate * 40;

  // 予実精度スコア（30点満点）
  const withData = done.filter(t => t.actualHours != null && (t.estimatedHours || 0) > 0);
  let predAccuracy = 1.0;
  if (withData.length > 0) {
    const accs = withData.map(t => {
      const a = t.actualHours, e = t.estimatedHours;
      return Math.max(0, 1 - Math.abs(a - e) / Math.max(a, e, 0.1));
    });
    predAccuracy = accs.reduce((s,v) => s + v, 0) / accs.length;
  }
  const predScore = predAccuracy * 30;

  // 稼働時間スコア（30点満点）
  const actualH  = done.reduce((s,t) => s + (t.actualHours ?? 0), 0);
  const past30   = d.reviews.filter(r => r.date < date).slice(-30);
  const baseH    = past30.length > 0
    ? past30.reduce((s,r) => s + (r.actualHours || 0), 0) / past30.length
    : 6;
  const workScore = Math.min(1, actualH / Math.max(baseH, 0.1)) * 30;

  const total = Math.round(completionScore + predScore + workScore);
  const label = total >= 90 ? '優秀！' : total >= 75 ? '良い調子' : total >= 60 ? 'まずまず' : total >= 40 ? 'もう一歩' : '振り返ろう';

  return { score: total, label, completionRate, doneCount, totalCount, actualH, baseH, predAccuracy, doneTasks: done, past30Len: past30.length };
}

function _renderReviewStep2() {
  _reviewStep = 2;
  const date  = _reviewDate;
  const sc    = _calcScore(date);
  const dt    = new Date(date + 'T00:00:00');
  const wd    = ['日','月','火','水','木','金','土'][dt.getDay()];
  const dl    = `${dt.getMonth()+1}/${dt.getDate()}（${wd}）`;
  const diffH = sc.actualH - sc.baseH;
  const diffStr = (diffH >= 0 ? '+' : '-') + _fmtH(Math.abs(diffH));
  const pctStr  = Math.round(sc.predAccuracy * 100) + '%';

  const taskRows = sc.doneTasks.map(t => {
    const a = t.actualHours ?? 0, e = t.estimatedHours ?? 0;
    const diff = a - e;
    const comment = Math.abs(diff) <= 0.25 ? '予定通り' : diff > 0 ? '予定より遅め' : '予定より早め';
    return `
      <div class="score-task-row">
        <span class="score-task-title">${esc(t.title)}</span>
        <span class="score-task-hours">${_fmtH(a)} / ${_fmtH(e)}</span>
        <span class="score-task-comment">${comment}</span>
      </div>`;
  }).join('');

  document.getElementById('review-modal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${dl} のスコア</span>
          <button class="btn btn-icon btn-outline" onclick="skipReview()">✕</button>
        </div>
        <div class="modal-body">
          <div class="score-display">
            <div class="score-number">${sc.score}</div>
            <div class="score-denom">/ 100</div>
            <div class="score-label">${sc.label}</div>
          </div>
          <div class="score-metrics">
            <div class="score-metric">
              <div class="score-metric-value">${sc.doneCount}/${sc.totalCount}</div>
              <div class="score-metric-label">完了率 ${Math.round(sc.completionRate*100)}%</div>
            </div>
            <div class="score-metric">
              <div class="score-metric-value">${_fmtH(sc.actualH)}</div>
              <div class="score-metric-label">作業（${diffStr} vs ${_fmtH(sc.baseH)}）</div>
            </div>
            <div class="score-metric">
              <div class="score-metric-value">${pctStr}</div>
              <div class="score-metric-label">予実精度</div>
            </div>
          </div>
          ${sc.doneTasks.length ? `
            <div class="review-section-title">タスク別の比較</div>
            <div>${taskRows}</div>
          ` : ''}
          <div style="margin-top:16px">
            <div class="review-memo-label">振り返りメモ</div>
            <div class="review-memo-hint">次回の採算に反映されます</div>
            <textarea class="review-memo-area" id="review-memo-input"
              placeholder="想定外の対応が入った、集中できた... など"
              oninput="_reviewMemo=this.value">${esc(_reviewMemo)}</textarea>
          </div>
        </div>
        <div class="modal-footer" style="justify-content:space-between">
          <button class="btn btn-outline" onclick="_renderReviewStep1()">← 戻る</button>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline" onclick="skipReview()">スキップ</button>
            <button class="btn btn-primary" onclick="_saveAndGoStep3()">保存して次へ →</button>
          </div>
        </div>
      </div>
    </div>`;

  // 入力欄にすでに値があれば復元
  const ta = document.getElementById('review-memo-input');
  if (ta && _reviewMemo) ta.value = _reviewMemo;
}

function _saveAndGoStep3() {
  const ta = document.getElementById('review-memo-input');
  if (ta) _reviewMemo = ta.value;
  _renderReviewStep3();
}

// ── Step 3: 今日の計画 ────────────────────────────────────
function _renderReviewStep3() {
  _reviewStep = 3;
  const d       = D();
  const today   = todayStr();
  const todayTasks  = d.tasks.filter(x => x.scheduledDate === today && x.type !== 'divider');
  const todayH      = todayTasks.reduce((s,t) => s + (t.estimatedHours || 0), 0);
  const todayCount  = todayTasks.length;
  const past30      = d.reviews.filter(r => r.date < today).slice(-30);
  const baseH       = past30.length > 0 ? past30.reduce((s,r) => s + (r.actualHours || 0), 0) / past30.length : 6;
  const baseCount   = past30.length > 0 ? past30.reduce((s,r) => s + (r.totalCount || 0), 0) / past30.length : 4;
  const diff        = todayH - baseH;

  let advice;
  if (todayCount === 0) {
    advice = '今日のタスクがまだ登録されていません。新しいタスクを追加してみましょう。';
  } else if (diff > 2) {
    advice = `💡 今日のタスク量（${_fmtH(todayH)}）は基準の${_fmtH(baseH)}よりかなり多めです。優先度を確認してみては？`;
  } else if (diff > 0.5) {
    advice = `💡 今日のタスク量（${_fmtH(todayH)}）は基準の${_fmtH(baseH)}より少し多めです。無理せず進みましょう。`;
  } else if (diff < -2) {
    advice = `💡 今日のタスク量（${_fmtH(todayH)}）は基準の${_fmtH(baseH)}より少なめです。余裕があれば追加してみては？`;
  } else {
    advice = `💡 今日のタスク量（${_fmtH(todayH)}）は基準（${_fmtH(baseH)}）に近く、良いペースです。`;
  }

  document.getElementById('review-modal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">今日の計画</span>
        </div>

          <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">過去の実績から見たアドバイス</div>

              <div class="plan-metric-sub">基準（過去${past30.length > 0 ? past30.length : 0}日）</div>
            </div>

        <div class="modal-footer" style="justify-content:space-between">
          <button class="btn btn-outline" onclick="_renderReviewStep2()">← 戻る</button>
          <button class="btn btn-primary" onclick="_finishReview()">始める</button>

  const partialSum = (t.partialHours || []).reduce((s, p) => s + p.hours, 0);

  if (remaining > 0) {

    if (existingToday) existingToday.hours += remaining;
    else t.partialHours.push({ date: today, hours: remaining });
  }
  t.status = 'completed';
  t.completedAt = new Date().toISOString();
  t.actualHours = actual;
  commit();
  closeCompletionModal();
}

function savePartialHours(taskId, targetDate, slotIdx) {
  const inp = document.getElementById('partial-hours-input');
  const _clampMin = v => Math.min(1440, Math.max(0, parseFloat(v) || 0)); // 0〜1440分にクランプ
  const hours = _clampMin(inp.value) / 60;
  const t = D().tasks.find(x => x.id === taskId); if (!t) return;
  const date = targetDate || todayStr();
  const hasSlotIdx = slotIdx !== undefined && slotIdx !== 'undefined';
  const idx = hasSlotIdx ? Number(slotIdx) : -1;
  const ebdEntry = hasSlotIdx ? (t.estimatedHoursByDate || [])[idx] : (t.estimatedHoursByDate || []).find(e => e.date === date);
  // 予定時間の変更を反映（時:分セレクト → 時間）。ユーザーが触っていなければ未設定(null)等の既存値を保持する。0は無意味→既存値、なければ1hにフォールバック
  if (_partialEstTouched) {
    const newEst = _readDurationPair('partial-est-h', 'partial-est-m');
    const fallback = ebdEntry ? ebdEntry.hours : (t.estimatedHours ?? 1);
    const finalEst = newEst > 0 ? newEst : fallback;
    if (ebdEntry) {
      ebdEntry.hours = finalEst;
      t.estimatedHours = t.estimatedHoursByDate.reduce((s, e) => s + e.hours, 0);
    } else {
      t.estimatedHours = finalEst;
    }
  }
  if (!t.partialHours) t.partialHours = [];
  if (hasSlotIdx) {
    const existing = t.partialHours.find(p => p.slotIdx === idx);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date, hours, slotIdx: idx });
  } else {
    const existing = t.partialHours.find(p => p.date === date);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date, hours });
  }
  // partialHours 記録 → 自動的に in_progress に遷移（pending の場合のみ）
  if (hours > 0 && t.status === 'pending') t.status = 'in_progress';
  commit();
  closeCompletionModal();
}
