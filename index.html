<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Achievia</title>
<style>
:root {
  --bg: #fafaf9;
  --ink: #37352f;
  --ink-soft: #787672;
  --pri-50: #f7f6f3;
  --pri-100: #ebeae6;
  --pri-500: #37352f;
  --pri-600: #2f2d27;
  --gray-50: #fbfbfa;
  --gray-100: #f3f2ef;
  --gray-200: #ebeae6;
  --gray-300: #dcdad5;
  --gray-400: #b8b6b0;
  --gray-500: #9b9a95;
  --gray-600: #787672;
  --gray-700: #5a5956;
  --green-500: #68886e;
  --green-600: #4f6e56;
  --red-500: #b5544d;
  --amber-500: #a88f5c;
  --border: rgba(55,53,47,.09);
  --shadow-sm: 0 1px 2px rgba(15,15,15,.03);
  --shadow-md: 0 1px 2px rgba(15,15,15,.02), 0 2px 8px -2px rgba(15,15,15,.04);
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--gray-50);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  line-height: 1.5;
  font-size: 14px;
  min-height: 100dvh;
}
code { font-family: monospace; font-size: 12px; background: var(--gray-100); padding: 1px 4px; border-radius: 4px; }

/* ── Connect Screen ── */
#connect-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 32px; text-align: center;
}
.connect-logo { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.connect-tagline { font-size: 13px; color: var(--gray-500); margin-bottom: 40px; }
.connect-card {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow-md); padding: 32px; max-width: 360px; width: 100%;
}
.connect-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.connect-card p { font-size: 12px; color: var(--gray-600); margin-bottom: 20px; line-height: 1.7; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100; height: 56px;
  background: rgba(251,251,250,.88); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
}
.header-logo { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; flex-shrink: 0; }
.vault-indicator {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--green-500); font-weight: 500; flex-shrink: 0;
}
.vault-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-500); }
.vault-indicator.off { color: var(--gray-400); }
.vault-indicator.off .vault-dot { background: var(--gray-400); }
.header-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.nav-btn {
  display: flex; align-items: center; gap: 5px; padding: 6px 12px;
  border: none; border-radius: 7px; background: transparent; color: var(--gray-500);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: .15s ease; font-family: inherit;
}
.nav-btn:hover { background: var(--gray-100); color: var(--ink); }
.nav-btn.active { background: var(--gray-100); color: var(--ink); font-weight: 600; }
.nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ── Main ── */
main { max-width: 1100px; margin: 0 auto; padding: 24px 24px 24px; }

/* ── Cards ── */
.card {
  background: #fff; border-radius: var(--radius); border: 1px solid var(--border);
  box-shadow: var(--shadow-sm); padding: 16px; margin-bottom: 12px;
}

/* ── Buttons ── */
.btn {
  border-radius: 7px; font-size: 13px; font-weight: 500; padding: 7px 14px;
  transition: .15s ease; cursor: pointer; border: none; font-family: inherit; line-height: 1;
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--pri-600); }
.btn-outline { background: #fff; color: var(--gray-700); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--gray-100); }
.btn-danger { background: #fff; color: var(--red-500); border: 1px solid rgba(181,84,77,.2); }
.btn-danger:hover { background: rgba(181,84,77,.06); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 6px; }

/* ── Tags ── */
.tag { display: inline-flex; align-items: center; font-size: 10px; border-radius: 4px; padding: 2px 6px; font-weight: 500; white-space: nowrap; }
.tag-hours {
  font-size: 11px; font-weight: 600; color: var(--gray-500);
  cursor: pointer; border: none; font-family: inherit; background: transparent; padding: 0;
  appearance: none; -webkit-appearance: none; transition: color .15s;
}
.tag-hours:hover { color: var(--gray-700); }
/* ステータスバッジ */
.tag-status {
  border-radius: 20px; padding: 2px 7px; font-size: 10px; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit; white-space: nowrap;
  transition: opacity .15s; user-select: none;
}
.tag-status[data-status="pending"]     { background: var(--gray-100); color: var(--gray-500); }
.tag-status[data-status="in_progress"] { background: rgba(59,130,246,.1); color: #3b82f6; }
.tag-status[data-status="waiting"]     { background: rgba(245,158,11,.12); color: #d97706; }
.tag-status[data-status="completed"]   { background: rgba(104,136,110,.15); color: var(--green-600); cursor: default; }
.tag-status:hover { opacity: .75; }
.tag-status[data-status="completed"]:hover { opacity: 1; }

/* ── Tasks Layout ── */
.tasks-layout { display: grid; grid-template-columns: minmax(0,4fr) minmax(0,3fr); gap: 24px; }

/* ── Hero ── */
.hero-date-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.hero-date { font-size: 17px; font-weight: 700; }
.hero-toggle { display: flex; gap: 2px; background: var(--gray-100); border-radius: 7px; padding: 2px; }
.hero-toggle button {
  border: none; background: transparent; padding: 4px 10px; border-radius: 5px;
  font-size: 11px; font-weight: 500; cursor: pointer; color: var(--gray-500);
  transition: .15s; font-family: inherit;
}
.hero-toggle button.active { background: #fff; color: var(--ink); box-shadow: var(--shadow-sm); }
.hero-hours-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.hero-hours-big { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.hero-hours-total { font-size: 14px; font-weight: 500; color: var(--gray-500); }
.hero-sep { color: var(--gray-400); font-size: 14px; }
.hero-pct { font-size: 14px; font-weight: 600; color: var(--gray-600); }
.hero-count { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; }
.progress-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--ink); border-radius: 3px; transition: width .3s ease; }

/* ── Quick Add ── */
.quick-add { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.quick-add-icon {
  width: 28px; height: 28px; border-radius: 50%; background: var(--pri-50);
  color: var(--pri-500); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 20px; line-height: 1; font-weight: 300;
}
.quick-add input {
  flex: 1; border: none; outline: none; font-size: 13px;
  font-family: inherit; background: transparent; color: var(--ink);
}
.quick-add input::placeholder { color: var(--gray-400); }

/* ── Quick Add Shortcut Popover ── */
#qa-popover {
  display: none; position: fixed; z-index: 200;
  background: #fff; border: 1px solid var(--gray-200); border-radius: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,.1); min-width: 180px; max-width: 260px;
  overflow: hidden; padding: 4px 0;
}
.qa-popover-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 12px;
  cursor: pointer; font-size: 13px; color: var(--ink); transition: background .1s;
}
.qa-popover-item.active { background: var(--gray-50); }
.qa-popover-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.qa-popover-hint { font-size: 11px; color: var(--gray-400); margin-left: auto; }
/* ── Quick Add Chips ── */
#qa-chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 14px 8px 52px; }
#qa-chips:empty { display: none; }
.qa-chip {
  display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px 2px 6px;
  background: var(--gray-100); border-radius: 10px; font-size: 11px; color: var(--gray-600);
}
.qa-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.qa-chip-remove {
  background: none; border: none; padding: 0 0 0 2px; cursor: pointer;
  color: var(--gray-400); font-size: 12px; line-height: 1;
}
.qa-chip-remove:hover { color: var(--ink); }

/* ── Task Row ── */
.task-row {
  display: flex; align-items: center; gap: 6px;
  animation: fadeIn .2s ease; position: relative;
}
.task-card {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: #fff; border: 1px solid var(--border); border-radius: 8px;
  flex: 1; min-width: 0; box-shadow: var(--shadow-sm);
  transition: background .15s, border-color .15s; position: relative;
}
.task-card:hover { background: var(--gray-50); border-color: var(--gray-200); }
.task-time { display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; min-width: 72px; padding-right: 14px; }
.drag-handle { color: var(--gray-300); cursor: grab; font-size: 14px; flex-shrink: 0; user-select: none; letter-spacing: -2px; }
.task-check {
  width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--gray-300);
  flex-shrink: 0; cursor: pointer; transition: .15s; display: flex; align-items: center;
  justify-content: center; background: transparent; padding: 0;
}
.task-check.done { background: var(--green-500); border-color: var(--green-500); }
.task-check svg { display: none; width: 10px; height: 10px; }
.task-check.done svg { display: block; }
.task-title-wrap { flex: 1; min-width: 0; overflow: hidden; }
.task-title {
  font-size: 13px; cursor: text; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.task-title.done { text-decoration: line-through; color: var(--gray-400); }
.task-title input {
  width: 100%; border: none; outline: none; font-size: 13px;
  font-family: inherit; background: transparent; color: var(--ink);
}
.task-tags { display: flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: nowrap; margin-left: auto; }
.task-actions {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; gap: 1px;
  opacity: 0; transition: opacity .15s;
  background: #fff; border-radius: 6px; padding: 2px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.task-card:hover .task-actions { opacity: 1; }
.task-card:hover .task-tags { margin-right: 80px; }
.task-action-btn {
  width: 26px; height: 26px; border: none; background: transparent; color: var(--gray-400);
  cursor: pointer; border-radius: 5px; display: flex; align-items: center;
  justify-content: center; transition: background .1s, color .1s; flex-shrink: 0; padding: 0;
}
.task-action-btn:hover { background: var(--gray-100); color: var(--gray-700); }
.task-action-btn.danger:hover { background: rgba(181,84,77,.08); color: var(--red-500); }

/* ── Task Edit Modal ── */
.em-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.em-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.em-field label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .4px; }
.em-field input[type=text], .em-field input[type=date], .em-field textarea, .em-field select {
  border: 1px solid var(--gray-200); border-radius: 7px; padding: 7px 10px; font-size: 13px;
  font-family: inherit; color: var(--ink); outline: none; transition: border-color .15s; background: #fff;
}
.em-field input:focus, .em-field textarea:focus, .em-field select:focus { border-color: var(--pri-400); }
.em-field textarea { resize: none; min-height: 56px; }
.em-field input:disabled { background: var(--gray-50); color: var(--gray-400); }
#em-recurring-settings { margin-top: 10px; padding: 10px 12px; background: var(--gray-50); border-radius: 8px; }
.em-day-btns { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.em-day-btn {
  width: 30px; height: 30px; border: 1px solid var(--gray-200); border-radius: 6px;
  cursor: pointer; font-size: 12px; background: #fff; color: var(--gray-600); transition: .1s;
}
.em-day-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── Task Inline Edit ── */
.task-row.editing { align-items: flex-start; }
.task-row.editing .task-card { align-items: flex-start; }
.task-title-input {
  width: 100%; border: none; outline: none; font-size: 13px;
  font-family: inherit; background: transparent; color: var(--ink); padding: 0;
}
.task-memo-edit {
  display: block; width: 100%; border: none; outline: none;
  font-size: 12px; font-family: inherit; background: transparent;
  color: var(--gray-600); resize: none; margin-top: 3px; padding: 0; line-height: 1.5;
}
.task-memo-preview {
  font-size: 11px; color: var(--gray-400); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: text;
}

/* ── Date Section ── */
.date-section { margin-top: 0; }
.date-section-header {
  display: flex; align-items: center; gap: 8px; padding: 6px 14px;
  cursor: pointer; font-size: 12px; font-weight: 600; color: var(--gray-600);
  user-select: none;
}
.date-section-header:hover { color: var(--ink); }
.section-toggle { font-size: 9px; transition: transform .15s; display: inline-block; }
.section-toggle.closed { transform: rotate(-90deg); }
.section-rule { flex: 1; height: 1px; background: var(--gray-200); margin: 0 4px; }
.past-section { margin-bottom: 4px; }
.past-section-header {
  display: flex; align-items: center; gap: 8px; padding: 4px 14px;
  cursor: pointer; user-select: none; color: var(--gray-400);
}
.past-section-header:hover { color: var(--gray-600); }

/* ── Timeline ── */
.timeline-wrap { position: relative; padding-left: 52px; min-height: 700px; }
.timeline-hours { position: absolute; left: 0; top: 0; width: 44px; }
.timeline-hour-label {
  height: 50px; font-size: 11px; color: var(--gray-500);
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding-right: 8px; padding-top: 2px;
}
.timeline-grid { position: relative; }
.timeline-grid-line { height: 50px; border-top: 1px solid var(--gray-100); }
.timeline-task {
  position: absolute; left: 4px; right: 4px; background: var(--ink); color: #fff;
  border-radius: 8px; padding: 6px 10px; font-size: 12px; overflow: hidden; min-height: 24px;
}

/* ── Notes Panel ── */
.notes-panel {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; height: calc(100dvh - 104px); position: sticky; top: 72px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
}
.notes-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.notes-header h3 { font-size: 13px; font-weight: 600; }
.notes-count { font-size: 11px; color: var(--gray-500); }
.notes-add { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.notes-add textarea {
  width: 100%; border: 1px solid var(--gray-200); border-radius: 8px;
  padding: 8px 10px; font-size: 12px; font-family: inherit; resize: none;
  outline: none; color: var(--ink); min-height: 72px; transition: border-color .15s;
}
.notes-add textarea:focus { border-color: var(--gray-400); }
.notes-add-footer { display: flex; align-items: center; gap: 8px; }
.notes-add-footer select {
  flex: 1; border: 1px solid var(--border); border-radius: 7px; padding: 5px 8px;
  font-size: 12px; font-family: inherit; background: #fff; color: var(--ink); outline: none;
}
.notes-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
.note-card { position: relative; }
.note-card.drag-insert-before::before {
  content: ''; position: absolute; left: 0; right: 0; top: -4px; height: 2px;
  background: var(--green-500); border-radius: 1px; z-index: 10; pointer-events: none;
}
.note-card.drag-insert-after::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -4px; height: 2px;
  background: var(--green-500); border-radius: 1px; z-index: 10; pointer-events: none;
}
.note-card {
  border: 1px solid var(--gray-100); border-radius: 8px;
  padding: 8px 10px; cursor: pointer; transition: border-color .15s;
}
.note-card:hover { border-color: var(--gray-300); }
.note-preview { font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
.note-meta { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--gray-500); flex-wrap: wrap; }
.note-expanded textarea {
  width: 100%; border: none; outline: none; font-size: 12px;
  font-family: inherit; resize: none; background: transparent; color: var(--ink); min-height: 80px;
}
.note-actions {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--gray-100);
}

/* ── Calendar ── */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-title { font-size: 15px; font-weight: 600; }
.cal-nav { display: flex; gap: 4px; }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--gray-100); border: 1px solid var(--gray-100);
  border-radius: 8px; overflow: hidden; margin-bottom: 16px;
}
.cal-weekday { background: var(--gray-50); padding: 6px; text-align: center; font-size: 11px; font-weight: 600; color: var(--gray-500); }
.cal-cell {
  background: #fff; padding: 6px; display: flex; flex-direction: column;
  cursor: pointer; transition: background .15s; min-height: 64px;
}
.cal-cell:hover { background: var(--gray-50); }
.cal-cell.today { background: var(--pri-50); }
.cal-cell.selected { background: var(--pri-100); }
.cal-cell.other-month .cal-day-num { color: var(--gray-400); }
.cal-day-num { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.cal-dot-row { display: flex; gap: 2px; flex-wrap: wrap; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gray-400); flex-shrink: 0; }
.cal-dot.done { background: var(--green-500); }
.cal-count { font-size: 9px; color: var(--gray-500); margin-top: 1px; }
.cal-selected-tasks { margin-top: 16px; }
.cal-selected-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--gray-600); }
/* Calendar view buttons */
.cal-view-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.cal-view-btn { padding: 3px 8px; font-size: 11px; font-weight: 500; border: 1px solid var(--gray-200); border-radius: 5px; background: #fff; cursor: pointer; color: var(--gray-600); transition: all .15s; }
.cal-view-btn:hover { background: var(--gray-50); }
.cal-view-btn.active { background: var(--pri-600); border-color: var(--pri-600); color: #fff; }
.cal-score { font-size: 9px; color: #f59e0b; margin-top: 1px; font-weight: 600; }
/* Day view */
.cal-day-view { padding: 4px 0; }
.cal-day-review { font-size: 12px; color: var(--gray-600); background: var(--gray-50); border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
.cal-day-memo { margin-top: 4px; font-size: 11px; color: var(--gray-500); white-space: pre-wrap; }
.cal-day-task { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
.cal-day-task:last-child { border-bottom: none; }
.cal-day-task-status { color: var(--green-500); flex-shrink: 0; }
.cal-day-task-title { flex: 1; color: var(--ink); }
.cal-day-task-h { font-size: 11px; color: var(--gray-400); flex-shrink: 0; }
/* Review tab sections */
.review-section { margin-top: 16px; }
.review-section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.review-section-hdr h3 { font-size: 14px; font-weight: 600; margin: 0; }
/* Project cards */
.review-proj-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
@media (max-width: 900px) { .review-proj-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 540px) { .review-proj-grid { grid-template-columns: 1fr; } }
.review-proj-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px; background: #fff; transition: border-color .15s, box-shadow .15s; }
.review-proj-card:hover { border-color: var(--gray-300); box-shadow: var(--shadow-sm); }
.review-proj-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.review-proj-stats { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; }
.review-proj-bar-wrap { background: var(--gray-100); border-radius: 100px; height: 4px; overflow: hidden; margin-bottom: 8px; }
.review-proj-bar-fill { height: 100%; border-radius: 100px; background: var(--pri-500); transition: width .3s; }
.review-proj-note { font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.review-proj-actions { display: flex; gap: 4px; justify-content: flex-end; margin-top: 10px; }
/* Recurring templates */
.review-rec-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--gray-100); }
.review-rec-row:last-child { border-bottom: none; }
.review-rec-title { flex: 1; font-size: 13px; font-weight: 500; color: var(--ink); }
.review-rec-meta { font-size: 11px; color: var(--gray-400); }
.review-freq-badge { display: inline-flex; align-items: center; padding: 1px 7px; border-radius: 100px; font-size: 10px; font-weight: 600; background: #eef2ff; color: #4f46e5; margin-right: 4px; }
/* Project new modal color picker */
.proj-color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.proj-color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 0 0 0 transparent; transition: box-shadow .15s, transform .1s; flex-shrink: 0; }
.proj-color-swatch:hover { transform: scale(1.15); }
.proj-color-swatch.selected { box-shadow: 0 0 0 2.5px #fff, 0 0 0 4.5px var(--ink); transform: scale(1.1); }
#pm-color-hex:focus { border-color: var(--gray-400); outline: none; }
#pm-color-hex::placeholder { color: var(--gray-400); }

/* ── Settings ── */
.settings-section h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.settings-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gray-100); border-top: 2px solid transparent; }
.settings-item:last-of-type { border-bottom: none; }
.settings-item.drag-insert-before { border-top: 2px solid var(--green-500) !important; }
.settings-item.drag-insert-after  { border-bottom: 2px solid var(--green-500) !important; }
.settings-drag-handle { color: var(--gray-300); cursor: grab; font-size: 13px; flex-shrink: 0; user-select: none; letter-spacing: -2px; }
.settings-drag-handle:active { cursor: grabbing; }
.color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.settings-item-label { flex: 1; font-size: 13px; }
.settings-edit-btn { width: 28px; padding: 0; display: flex; align-items: center; justify-content: center; }
.settings-add-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
.settings-add-row input[type="text"] {
  flex: 1; border: 1px solid var(--border); border-radius: 7px;
  padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; background: #fff;
}
.settings-add-row input[type="text"]:focus { border-color: var(--gray-400); }
.settings-add-row input[type="color"] {
  width: 36px; height: 36px; border: 1px solid var(--border);
  border-radius: 7px; padding: 3px; cursor: pointer; background: #fff;
}
.data-stats { display: flex; gap: 24px; margin-bottom: 16px; }
.stat-item { text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--gray-500); }

/* ── Review Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,15,15,.4); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn .2s ease;
}
.modal {
  background: #fff; border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(15,15,15,.14); width: 100%; max-width: 440px;
  max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 14px; font-weight: 600; }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.modal-summary { font-size: 13px; color: var(--gray-600); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-100); }
.review-task-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--gray-50); font-size: 13px; }
.review-task-row:last-child { border-bottom: none; }
.review-check { flex-shrink: 0; width: 16px; text-align: center; }
.review-title { flex: 1; color: var(--gray-600); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.review-title.done { text-decoration: line-through; color: var(--gray-400); }
.review-hours { font-size: 11px; color: var(--gray-500); flex-shrink: 0; }
.review-section-title { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 6px; }
.review-section-title:first-child { margin-top: 0; }
.review-task-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.review-partial-input { width: 44px; border: 1px solid var(--gray-200); border-radius: 5px; padding: 3px 5px; font-size: 12px; text-align: center; outline: none; font-family: inherit; }
.review-partial-input:focus { border-color: var(--gray-400); }
.score-display { text-align: center; padding: 16px 0 12px; }
.score-number { font-size: 72px; font-weight: 700; color: var(--ink); line-height: 1; letter-spacing: -2px; }
.score-denom { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.score-label { font-size: 14px; color: var(--gray-500); margin-top: 6px; font-weight: 500; }
.score-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0; }
.score-metric { text-align: center; padding: 10px 6px; background: var(--gray-50); border-radius: 8px; }
.score-metric-value { font-size: 15px; font-weight: 700; color: var(--ink); }
.score-metric-label { font-size: 10px; color: var(--gray-500); margin-top: 3px; line-height: 1.3; }
.score-task-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--gray-50); font-size: 12px; }
.score-task-row:last-child { border-bottom: none; }
.score-task-title { flex: 1; color: var(--ink); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-task-hours { color: var(--gray-500); flex-shrink: 0; }
.score-task-comment { font-size: 10px; color: var(--gray-400); flex-shrink: 0; }
.review-memo-label { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; }
.review-memo-hint { font-size: 11px; color: var(--gray-400); margin-bottom: 8px; }
.review-memo-area { width: 100%; border: 1px solid var(--gray-200); border-radius: 7px; padding: 8px 10px; font-size: 12px; font-family: inherit; resize: none; outline: none; color: var(--ink); min-height: 60px; box-sizing: border-box; transition: border-color .15s; }
.review-memo-area:focus { border-color: var(--gray-400); }
.plan-advice { background: var(--gray-50); border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px; color: var(--ink); line-height: 1.6; }
.plan-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.plan-metric { text-align: center; padding: 14px 8px; background: var(--gray-50); border-radius: 8px; }
.plan-metric-value { font-size: 17px; font-weight: 700; color: var(--ink); }
.plan-metric-sub { font-size: 11px; color: var(--gray-500); margin-top: 4px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.modal-close { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--gray-500); transition: background .1s, color .1s; padding: 0; }
.modal-close:hover { background: var(--gray-100); color: var(--ink); }

/* ── Empty State ── */
.empty-state { padding: 32px; text-align: center; color: var(--gray-400); font-size: 13px; }

/* ── Drag & Drop Indicators (TASKDOCK style: independent horizontal line) ── */
.task-row.drag-insert-before::before {
  content: ''; position: absolute; left: 0; right: 0; top: -2px; height: 2px;
  background: var(--green-500); border-radius: 1px; z-index: 10; pointer-events: none;
}
.task-row.drag-insert-after::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px;
  background: var(--green-500); border-radius: 1px; z-index: 10; pointer-events: none;
}
/* タイムラインはインク色背景なので明るい緑で上下に太線 */
.timeline-task.drag-insert-before { box-shadow: 0 -3px 0 0 #4ade80 !important; }
.timeline-task.drag-insert-after  { box-shadow: 0 3px 0 0 #4ade80 !important; }
/* ドロップゾーン（セクション背景）のハイライト */
.drag-over-zone {
  background: rgba(104,136,110,.1) !important;
  outline: 2px dashed var(--green-500);
  outline-offset: -3px;
  border-radius: 6px;
}
/* クロスパネルD&D：いつかやるセクションのハイライト */
.someday-section.drag-target {
  outline: 2px dashed var(--green-500);
  outline-offset: -3px;
  border-radius: 8px;
  background: rgba(104,136,110,.07);
  transition: background .1s;
}

/* ── Recurring show-more button ── */
.recurring-more-btn {
  width: 100%; padding: 7px 12px; border: 1px dashed var(--gray-300);
  border-radius: 7px; background: transparent; cursor: pointer;
  font-size: 12px; color: var(--gray-500); font-family: inherit;
  transition: border-color .15s, color .15s, background .15s;
}
.recurring-more-btn:hover {
  border-color: var(--pri-400); color: var(--pri-600);
  background: rgba(var(--pri-rgb, 99,138,107), .04);
}

/* ── Bottom Nav ── */
.bottom-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 58px;
  background: rgba(251,251,250,.93); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); z-index: 100;
  align-items: center; justify-content: space-around;
}
.bottom-nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  border: none; background: transparent; color: var(--gray-500);
  font-size: 10px; font-weight: 500; cursor: pointer; padding: 6px 20px;
  border-radius: 8px; transition: .15s; font-family: inherit;
}
.bottom-nav-btn svg { width: 20px; height: 20px; }
.bottom-nav-btn.active { color: var(--ink); font-weight: 600; }

/* ── Divider ── */
.task-gap { height: 1px; position: relative; cursor: default; background: transparent; }
.divider-row + .task-gap { background: transparent; }
.task-gap:has(+ .divider-row) { background: transparent; }
.task-gap:hover .gap-insert-btn { opacity: 1; }
.gap-insert-btn {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  opacity: 0; transition: opacity .15s, background .15s;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gray-200); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-500); font-size: 14px; line-height: 1; padding: 0;
}
.gap-insert-btn:hover { background: var(--gray-300); color: var(--gray-700); }
.divider-row {
  display: flex; align-items: center; padding: 0 6px 0 14px;
  height: 24px; position: relative; cursor: grab;
  background: var(--gray-50);
}
.divider-row:active { cursor: grabbing; }
.divider-row .drag-handle { opacity: 0; transition: opacity .15s; margin-right: 6px; }
.divider-row:hover .drag-handle { opacity: 1; }
.divider-line { flex: 1; height: 1px; background: var(--gray-300); transition: background .15s; }
.divider-row:hover .divider-line { background: var(--gray-400); }
.divider-delete {
  opacity: 0; flex-shrink: 0; margin-left: 6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gray-200); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-500); font-size: 13px; line-height: 1;
  transition: opacity .15s, background .15s, color .15s;
}
.divider-row:hover .divider-delete { opacity: 1; }
.divider-delete:hover { background: var(--gray-300); color: var(--gray-700); }
.divider-row.drag-insert-before { box-shadow: 0 -2px 0 0 var(--green-500) !important; }
.divider-row.drag-insert-after  { box-shadow: 0 2px 0 0 var(--green-500) !important; }

/* ── Number input: center, no spinner ── */
input[type="number"].no-spin { -moz-appearance: textfield; text-align: center; }
input[type="number"].no-spin::-webkit-inner-spin-button,
input[type="number"].no-spin::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── Responsive ── */
@media (max-width: 768px) {
  .header-nav { display: none; }
  .bottom-nav { display: flex; }
  main { padding: 16px 16px 72px; }
  .tasks-layout { grid-template-columns: 1fr; }
  .notes-panel { height: auto; position: static; }
  .cal-cell { min-height: 44px; }
}
@media (max-width: 480px) {
  header { padding: 0 16px; gap: 8px; }
  .hero-hours-big { font-size: 22px; }
  .task-tags { display: none; }
}

/* ── Task List Card ── */
#task-list-card { padding: 0; overflow: visible; background: transparent; border: none; box-shadow: none; }

/* ── Note Icon Buttons ── */
.note-icon-btn {
  width: 22px; height: 22px; border: none; background: transparent; color: var(--gray-400);
  cursor: pointer; border-radius: 4px; display: inline-flex; align-items: center;
  justify-content: center; transition: background .1s, color .1s, opacity .15s; flex-shrink: 0; padding: 0;
  opacity: 0;
}
.note-icon-btn:hover { background: var(--gray-100); color: var(--gray-700); }
.note-icon-btn.danger:hover { background: rgba(181,84,77,.08); color: var(--red-500); }
.note-card:hover .note-icon-btn,
.note-card.expanded .note-icon-btn { opacity: 1; }
.note-meta-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--gray-500); }
.note-meta-spacer { flex: 1; }
.note-body-preview { font-size: 11px; color: var(--gray-400); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Someday Section (right panel) ── */
/* ── 分割タスク サマリー ── */
.multiday-section {
  flex-shrink: 0; background: #fff;
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 8px;
}
.multiday-header {
  display: flex; align-items: center; gap: 6px; padding: 10px 12px;
  cursor: pointer; font-size: 12px; font-weight: 600; color: var(--gray-600);
  user-select: none;
}
.multiday-header:hover { color: var(--ink); }
.multiday-card {
  border-top: 1px solid var(--gray-100); padding: 8px 12px;
}
.multiday-card-row {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
}
.multiday-title { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.multiday-meta { color: var(--gray-500); white-space: nowrap; font-size: 11px; }
.multiday-bar-wrap { width: 100%; height: 4px; background: var(--gray-100); border-radius: 2px; margin-top: 6px; }
.multiday-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
.multiday-status {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600; white-space: nowrap; flex-shrink: 0;
}
.multiday-status.todo   { background: var(--gray-100); color: var(--gray-500); }
.multiday-status.doing  { background: rgba(245,158,11,.12); color: #b45309; }
.multiday-status.done   { background: rgba(104,136,110,.15); color: var(--green); }
.multiday-toggle { font-size: 10px; color: var(--gray-400); cursor: pointer; flex-shrink: 0; transition: transform .15s; }
.multiday-toggle.open { transform: rotate(180deg); }
.multiday-days { padding: 6px 0 2px; display: flex; flex-direction: column; gap: 4px; }
.multiday-day-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray-600); padding: 0 2px; }
.multiday-day-date { width: 72px; flex-shrink: 0; }
.multiday-day-hours { flex: 1; }
.multiday-day-status { font-size: 12px; }

.someday-section {
  flex-shrink: 0; background: #fff;
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
.someday-header {
  display: flex; align-items: center; gap: 6px; padding: 10px 12px;
  cursor: pointer; font-size: 12px; font-weight: 600; color: var(--gray-600);
  user-select: none;
}
.someday-header:hover { color: var(--ink); }
.someday-add {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-top: 1px solid var(--gray-100);
}
.someday-add input {
  flex: 1; border: 1px solid var(--gray-200); border-radius: 7px;
  padding: 5px 8px; font-size: 12px; font-family: inherit; outline: none;
  background: #fff; color: var(--ink);
}
.someday-add input:focus { border-color: var(--gray-400); }
.someday-task-list { }
/* someday task rows use the same .task-row style */
</style>
</head>
<body>

<!-- Connect Screen -->
<div id="connect-screen" style="display:none">
  <div class="connect-logo">Achievia</div>
  <div class="connect-tagline">タスクと時間を、あなたのペースで。</div>
  <div class="connect-card">
    <h2 id="connect-title">Vaultに接続</h2>
    <p id="connect-desc">ObsidianのVaultフォルダを選択してください。タスクデータはVault内の <code>Achievia/data.json</code> に保存されます。</p>
    <button class="btn btn-primary" id="connect-btn" style="width:100%">フォルダを選択して接続</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <header>
    <div class="header-logo">Achievia</div>
    <div class="vault-indicator off" id="vault-indicator">
      <div class="vault-dot"></div>
      <span id="vault-label">未接続</span>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-tab="tasks" onclick="switchTab('tasks')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
        Tasks
      </button>
      <button class="nav-btn" data-tab="review" onclick="switchTab('review')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 2v2M11 2v2M2 7h12"/></svg>
        Review
      </button>
      <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M3.5 12.5l.7-.7M11.8 4.2l.7-.7"/></svg>
        Settings
      </button>
    </nav>
  </header>

  <main>
    <!-- Tasks Tab -->
    <div id="tab-tasks">
      <div class="tasks-layout">
        <div class="tasks-left">
          <div class="card" id="hero-card"></div>
          <div class="card" style="padding:0;overflow:hidden">
            <div class="quick-add">
              <div class="quick-add-icon" onclick="openNewTaskModal()" style="cursor:pointer" title="タスクを追加">+</div>
              <input type="text" id="quick-add-input" placeholder="タスクを追加… (: プロジェクト  # 作業種類  ! 日付  ^ 優先度)" autocomplete="off" oninput="handleQaInput(event)">
              <button class="btn btn-primary btn-sm" onclick="handleQuickAdd()">追加</button>
            </div>
            <div id="qa-chips"></div>
          <div id="quick-add-detail" style="display:none;padding:0 14px 10px 52px">
            <textarea id="quick-add-notes" placeholder="詳細メモ…" rows="2"
              style="width:100%;border:1px solid var(--gray-200);border-radius:7px;padding:6px 10px;font-size:12px;font-family:inherit;resize:none;outline:none;color:var(--ink)"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey&&!event.isComposing){event.preventDefault();handleQuickAdd()}"></textarea>
          </div>
          </div>
          <div id="qa-popover"></div>
          <div class="card" id="task-list-card">
            <div id="task-list"></div>
          </div>
        </div>
        <div class="tasks-right">
          <div id="multiday-panel"></div>
          <div class="notes-panel" id="notes-panel"
            ondragover="handleCrossPanelDragOver(event)"
            ondrop="handleCrossPanelDrop(event)"></div>
        </div>
      </div>
    </div>

    <!-- Review Tab -->
    <div id="tab-review" style="display:none">
      <div class="card" id="calendar-card"></div>
      <div class="card review-section" id="review-projects-card"></div>
      <div class="card review-section" id="review-recurring-card"></div>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" style="display:none">
      <div class="card" id="settings-general"></div>
      <div class="card" id="settings-worktypes"></div>
      <div class="card" id="settings-projects"></div>
      <div class="card" id="settings-data"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="bottom-nav-btn active" data-tab="tasks" onclick="switchTab('tasks')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
      Tasks
    </button>
    <button class="bottom-nav-btn" data-tab="review" onclick="switchTab('review')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M5 2v2M11 2v2M2 7h12"/></svg>

<script>
// ============================================================
// GOOGLE DRIVE CONFIG
// ============================================================
const GDRIVE_CLIENT_ID = '908988415825-6h504mcnfj5udoie4vsn5prbqi2btosq.apps.googleusercontent.com';

// ============================================================
// STORAGE ABSTRACTION — Capacitor-ready
// すべてのファイル操作はこのオブジェクト経由。
// FSA API → Capacitor Filesystem に差し替える場合は
// connect / load / save / _generateDailyMD のみ変更すればよい。
// ============================================================
const Storage = {
  _vaultHandle: null,
  _data: null,

  _defaultData() {
    return {
      tasks: [],
      projects: [],
      workTypes: [
        { id: 'coding',   label: 'コーディング', color: '#3b82f6', showStatus: true },
        { id: 'design',   label: 'デザイン',     color: '#8b5cf6', showStatus: true },
        { id: 'meeting',  label: 'ミーティング', color: '#f59e0b', showStatus: false },
        { id: 'document', label: 'ドキュメント', color: '#6366f1', showStatus: true },
        { id: 'other',    label: 'その他',       color: '#64748b', showStatus: true },
      ],
      notes: [],
      reviews: [],
      recurringTemplates: [],
      tags: [],
      lastReviewShown: null,
      workHoursPerDay: 8,
    };
  },

  /* ---- IndexedDB helpers for handle persistence ---- */
  async _openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('achievia_v1', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e);
    });
  },
  async _storeHandle(handle) {
    const db = await this._openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readwrite');
      tx.objectStore('handles').put(handle, 'vault');
      tx.oncomplete = res; tx.onerror = rej;
    });
  },
  async _loadHandle() {
    const db = await this._openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('vault');
      req.onsuccess = e => res(e.target.result); req.onerror = rej;
    });
  },

  /* ---- Connection ---- */
  async tryRestore() {
    if (!this._hasFSA) {
      this._mode = 'gdrive';
      const fileId = localStorage.getItem('achievia_gdrive_file_id');
      if (fileId) { this._gdriveFileId = fileId; return 'gdrive-restore'; }
      return 'gdrive-new';
    }
    this._mode = 'fsa';
    try {
      const handle = await this._loadHandle();
      if (!handle) return false;
      const perm = await handle.queryPermission({ mode: 'readwrite' });
      if (perm === 'granted') { this._vaultHandle = handle; await this.load(); return true; }
      if (perm === 'prompt')  { this._vaultHandle = handle; return 'prompt'; }
    } catch {}
    return false;
  },
  async requestPermission() {
    try {
      const perm = await this._vaultHandle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') { await this.load(); return true; }
    } catch {}
    return false;
  },
  async connect() {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    this._vaultHandle = handle;
    await this._storeHandle(handle);
    await this.load();
  },

  /* ---- Directory helper ---- */
  async _getDir(parts) {
    let dir = this._vaultHandle;
    for (const p of parts) dir = await dir.getDirectoryHandle(p, { create: true });
    return dir;
  },

  /* ---- Load / Save ---- */
  async load() {
    let dir;
    try {
      dir = await this._getDir(['Achievia']);
    } catch (e) {
      // Vault フォルダにアクセスできない（ハンドルが無効・移動済み等）
      // tryRestore() の catch に伝播させ、接続画面を表示させる
      this._data = this._defaultData();
      throw e;
    }
    try {
      const fh = await dir.getFileHandle('data.json');
      const text = await (await fh.getFile()).text();
      const parsed = JSON.parse(text);
      this._data = { ...this._defaultData(), ...parsed };
    } catch {
      // data.json が存在しない（初回接続）→ デフォルトデータで初期化
      this._data = this._defaultData();
    }
  },
  async save() {
    if (this._mode === 'gdrive') { await this.saveGDrive(); return; }
    if (!this._vaultHandle) return;
    try {
      const dir = await this._getDir(['Achievia']);
      const fh = await dir.getFileHandle('data.json', { create: true });
      const w = await fh.createWritable();
      await w.write(JSON.stringify(this._data, null, 2));
      await w.close();
      await this._generateDailyMD();
    } catch (e) { console.error('Achievia save error:', e); }
  },

  /* ---- daily/YYYY-MM-DD.md 自動生成 ---- */
  async _generateDailyMD() {
    const t = todayStr();
    const tasks = this._data.tasks;
    const todayTasks = tasks.filter(x => x.scheduledDate === t);
    const done = todayTasks.filter(x => x.status === 'completed');
    const pending = todayTasks.filter(x => x.status !== 'completed');
    const totalH = todayTasks.reduce((s, x) => s + (x.estimatedHours || 0), 0);
    const doneH  = done.reduce((s, x) => s + (x.estimatedHours || 0), 0);

    let md = `---\ndate: ${t}\ntype: taskdock-daily\n---\n\n`;
    md += `# ${t} タスクサマリー\n\n`;
    md += `## 完了（${done.length}件 / ${doneH}h）\n`;
    for (const task of done) {
      const proj = this._data.projects.find(p => p.id === task.projectId);
      md += `- [x] ${task.title}${proj ? `（${proj.name}）` : ''} — 予定 ${task.estimatedHours}h\n`;
    }
    md += `\n## 未完了\n`;
    for (const task of pending) {
      const proj = this._data.projects.find(p => p.id === task.projectId);
      md += `- [ ] ${task.title}${proj ? `（${proj.name}）` : ''} — 予定 ${task.estimatedHours}h${task.scheduledDate ? `、期日 ${task.scheduledDate}` : ''}\n`;
    }
    md += `\n合計: ${doneH}h / ${totalH}h 完了\n`;

    const dir = await this._getDir(['Achievia', 'daily']);
    const fh = await dir.getFileHandle(`${t}.md`, { create: true });
    const w = await fh.createWritable();
    await w.write(md); await w.close();
  },

  get data() { return this._data; },
  get connected() {
    if (this._mode === 'gdrive') return !!this._gdriveFileId && !!this._data;
    return !!this._vaultHandle && !!this._data;
  },
  get vaultName() {
    if (this._mode === 'gdrive') return 'Google Drive';
    return this._vaultHandle ? this._vaultHandle.name : '';
  },

  // ============================================================
  // GOOGLE DRIVE MODE
  // ============================================================
  _mode: null,
  _gdriveToken: null,
  _gdriveFileId: null,

  get _hasFSA() {
    // Android / iOS はローカル Vault にアクセスできないため GDrive モードを使う
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) return false;
    // GitHub Pages 上では全デバイスで GDrive API に統一（FSA は file:// / localhost のみ）
    if (window.location.hostname.endsWith('github.io')) return false;
    return typeof window.showDirectoryPicker === 'function';
  },

  /* GIS ライブラリを必要時だけ動的ロード */
  async _ensureGIS() {
    if (window.google?.accounts?.oauth2) return;
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://accounts.google.com/gsi/client';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  },

  /* OAuth アクセストークン取得 */
  async _gToken(prompt = '') {
    await this._ensureGIS();
    return new Promise((resolve, reject) => {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive',
        callback: r => r.error ? reject(new Error(r.error)) : resolve(r.access_token),
        error_callback: e => reject(new Error(e.type || 'GIS error')),
      });
      tc.requestAccessToken({ prompt });
    });
  },

  /* Drive REST API 汎用リクエスト */
  async _gReq(method, path, params, body) {
    const url = new URL('https://www.googleapis.com/drive/v3/' + path);
    if (params) Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const opts = { method, headers: { Authorization: `Bearer ${this._gdriveToken}` } };
    if (body !== undefined) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const r = await fetch(url, opts);
    if (!r.ok) { const t = await r.text().catch(() => r.status); throw new Error(`Drive ${r.status}: ${t}`); }
    return r.status === 204 ? null : r.json();
  },

  /* ファイル本体を取得 */
  async _gMedia(fileId) {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${this._gdriveToken}` },
    });
    if (!r.ok) throw new Error(`Drive media ${r.status}`);
    return r.json();
  },

  /* ファイル本体を上書き */
  async _gUpload(fileId, data) {
    const r = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: 'PATCH', headers: { Authorization: `Bearer ${this._gdriveToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(data) }
    );
    if (!r.ok) throw new Error(`Drive upload ${r.status}`);
    return r.json();
  },

  /* 新規ファイルをメタデータ+コンテンツで作成 */
  async _gCreateFile(name, parentId, initData) {
    const boundary = 'achievia_mp';
    const meta = JSON.stringify({ name, mimeType: 'application/json', parents: [parentId] });
    const content = JSON.stringify(initData);
    const mp = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${this._gdriveToken}`, 'Content-Type': `multipart/related; boundary="${boundary}"` },
      body: mp,
    });
    if (!r.ok) throw new Error(`Drive create ${r.status}`);
    return r.json();
  },

  /* Drive 上の Achievia/data.json を見つけるか新規作成 */
  async _gFindOrCreate() {
    // キャッシュ済み fileId を検証
    const cached = localStorage.getItem('achievia_gdrive_file_id');
    if (cached) {
      try {
        await this._gReq('GET', `files/${cached}`, { fields: 'id' });
        this._gdriveFileId = cached; return;
      } catch { localStorage.removeItem('achievia_gdrive_file_id'); }
    }

    const cachedFolder = localStorage.getItem('achievia_gdrive_folder_id');

    // キャッシュ済みフォルダ＋全フォルダ検索を行い最大サイズの data.json を返す
    const _search = async () => {
      // キャッシュされたフォルダを優先検索
      if (cachedFolder) {
        try {
          const dRes = await this._gReq('GET', 'files', {
            q: `name='data.json' and '${cachedFolder}' in parents and trashed=false`,
            fields: 'files(id,size)',
          });
          if (dRes.files.length) {
            const best = dRes.files.reduce((a, b) => parseInt(b.size||0,10) > parseInt(a.size||0,10) ? b : a);
            return { fileId: best.id, folderId: cachedFolder };
          }
        } catch {}
      }
      // 全 Achievia フォルダを検索
      const fRes = await this._gReq('GET', 'files', {
        q: `name='Achievia' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
        fields: 'files(id)',
      });
      let bestId = null, bestSize = -1, bestFolderId = null;
      for (const folder of fRes.files) {
        const dRes = await this._gReq('GET', 'files', {
          q: `name='data.json' and '${folder.id}' in parents and trashed=false`,
          fields: 'files(id,size)',
        });
        for (const f of dRes.files) {
          const sz = parseInt(f.size || '0', 10);
          if (sz > bestSize) { bestSize = sz; bestId = f.id; bestFolderId = folder.id; }
        }
      }
      return bestId ? { fileId: bestId, folderId: bestFolderId } : { folders: fRes.files };
    };

    // 1回目の検索
    let result = await _search();
    // 見つからなければ3秒待ってリトライ（Drive インデックス遅延対応）
    if (!result.fileId) {
      await new Promise(r => setTimeout(r, 3000));
      result = await _search();
    }

    if (result.fileId) {
      this._gdriveFileId = result.fileId;
      localStorage.setItem('achievia_gdrive_file_id', result.fileId);
      localStorage.setItem('achievia_gdrive_folder_id', result.folderId);
      return;
    }

    // それでも見つからない場合のみ新規作成
    let folderId = cachedFolder;
    if (!folderId) {
      const existingFolders = result.folders || [];
      if (existingFolders.length) {
        folderId = existingFolders[0].id;
      } else {
        const folder = await this._gReq('POST', 'files', null, {
          name: 'Achievia', mimeType: 'application/vnd.google-apps.folder',
        });
        folderId = folder.id;
      }
    }
    const file = await this._gCreateFile('data.json', folderId, this._defaultData());
    this._gdriveFileId = file.id;
    localStorage.setItem('achievia_gdrive_file_id', file.id);
    localStorage.setItem('achievia_gdrive_folder_id', folderId);
  },

  /* 初回接続（アカウント選択あり） */
  async connectGDrive() {
    this._gdriveToken = await this._gToken('select_account');
    await this._gFindOrCreate();
    await this.loadGDrive();
  },

  /* 再接続（既存セッションを優先） */
  async reconnectGDrive() {
    this._gdriveToken = await this._gToken('');
    await this._gFindOrCreate();
    await this.loadGDrive();
  },

  async loadGDrive() {
    try {
      const parsed = await this._gMedia(this._gdriveFileId);
      this._data = { ...this._defaultData(), ...parsed };
    } catch { this._data = this._defaultData(); }
  },

  async saveGDrive() {
    if (!this._gdriveFileId || !this._gdriveToken) return;
    try {
      this._data.lastSavedAt = new Date().toISOString();
      await this._gUpload(this._gdriveFileId, this._data);
    } catch (e) {
      console.error('GDrive save error:', e);
      if (String(e.message).includes('401')) _showGDriveExpiredToast();
    }
  },

  /* 切断（別ファイルへの切り替え時などに使用） */
  disconnectGDrive() {
    localStorage.removeItem('achievia_gdrive_file_id');
    localStorage.removeItem('achievia_gdrive_folder_id');
    this._gdriveFileId = null; this._gdriveToken = null; this._data = null;
  },
};

// ============================================================
// UTILS
// ============================================================
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function tomorrowStr() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function postponeTask(id) {
  const d = D();
  const task = d.tasks.find(x => x.id === id);
  if (!task) return;
  task.scheduledDate = tomorrowStr();
  commit();
}

function dateLabel(str) {
  const d = new Date(str + 'T00:00:00');
  const t = todayStr();
  const diff = Math.round((d - new Date(t + 'T00:00:00')) / 86400000);
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  const base = `${d.getMonth()+1}/${d.getDate()}（${wd}）`;
  if (diff === 0) return `今日 ${base}`;
  if (diff === 1) return `明日 ${base}`;
  if (diff === 2) return `明後日 ${base}`;
  if (diff === -1) return `昨日 ${base}`;
  return base;
}
function fmtDate(iso) {
  const d = new Date(iso);
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${h}:${m}`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// UI STATE
// ============================================================
let viewMode = 'list';
let activeTab = 'tasks';
let collapsedSections = {};
let editingTaskId = null;
let expandedNoteId = null;
const _multidayExpanded = new Set();
let _noteEditContent = {}; // 展開ノートの未コミット編集内容
let _noteOutsideClickFn = null; // 外側クリックハンドラ
let dragTaskId = null;
let dragSlotDate = null; // スロットのドラッグ元日付
let dragSlotIdx = -1;    // スロットのドラッグ元インデックス（同日複数スロット対応）
let dragInsertAfter = false;
let _lastDragTaskId = null;   // task-row上でホバーした最後のタスクID（セクション側では触らない）
let _lastDragTaskDate = null; // 同上の日付（セクション日付との一致確認に使用）
let _lastDragSlotIdx = -1;    // 同上のスロットインデックス（_entryIdx, -1 = 通常タスク）
let recurringWindow = 7;  // 繰り返しインスタンス生成の日数（表示ウィンドウ以上を保つ）
let _futureWindow = 3;   // 未来タスクの表示日数（今日の翌日から何日後まで）
let _futureShown  = true;  // 今後のタスクセクションの展開状態
let _pastShown    = false; // 過去タスクセクションの展開状態
let _pastWindow   = 3;   // 過去タスクの表示日数（今日から何日前まで）
let _settingsDragType  = null;  // 'worktype' | 'project'
let _settingsDragId    = null;
let _settingsDragAfter = false;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelected = null;
let calView = 'month';          // 'month'|'2week'|'week'|'workday'|'3day'|'day'
let calAnchorDate = todayStr(); // YYYY-MM-DD — anchor for non-month views
let _projEditId = null;         // null=new, string=edit existing project

// ============================================================
// ACTIONS
// ============================================================
function D() { return Storage.data; }

async function commit() { await Storage.save(); render(); }

function addTask(title, date) {
  if (!title.trim()) return;
  const d = D();
  d.tasks.push({
    id: genId(), title: title.trim(), projectId: null, workType: null,
    estimatedHours: 1, actualHours: null, partialHours: [], status: 'pending', tagIds: [],
    scheduledDate: date || todayStr(), priority: 'medium', notes: '',
    order: d.tasks.length, completedAt: null, createdAt: new Date().toISOString(),
  });
  commit();
}
function toggleSlotComplete(taskId, slotIdx) {
  const task = D().tasks.find(x => x.id === taskId); if (!task) return;
  if (!task.completedSlots) task.completedSlots = [];
  const isChecked = task.completedSlots.includes(slotIdx);
  if (isChecked) {
    task.completedSlots = task.completedSlots.filter(i => i !== slotIdx);
    commit();
  } else {
    const slotDate = (task.estimatedHoursByDate || [])[slotIdx]?.date;
    if (slotDate) openSlotCompleteModal(taskId, slotDate, slotIdx);
  }
}

function openSlotCompleteModal(taskId, slotDate, slotIdx) {

function saveSlotComplete(taskId, slotDate, slotIdx) {
  const inp = document.getElementById('slot-hours-input');
  const estSel = document.getElementById('slot-est-select');
  const hours = parseFloat(inp.value) || 0;
  const t = D().tasks.find(x => x.id === taskId); if (!t) return;
  // partialHours を slotIdx で更新（同日複数スロット対応）
  if (!t.partialHours) t.partialHours = [];
  const slotIdxNum = (slotIdx !== undefined && slotIdx !== '') ? Number(slotIdx) : -1;
  if (slotIdxNum >= 0) {
    const existing = t.partialHours.find(p => p.slotIdx === slotIdxNum);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date: slotDate, hours, slotIdx: slotIdxNum });
  } else {
    const existing = t.partialHours.find(p => p.date === slotDate);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date: slotDate, hours });
  }
  // estimatedHoursByDate を更新
  if (estSel) {
    const newEst = parseFloat(estSel.value);
    const ebdEntry = slotIdxNum >= 0 ? (t.estimatedHoursByDate || [])[slotIdxNum] : (t.estimatedHoursByDate || []).find(e => e.date === slotDate);
    if (ebdEntry) {
      ebdEntry.hours = newEst;
      t.estimatedHours = t.estimatedHoursByDate.reduce((s, e) => s + e.hours, 0);
    }
  }
  // completedSlots（インデックス）に追加
  if (!t.completedSlots) t.completedSlots = [];
  const idx = (slotIdx !== undefined && slotIdx !== '') ? Number(slotIdx)
    : (t.estimatedHoursByDate || []).findIndex(e => e.date === slotDate);
  if (idx >= 0 && !t.completedSlots.includes(idx)) t.completedSlots.push(idx);
  commit();
  closeCompletionModal();
}

function toggleTaskStatus(id) {
  const t = D().tasks.find(x => x.id === id); if (!t || t.status === 'completed') return;
  const hasPartial = (t.partialHours || []).some(p => p.hours > 0);
  if (hasPartial) {
    // in_progress → waiting → in_progress
    t.status = t.status === 'waiting' ? 'in_progress' : 'waiting';
  } else {
    // pending → in_progress → waiting → pending
    const cycle = { pending: 'in_progress', in_progress: 'waiting', waiting: 'pending' };
    t.status = cycle[t.status] || 'pending';
  }
  commit(); renderTaskList(); renderHero();
}
function toggleTask(id) {

    t.actualHours = null;

    openCompletionModal(id);

}

function deleteSlotOnly(taskId, slotDate, slotIdx) {
  const task = D().tasks.find(x => x.id === taskId); if (!task) return;
  // インデックス指定で1件だけ除去（同日重複があっても1件のみ）
  const ebd = task.estimatedHoursByDate || [];
  const removeIdx = (slotIdx !== undefined && ebd[slotIdx]?.date === slotDate) ? slotIdx : ebd.findIndex(e => e.date === slotDate);
  if (removeIdx >= 0) ebd.splice(removeIdx, 1);
  task.estimatedHoursByDate = ebd;
  task.partialHours = (task.partialHours || []).filter(p => p.date !== slotDate);
  // completedSlots：削除したインデックスを除去し、それより大きいインデックスを1つ詰める
  task.completedSlots = (task.completedSlots || [])
    .filter(i => i !== removeIdx)
    .map(i => i > removeIdx ? i - 1 : i);
  if (ebd.length <= 1) {
    task.estimatedHoursMode = 'total';
    if (ebd.length === 1) { task.estimatedHours = ebd[0].hours; task.scheduledDate = ebd[0].date; }
    task.estimatedHoursByDate = [];
  } else {
    task.estimatedHours = ebd.reduce((s, e) => s + e.hours, 0);
  }
  closeCompletionModal();
  commit();
}

function confirmRecurringDelete(taskId) {
  const mode = document.querySelector('input[name="rdel"]:checked')?.value || 'single';
  const d = D();
  const task = d.tasks.find(t => t.id === taskId);
  if (!task) { closeRecurringDeleteModal(); return; }
  const tmplId = task.recurringId;
  const today = todayStr();

  if (mode === 'single') {
    d.tasks = d.tasks.filter(t => t.id !== taskId);
  } else if (mode === 'future') {
    d.tasks = d.tasks.filter(t => {
      if (t.recurringId !== tmplId) return true;
      if (t.status === 'completed') return true;
      if (t.scheduledDate && t.scheduledDate < today) return true;
      return false;
    });
  } else { // all
    d.tasks = d.tasks.filter(t => t.recurringId !== tmplId);
    d.recurringTemplates = (d.recurringTemplates||[]).filter(t => t.id !== tmplId);
  }
  commit();
  closeRecurringDeleteModal();
  render();
}

// ============================================================
function renderHero() {
  const d = D(); const t = todayStr();
  // 通常タスク（scheduledDate===今日）＋ 複数日タスクで今日がスロットにあるもの
  const todayTasks = d.tasks.filter(x => {
    if (x.type === 'divider') return false;
    const ebd = x.estimatedHoursByDate;
    const isMulti = Array.isArray(ebd) && ebd.length >= 2;
    if (isMulti) return x.status !== 'completed' && ebd.some(e => e.date === t);
    return x.scheduledDate === t;
  });
  const done = todayTasks.filter(x => x.status === 'completed');
  const partialToday = task => {
    const ebd = task.estimatedHoursByDate;
    if (Array.isArray(ebd) && ebd.length >= 2) {
      // 分割タスク：今日が slotDate のスロットの partialHours を slotIdx で合算
      return ebd.reduce((s, entry, idx) => {
        if (entry.date !== t) return s;
        const ph = (task.partialHours || []).find(p => p.slotIdx === idx);
        return s + (ph ? ph.hours : 0);
      }, 0);
    }
    return (task.partialHours || []).filter(p => p.date === t).reduce((s, p) => s + p.hours, 0);
  };
  const estToday = task => {
    const ebd = task.estimatedHoursByDate;
    if (Array.isArray(ebd) && ebd.length >= 2) {
      return ebd.filter(e => e.date === t).reduce((s, e) => s + e.hours, 0);
    }
    if ((task.estimatedHoursMode || 'total') === 'daily') {
      const entry = (ebd || []).find(e => e.date === t);
      return entry ? entry.hours : 0;
    }
    return task.estimatedHours || 0;
  };
  const totalH = D().workHoursPerDay ?? 8;
  // partialHoursベース：完了・未完了問わず今日分のpartialHoursを合算
  const doneH  = todayTasks.reduce((s, x) => s + partialToday(x), 0);
  const pct = totalH === 0 ? 0 : Math.round(doneH / totalH * 100);
  const now = new Date();
  const wd = ['日','月','火','水','木','金','土'][now.getDay()];
  const dl = `${now.getMonth()+1}/${now.getDate()}（${wd}）`;

  document.getElementById('hero-card').innerHTML = `
    <div class="hero-date-row">
      <h2 class="hero-date">${dl}</h2>
      <div class="hero-toggle">
        <button class="${viewMode==='list'?'active':''}" onclick="setView('list')">リスト</button>
        <button class="${viewMode==='timeline'?'active':''}" onclick="setView('timeline')">タイムライン</button>
      </div>
    </div>
    <div class="hero-hours-row">
      <span class="hero-hours-big">${doneH}h</span>
      <span class="hero-hours-total">/ ${totalH}h</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="progress-bar" style="flex:1;margin-bottom:0"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="hero-pct">${pct}%</span>
    </div>
    <div class="hero-count" style="margin-bottom:0">完了 ${done.length} / ${todayTasks.length} 件</div>
  `;
}

function dividerRow(div) {
  return `

      ondragend="handleDragEnd(event)"

      <div class="divider-line"></div>
      <button class="divider-delete" onclick="deleteDivider('${div.id}');event.stopPropagation()" title="削除">×</button>
    </div>`;
}
function gapZone(afterId, dateStr) {
  return `<div class="task-gap"><button class="gap-insert-btn" onclick="addDivider('${afterId}','${dateStr}');event.stopPropagation()" title="区切り線を挿入">+</button></div>`;
}
function renderItems(items, d, dateStr) {
  if (!items.length) return '';
  return items.map((item, i) =>
    (item.type === 'divider' ? dividerRow(item) : taskRow(item, d)) +
    (i < items.length - 1 ? gapZone(item.id, dateStr) : '')
  ).join('');
}
function addDivider(afterId, dateStr) {
  const d = D();
  const date = dateStr || null;
  const inSection = d.tasks.filter(x => (x.scheduledDate || null) === date).sort((a,b) => a.order - b.order);
  const afterIdx = inSection.findIndex(x => x.id === afterId);
  if (afterIdx === -1) return;
  const newDiv = { id: genId(), type: 'divider', scheduledDate: date, order: 0, createdAt: new Date().toISOString() };
  inSection.splice(afterIdx + 1, 0, newDiv);
  inSection.forEach((x, i) => { x.order = i; });
  d.tasks.push(newDiv);
  commit();
}
function deleteDivider(id) {
  const d = D();
  const i = d.tasks.findIndex(x => x.id === id);
  if (i !== -1) { d.tasks.splice(i, 1); commit(); }
}
