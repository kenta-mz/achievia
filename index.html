// ============================================================
// DRAG & DROP
// ============================================================
function handleDragStart(e, taskId, slotDate, slotIdx) {
  // レース対策：「いつかやる」カード（.someday-section 内の .task-row）は
  // renderItems由来でネイティブHTML5 D&D属性（draggable/ondragstart等）も
  // 併せ持つ。timelineビューでは機能2（Pointer-based D&D）が主経路だが、
  // ネイティブD&Dが先に起動すると .someday-section に .drag-target（緑破線）が
  // 居座ったままドロップ不能になる（実機確認済み）。
  // ※ pointerdown時点でcard.draggable=falseにする／dragstartにリスナーを
  //   addEventListenerする等、要素単位での抑止は再描画(render/renderNotes)が
  //   ドラッグ開始までの間に挟まると古いDOMノードにしか効かず「間欠的にNG」と
  //   なることを実機確認済み（.task-rowはinnerHTMLで毎回作り直されるため）。
  // → 再描画に左右されない関数本体（inline属性は再描画毎に新ノードへ
  //   再アタッチされる）でガードするのが唯一確実。
  // timeline以外のビューでは「いつかやる→カレンダーへドロップして日付設定」が
  // ネイティブD&D側の正規の経路のため対象外とする
  // （_doStartSomedayDrag 側の viewMode ガードと同じ判断基準）。
  if (viewMode === 'timeline' && e.currentTarget.closest('.someday-section')) {
    e.preventDefault();
    clearDragIndicators(); // dragend が発火しない場合のグリーン破線残存を防ぐ
    return;
  }
  dragTaskId = taskId;
  dragSlotDate = slotDate || null;
  dragSlotIdx = (slotIdx !== undefined && slotIdx !== '') ? Number(slotIdx) : -1;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
  document.body.classList.add('drag-active');
}
function handleDragEnd(e) {
  e.currentTarget.style.opacity = '';
  clearDragIndicators();
  dragTaskId = null;
  dragSlotDate = null;
  dragSlotIdx = -1;
  _lastDragTaskId = null;
  _lastDragTaskDate = null;
  _lastDragSlotIdx = -1;
  document.body.classList.remove('drag-active');
}
function clearDragIndicators() {
  document.querySelectorAll('.drag-insert-before, .drag-insert-after, .drag-over-zone').forEach(el => {
    el.classList.remove('drag-insert-before', 'drag-insert-after', 'drag-over-zone');
  });
  document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
}
function handleDragOver(e) {
  // タスクD&D以外（Noteドラッグ・外部ファイル等）はガイド線・ゾーンハイライト不要。
  // e.preventDefault() より先に返すことで「ドロップ可」カーソルも出さない。
  if (!dragTaskId) return;
  // 完了タスクをいつかやるエリアにドラッグ中はガイド線・ゾーンハイライトを出さない
  { const _drag = D().tasks.find(x => x.id === dragTaskId);
    if (_drag && _drag.status === 'completed' && e.currentTarget.closest('.someday-section')) {
      clearDragIndicators(); // タスク一覧側に残っているガイド線も消す
      return;
    } }
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const isTaskEl = e.currentTarget.classList.contains('task-row') ||
                   e.currentTarget.classList.contains('timeline-task') ||
                   e.currentTarget.classList.contains('divider-row');
  if (isTaskEl) {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    dragInsertAfter = e.clientY > rect.top + rect.height / 2;
    clearDragIndicators();
    e.currentTarget.classList.add(dragInsertAfter ? 'drag-insert-after' : 'drag-insert-before');
    // セクションドロップ時の挿入位置引き継ぎ用（セクション側では絶対に上書きしない）
    _lastDragTaskId = e.currentTarget.dataset.taskId || null;
    _lastDragTaskDate = e.currentTarget.dataset.taskDate ?? null;
    _lastDragSlotIdx = parseInt(e.currentTarget.dataset.slotIdx ?? '-1');
  } else {
    // タスクのない空セクション・セクション余白へのホバー
    // task-row のガイド線インジケーターはそのまま保持し、zone ハイライトのみ更新
    document.querySelectorAll('.drag-over-zone').forEach(el => el.classList.remove('drag-over-zone'));
    e.currentTarget.classList.add('drag-over-zone');
    // _lastDragTaskId / _lastDragTaskDate は保持（task-row hover のみが更新する）
  }
}
function handleDropOnTask(e, targetTaskId, dateStr, targetSlotIdx) {
  e.preventDefault();
  e.stopPropagation();
  clearDragIndicators();
  if (!dragTaskId) return;
  // 同タスク内スロット並び替え（同一日付のスロット同士のみ → entry.order ベース）
  if (dragTaskId === targetTaskId && dragSlotDate !== null && dragSlotDate === (dateStr || null) && targetSlotIdx >= 0) {
    const d = D();
    const task = d.tasks.find(x => x.id === dragTaskId); if (!task) return;
    const ebd = task.estimatedHoursByDate || [];
    const dragEbdIdx = dragSlotIdx >= 0 ? dragSlotIdx : ebd.findIndex(e2 => e2.date === dragSlotDate);
    // 同日エントリを order でソートした作業リスト
    const sameDayItems = ebd
      .map((en, ei) => ({ en, ei, ord: en.order ?? ei }))
      .filter(({ en }) => en.date === dragSlotDate)
      .sort((a, b) => a.ord - b.ord);
    const fromPos = sameDayItems.findIndex(({ ei }) => ei === dragEbdIdx);
    const toPos   = sameDayItems.findIndex(({ ei }) => ei === targetSlotIdx);
    if (fromPos < 0 || toPos < 0 || fromPos === toPos) return;
    const [moved] = sameDayItems.splice(fromPos, 1);
    const insertAt = dragInsertAfter ? toPos : Math.max(0, toPos - (fromPos < toPos ? 1 : 0));
    sameDayItems.splice(insertAt, 0, moved);
    sameDayItems.forEach(({ en }, pos) => { en.order = pos; }); // entry.order を更新（配列インデックスは変えない）
    commit(); return;
  }
  // 同タスクへのドロップ：スロットのクロス日付移動（dragSlotDate != targetDate）以外はスキップ
  if (dragTaskId === targetTaskId && (!dragSlotDate || dragSlotDate === (dateStr || null))) return;
  const date = dateStr || null;
  const d = D();
  const drag = d.tasks.find(x => x.id === dragTaskId);
  if (!drag) return;
  if (date === null && drag.status === 'completed') return;
  let movedEntry = null;
  if (dragSlotDate && date) {
    movedEntry = (drag.estimatedHoursByDate || []).find(e2 => e2.date === dragSlotDate);

// ── AI Hours Prediction (heuristic) ────────────────────────
function _predictHoursData(title) {
  const d = D();
  const words = title.toLowerCase().split(/[\s　]+/).filter(w => w.length >= 1);
  if (!words.length) return null;

  const completed = d.tasks.filter(t =>
    t.status === 'completed' && t.actualHours && t.actualHours > 0 && !t.recurringId
  );

  const scored = completed.map(t => {
    const tw = t.title.toLowerCase().split(/[\s　]+/);
    const matches = words.filter(w => tw.some(x => x === w || x.includes(w) || w.includes(x))).length;
    return { task: t, score: matches };
  }).filter(x => x.score > 0);

  scored.sort((a, b) => b.score !== a.score
    ? b.score - a.score
    : new Date(b.task.completedAt||0) - new Date(a.task.completedAt||0)
  );

  const top6 = scored.slice(0, 6);
  if (!top6.length) return null;
  const avg = top6.reduce((s, x) => s + x.task.actualHours, 0) / top6.length;
  return { avg: Math.max(0.5, Math.round(avg * 2) / 2), count: top6.length };
}

  const p = _predictHoursData(title);
  return p ? p.avg : null;
}

// ── Keyboard handler ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.isComposing) return;
  const id = e.target.id;
  const isQaInput = id === 'quick-add-input' || id === 'someday-add-input' || id === 'note-input';
  if (!isQaInput) return;

  // Popover navigation (all shortcut-enabled inputs)
  if (_qsTrigger && _qsItems.length) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _qsPopoverIdx = (_qsPopoverIdx + 1) % _qsItems.length;
      _renderQsPopover(); return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      _qsPopoverIdx = (_qsPopoverIdx - 1 + _qsItems.length) % _qsItems.length;
      _renderQsPopover(); return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); _selectQsItem(_qsPopoverIdx); return;
    }
    if (e.key === 'Escape') { _closeQsPopover(); return; }
  }

  if (id === 'quick-add-input') {
    if (e.key === 'Enter' && !e.shiftKey) handleQuickAdd();
    else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); toggleQuickAddDetail(); }
  }
  // note-input and someday-add-input handle Enter via oninput onkeydown attrs in HTML
});
document.addEventListener('click', e => {
  if (!_qsTrigger) return;
  const p = document.getElementById('qa-popover');
  const isShortcutInput = e.target.id === 'quick-add-input' || e.target.id === 'someday-add-input' || e.target.id === 'note-input';
  if (p && !p.contains(e.target) && !isShortcutInput) _closeQsPopover();
});

// RECURRING TASKS ENGINE
// ============================================================
function _recurringLabel(rec) {
  if (!rec) return '';
  const DN = ['日','月','火','水','木','金','土'];
  switch (rec.frequency) {
    case 'daily':    return '毎日';
    case 'weekdays': return '平日';
    case 'weekly':   return '毎週' + (rec.days||[]).map(i=>DN[i]).join('');
    case 'biweekly': return '隔週' + (rec.days||[]).map(i=>DN[i]).join('');
    case 'monthly':  return '毎月';
    default: return '繰り返し';
  }
}

function _shouldOccur(rec, date) {
  if (!rec) return false;
  const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  if (rec.endDate && ds > rec.endDate) return false;
  const dow = date.getDay();
  switch (rec.frequency) {
    case 'daily':    return true;
    case 'weekdays': return dow >= 1 && dow <= 5;
    case 'weekly':
    case 'biweekly': return (rec.days||[]).includes(dow);
    case 'monthly':  return date.getDate() === (rec.startDay || 1);
    default: return false;
  }
}

function refreshRecurringInstances() {
  const d = D();
  if (!d.recurringTemplates) d.recurringTemplates = [];
  if (!d.recurringTemplates.length) return;

  const todayS = todayStr();

  // Remove old pending instances (keep completed ones)
  d.tasks = d.tasks.filter(t =>
    !t.recurringId ||
    t.status === 'completed' ||
    (t.scheduledDate && t.scheduledDate >= todayS)
  );

  const existingSet = new Set(
    d.tasks.filter(t => t.recurringId).map(t => `${t.recurringId}_${t.scheduledDate}`)
  );

  const todayDate = new Date();
  for (const tmpl of d.recurringTemplates) {
    if (!tmpl.recurring) continue;
    for (let i = 0; i <= recurringWindow; i++) {
      const dt = new Date(todayDate);
      dt.setDate(todayDate.getDate() + i);
      const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      const key = `${tmpl.id}_${dateStr}`;
      if (!_shouldOccur(tmpl.recurring, dt) || existingSet.has(key)) continue;
      existingSet.add(key);
      d.tasks.push({
        id: genId(), type: 'task', title: tmpl.title, notes: tmpl.notes || '',
        projectId: tmpl.projectId || null, workType: tmpl.workType || null,
        estimatedHours: tmpl.estimatedHours, actualHours: null,
        partialHours: [], status: 'pending', tagIds: [], scheduledDate: dateStr,
        priority: tmpl.priority || 'medium', recurringId: tmpl.id,
        order: d.tasks.length, completedAt: null, createdAt: new Date().toISOString()
      });
    }
  }
  Storage.save();
}
function showMoreRecurring() {
  recurringWindow += 7;
  refreshRecurringInstances();
  render();
}

function saveEditModal() {
  if (!_editModalId) return;
  const d = D();

  // ── Recurring template edit ───────────────────────────────
  if (_editModalType === 'recurring-template') {
    const tmpl = (d.recurringTemplates || []).find(t => t.id === _editModalId);
    if (!tmpl) { closeEditModal(); return; }
    const title = document.getElementById('em-title')?.value.trim();
    if (title) tmpl.title = title;
    tmpl.projectId     = document.getElementById('em-project')?.value || null;
    tmpl.workType      = document.getElementById('em-worktype')?.value || null;
    tmpl.estimatedHours = parseFloat(document.getElementById('em-hours')?.value || '1');
    const freq      = document.getElementById('em-freq')?.value || 'weekly';
    const days      = ['日','月','火','水','木','金','土']
      .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
      .filter(i => i >= 0);
    const startDate = document.getElementById('em-startdate')?.value || null;
    const endDate   = document.getElementById('em-enddate')?.value || null;
    tmpl.recurring  = { frequency: freq, days, startDate, endDate };
    // 今日以降の未完了インスタンスに反映
    const today = todayStr();
    d.tasks.forEach(t => {
      if (t.recurringId !== tmpl.id) return;
      if (t.status === 'completed') return;
      if (t.scheduledDate && t.scheduledDate < today) return;
      t.title         = tmpl.title;
      t.projectId     = tmpl.projectId;
      t.workType      = tmpl.workType;
      t.estimatedHours = tmpl.estimatedHours;
    });
    commit();
    refreshRecurringInstances();
    closeEditModal();
    render();
    return;
  }

  // ── New task creation ────────────────────────────────────
  if (_editModalId === '__new__') {
    const title = document.getElementById('em-title')?.value.trim();
    if (!title) return;
    const someday = document.getElementById('em-someday')?.checked;
    const scheduledDate = someday ? null : (document.getElementById('em-date')?.value || todayStr());
    const _emMode = document.getElementById('em-hours-total')?.style.display === 'none' ? 'daily' : 'total';
    const _emByDate = _emMode === 'daily' ? _getEmHoursByDate() : [];
    const _tm = _emTotalTime(_emMode, _emByDate, null, true);
    // _tm.hours が null = duration 0:00（未入力 or 明示的にクリア）。
    // 予定時間系コントロールに一度も触れていない(!touched)場合のみ「未入力」とみなし予測を適用する。
    // touched済みでnullなら「あえて未設定」とユーザーが選んだものとして null を保持する（Codex P2対応）。
    // _qsNewTitle（クイック追加引継ぎ）はUIプリセット時点で既に予測適用済みのためdurationが非0表示となり、
    // この分岐自体に到達しない（=従来通り予測値が保存される）。
    const est = (_tm.hours != null) ? _tm.hours
              : (_emEstTouched ? null : _predictedEstOrNull(title));
    const newTask = {
      id: genId(), title,
      notes:          document.getElementById('em-notes')?.value || '',
      projectId:      document.getElementById('em-project')?.value   || null,
      workType:       document.getElementById('em-worktype')?.value  || null,
      priority:       'none',
      estimatedHours: est,
      estimatedHoursMode: _emMode,
      estimatedHoursByDate: _emByDate,
      actualHours: null, partialHours: [], status: 'pending', tagIds: [],
      startTime: _tm.startTime,
      endTime:   _tm.endTime,
      scheduledDate, order: d.tasks.length,
      completedAt: null, createdAt: new Date().toISOString()
    };

    // Handle recurring for new task
    const recurringOn = document.getElementById('em-recurring-toggle')?.checked;
    if (recurringOn) {
      if (!d.recurringTemplates) d.recurringTemplates = [];
      const freq    = document.getElementById('em-freq')?.value || 'weekly';
      const days    = ['日','月','火','水','木','金','土']
        .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
        .filter(i => i >= 0);
      const startDate = document.getElementById('em-startdate')?.value || null;
      const endDate = document.getElementById('em-enddate')?.value || null;
      const tmplId = genId();
      d.recurringTemplates.push({
        id: tmplId, title: newTask.title, notes: newTask.notes,
        projectId: newTask.projectId, workType: newTask.workType,
        estimatedHours: newTask.estimatedHours, priority: newTask.priority,
        recurring: { frequency: freq, days, startDate, endDate }
      });
      newTask.recurringId = tmplId;
    }

    d.tasks.push(newTask);
    _resetQaState();
    // Clear quick-add input if it had a value
    const qaInp = document.getElementById('quick-add-input');
    if (qaInp) qaInp.value = '';
    commit(); closeEditModal();
    if (recurringOn) refreshRecurringInstances();
    return;
  }

  // ── Edit existing task ───────────────────────────────────
  const task = d.tasks.find(t => t.id === _editModalId);
  if (!task) return;

  const title = document.getElementById('em-title')?.value.trim();
  if (title) task.title = title;
  const someday = document.getElementById('em-someday')?.checked;
  task.scheduledDate = someday ? null : (document.getElementById('em-date')?.value || todayStr());
  task.projectId     = document.getElementById('em-project')?.value   || null;
  task.workType      = document.getElementById('em-worktype')?.value  || null;
  const _emMode2 = document.getElementById('em-hours-total')?.style.display === 'none' ? 'daily' : 'total';
  const _emByDate2 = _emMode2 === 'daily' ? _getEmHoursByDate() : [];
  const _tm2 = _emTotalTime(_emMode2, _emByDate2, task.estimatedHours, task.estimatedHours == null);
  task.estimatedHoursMode   = _emMode2;
  task.estimatedHoursByDate = _emByDate2;
  task.estimatedHours = _tm2.hours;
  task.notes         = document.getElementById('em-notes')?.value     || '';
  task.startTime = _tm2.startTime;
  task.endTime   = _tm2.endTime;
  // スロット編集の場合は estimatedHoursByDate[idx] にも反映（合計モードのみ）。
  // 日別モードでは _getEmHoursByDate() が各行の時刻を既に反映済みのため上書きしない
  // （日別の task.startTime/endTime は null のため、上書きするとスロット時刻が消える）
  if (_editModalSlotIdx >= 0 && _emMode2 !== 'daily' && Array.isArray(task.estimatedHoursByDate)) {
    const _slot = task.estimatedHoursByDate[_editModalSlotIdx];
    if (_slot) {
      _slot.startTime = task.startTime;
      _slot.endTime   = task.endTime;
    }
  }
  const newStatus = document.getElementById('em-status')?.value;
  if (newStatus && task.status !== 'completed') task.status = newStatus;

  const recurringOn = document.getElementById('em-recurring-toggle')?.checked;
  if (!d.recurringTemplates) d.recurringTemplates = [];

  if (recurringOn) {
    const freq    = document.getElementById('em-freq')?.value || 'weekly';
    const days    = ['日','月','火','水','木','金','土']
      .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
      .filter(i => i >= 0);
    const startDate = document.getElementById('em-startdate')?.value || null;
    const endDate = document.getElementById('em-enddate')?.value || null;

    if (task.recurringId) {
      const tmpl = d.recurringTemplates.find(t => t.id === task.recurringId);
      if (tmpl) { tmpl.recurring = { frequency: freq, days, startDate, endDate }; tmpl.title = task.title; }
    } else {
      const tmplId = genId();
      d.recurringTemplates.push({
        id: tmplId, title: task.title, notes: task.notes,
        projectId: task.projectId, workType: task.workType,
        estimatedHours: task.estimatedHours, priority: task.priority,
        recurring: { frequency: freq, days, startDate, endDate }
      });
      task.recurringId = tmplId;
    }
    refreshRecurringInstances();
  } else if (task.recurringId) {
    task.recurringId = null; // Remove from recurring without deleting template
  }

  commit(); closeEditModal();
}

// ============================================================
// START TIME / END TIME
// ============================================================

let _emLastEdited = null; // 'estimatedHours' | 'endTime'

// 「時」select の option リストを生成
function _hourOpts(from, to, selectedH) {
  let s = `<option value=""${selectedH==null?' selected':''}>自動</option>`;
  for (let h = from; h <= to; h++) {
    s += `<option value="${h}"${selectedH===h?' selected':''}>${h}</option>`;
  }
  return s;
}

// 「分」select の option リストを生成（案B: "--"プレースホルダー付き）
function _minOpts(selectedM) {
  let s = `<option value=""${selectedM==null?' selected':''}>--</option>`;
  for (let m = 0; m < 60; m += 5) {
    s += `<option value="${m}"${selectedM===m?' selected':''}>${String(m).padStart(2,'0')}</option>`;
  }
  return s;
}

// 「作業予定時間」duration 用：時(0-12)・分(0-55, 5分刻み) の option
// 既存タスクが12時間を超える場合（開始/終了時刻で 07:00-23:00 入力時など）は
// その値までオプションを拡張して値の消失を防ぐ
function _durHourOpts(selectedH) {
  let s = '';
  const max = (selectedH != null && selectedH > 12) ? selectedH : 12;
  for (let h = 0; h <= max; h++) s += `<option value="${h}"${selectedH===h?' selected':''}>${h}</option>`;
  return s;
}
function _durMinOpts(selectedM) {
  let s = '';
  for (let m = 0; m < 60; m += 5) s += `<option value="${m}"${selectedM===m?' selected':''}>${String(m).padStart(2,'0')}</option>`;
  return s;
}
// estimatedHours(float) → { h, m }（5分丸め）
function _splitHours(hours) {
  const total = Math.round((hours || 0) * 60 / 5) * 5;
  return { h: Math.floor(total / 60), m: total % 60 };
}
// duration の 時+分 select から hours(float) を返す
function _readDurationPair(hId, mId) {
  const h = parseInt(document.getElementById(hId)?.value || '0', 10);
  const m = parseInt(document.getElementById(mId)?.value || '0', 10);
  return h + m / 60;
}
// 「開始/終了時刻｜作業予定時間」トグルの現在値
function _emTimeMethod() {
  const btn = document.querySelector('#em-time-method-toggle [data-em-time-method].active');
  return btn?.dataset.emTimeMethod || 'time';
}
function toggleEmTimeMethod(method) {
  const _changed = method !== _emTimeMethod();
  if (_changed) _emEstTouched = true;
  document.querySelectorAll('#em-time-method-toggle [data-em-time-method]').forEach(b =>
    b.classList.toggle('active', b.dataset.emTimeMethod === method));
  // 合計モード
  const ti = document.getElementById('em-time-inputs');
  const di = document.getElementById('em-duration-inputs');
  if (ti) ti.style.display = method === 'time' ? 'flex' : 'none';
  if (di) di.style.display = method === 'duration' ? 'flex' : 'none';
  // 日別モード（各行）
  document.querySelectorAll('#em-hours-daily-rows [data-em-date]').forEach(row => {
    const rti = row.querySelector('.em-ebd-time-inputs');
    const rdi = row.querySelector('.em-ebd-duration-inputs');
    if (rti) rti.style.display = method === 'time' ? 'flex' : 'none';
    if (rdi) rdi.style.display = method === 'duration' ? 'flex' : 'none';
  });
}

// 合計/日別モード × time/duration method から { hours, startTime, endTime } を決定
// （新規作成・編集の両パスで共用）
// allowUnset:true（新規作成パスのみ）の場合、明示的に時間が入力されていなければ hours:null（未設定）を返す
function _emTotalTime(mode, byDate, fallbackHours, allowUnset) {
  const _fb = fallbackHours || 1;
  if (mode === 'daily') {
    return { hours: byDate.reduce((s, p) => s + p.hours, 0) || 1, startTime: null, endTime: null };
  }
  if (_emTimeMethod() === 'duration') {
    const h = _readDurationPair('em-dur-h', 'em-dur-m');
    return { hours: h > 0 ? h : (allowUnset ? null : _fb), startTime: null, endTime: null };
  }
  // time method
  const startTime = _readTimePair('em-start-h', 'em-start-m');
  const _e = _readTimePair('em-end-h', 'em-end-m');
  const toM = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
  // 開始・終了が両方あり 終了<=開始 のときのみ無効(null)。end-only は _e を保持
  const endTime = (startTime && _e && toM(_e) <= toM(startTime)) ? null : _e;
  // 開始・終了が揃わない場合は作業時間(em-dur)欄の値を採用（無ければ既存値フォールバック）
  const durH = _readDurationPair('em-dur-h', 'em-dur-m');
  const hours = (startTime && endTime) ? (toM(endTime) - toM(startTime)) / 60
    : (durH > 0 ? durH : ((allowUnset && !startTime) ? null : _fb));
  return { hours, startTime, endTime };
}

// duration 用 時:分 select に hours をセット（時 option は >12 の既存値も保持するよう再生成）
function _applyDurSelects(hEl, mEl, hours) {
  if (!hEl || !mEl) return;
  const dur = _splitHours(hours);
  hEl.innerHTML = _durHourOpts(dur.h);
  hEl.value = String(dur.h);
  mEl.value = String(dur.m);
}
function _setRowDuration(row, hours) {
  if (!row) return;
  _applyDurSelects(row.querySelector('[id^="em-ebd-dur-h-"]'), row.querySelector('[id^="em-ebd-dur-m-"]'), hours);
}
function _readRowDuration(row) {
  const h = parseInt(row.querySelector('[id^="em-ebd-dur-h-"]')?.value || '0', 10);
  const m = parseInt(row.querySelector('[id^="em-ebd-dur-m-"]')?.value || '0', 10);
  return h + m / 60;
}

// 時+分 select に初期値をセット
function _setTimePair(hId, mId, timeStr) {
  const hEl = document.getElementById(hId);
  const mEl = document.getElementById(mId);
  if (!hEl || !mEl) return;
  if (!timeStr) {
    hEl.value = '';
    mEl.value = '';   // → "--" プレースホルダー
    mEl.disabled = true;
  } else {
    const [h, m] = timeStr.split(':').map(Number);
    hEl.value = String(h);
    mEl.value = String(m);
    mEl.disabled = false;
  }
}

// 時+分 select から "HH:MM" 文字列または null を返す
function _readTimePair(hId, mId) {
  const h = document.getElementById(hId)?.value;
  if (!h) return null;
  const m = document.getElementById(mId)?.value || '0';
  return `${String(Number(h)).padStart(2,'0')}:${String(Number(m)).padStart(2,'0')}`;
}

// startTime + estimatedHours → endTime（5分切り捨て）
function _calcEndTimeVal(startTime, estimatedHours) {
  if (!startTime) return null;
  if (!estimatedHours || estimatedHours <= 0) return null;
  const toM = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
  const startMins = toM(startTime);
  const endMins = Math.floor((startMins + Math.round(estimatedHours * 60)) / 5) * 5;
  if (endMins > 23*60+55 || endMins <= startMins) return null;
  return `${String(Math.floor(endMins/60)).padStart(2,'0')}:${String(endMins%60).padStart(2,'0')}`;
}

function _onEmStartHChange() {
  _emEstTouched = true;
  const h = document.getElementById('em-start-h')?.value;
  const mEl = document.getElementById('em-start-m');
  if (mEl) {
    if (h === '') { mEl.disabled = true; mEl.value = ''; }
    else { mEl.disabled = false; if (!mEl.value || mEl.value === '') mEl.value = '0'; }
  }
  _emLastEdited = null;
  _recalcEndTime();
}

function _onEmStartMChange() {
  _emEstTouched = true;
  _emLastEdited = null;
  _recalcEndTime();
}

function _setEmHoursValue(diffMin) {
  const el = document.getElementById('em-hours');
  if (!el) return;
  const h = diffMin / 60;
  const prev = el.querySelector('option[data-dynamic]');
  if (prev) prev.remove();
  el.value = h;
  if (parseFloat(el.value) !== h) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = _fmtH(h);
    opt.dataset.dynamic = '1';
    const after = [...el.options].find(o => parseFloat(o.value) > h);
    after ? el.insertBefore(opt, after) : el.add(opt);
    el.value = h;
  }
}

function _onEmEndHChange() {
  _emEstTouched = true;
  const h = document.getElementById('em-end-h')?.value;
  const mEl = document.getElementById('em-end-m');
  if (mEl) {
    if (h === '') { mEl.disabled = true; mEl.value = ''; }
    else { mEl.disabled = false; if (!mEl.value || mEl.value === '') mEl.value = '0'; }
  }
  _emLastEdited = 'endTime';
  const startTime = _readTimePair('em-start-h','em-start-m');
  const endTime   = _readTimePair('em-end-h','em-end-m');
  if (startTime && endTime) {
    const toM = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
    const diff = toM(endTime) - toM(startTime);
    if (diff > 0) _setEmHoursValue(diff);
  }
}

function _onEmEndMChange() {
  _emEstTouched = true;
  _emLastEdited = 'endTime';
  const startTime = _readTimePair('em-start-h','em-start-m');
  const endTime   = _readTimePair('em-end-h','em-end-m');
  if (startTime && endTime) {
    const toM = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
    const diff = toM(endTime) - toM(startTime);
    if (diff > 0) _setEmHoursValue(diff);
  }
}

function _recalcEndTime() {
  const startTime = _readTimePair('em-start-h','em-start-m');
  if (!startTime) return;
  if (_emLastEdited === 'endTime') return;
  const hoursEl = document.getElementById('em-hours');
  const h = hoursEl ? parseFloat(hoursEl.value) : null;
  const endTime = _calcEndTimeVal(startTime, h);
  if (endTime) _setTimePair('em-end-h','em-end-m', endTime);
}

function _onEmEstimatedHoursChange() {
  _emLastEdited = 'estimatedHours';
  const startTime = _readTimePair('em-start-h','em-start-m');
  const hoursEl   = document.getElementById('em-hours');
  const h = hoursEl ? parseFloat(hoursEl.value) : null;
  const endTime = _calcEndTimeVal(startTime, h);
  if (endTime) _setTimePair('em-end-h','em-end-m', endTime);
}

// ============================================================
// ESTIMATED HOURS MODE (total / daily)
// ============================================================

function toggleEmHoursMode(mode) {
  const total    = document.getElementById('em-hours-total');
  const daily    = document.getElementById('em-hours-daily');
  if (!total || !daily) return;
  if (!mode) mode = total.style.display === 'none' ? 'total' : 'daily';
  const currentlyDaily = total.style.display === 'none';
  if ((mode === 'daily') === currentlyDaily) return;
  _emEstTouched = true;
  const isDaily = mode === 'daily';
  const scheduledDateRow = document.getElementById('em-scheduled-date-row');
  const method = _emTimeMethod();   // method はモード切替で不変（合計・日別で共通）
  if (!isDaily) {
    // switch to total — 日別1行目の時刻 or 時間をタスクレベルに反映
    const firstRow = daily.querySelector('[data-em-date]');
    if (firstRow) {
      // 時間は常に1行目の duration を合計へコピー
      _applyDurSelects(document.getElementById('em-dur-h'), document.getElementById('em-dur-m'), _readRowDuration(firstRow));
      if (method === 'time') {
        const sh = firstRow.querySelector('[id^="em-ebd-start-h-"]')?.value;
        const sm = firstRow.querySelector('[id^="em-ebd-start-m-"]')?.value;
        const eh = firstRow.querySelector('[id^="em-ebd-end-h-"]')?.value;
        const em = firstRow.querySelector('[id^="em-ebd-end-m-"]')?.value;
        // クリア状態も含めてコピー（空文字で _setTimePair が時刻をクリア）
        _setTimePair('em-start-h', 'em-start-m', sh ? `${String(Number(sh)).padStart(2,'0')}:${String(Number(sm||0)).padStart(2,'0')}` : '');
        _setTimePair('em-end-h',   'em-end-m',   eh ? `${String(Number(eh)).padStart(2,'0')}:${String(Number(em||0)).padStart(2,'0')}` : '');
      }
    }
    total.style.display = '';
    daily.style.display = 'none';
    if (scheduledDateRow) scheduledDateRow.style.display = '';
  } else {
    // switch to daily — タスクレベルの時刻 or 時間を日別1行目に反映
    if (!daily.querySelector('[data-em-date]')) {
      _addEmHoursDateRow(todayStr(), 1);
    }
    total.style.display = 'none';
    daily.style.display = '';
    if (scheduledDateRow) scheduledDateRow.style.display = 'none';
    const firstRow = daily.querySelector('[data-em-date]');
    if (firstRow) {
      // 時間は常に合計の作業時間を1行目へコピー
      _setRowDuration(firstRow, _readDurationPair('em-dur-h', 'em-dur-m'));
      if (method === 'time') {
        const taskStartH = document.getElementById('em-start-h')?.value;
        const taskStartM = document.getElementById('em-start-m')?.value;
        const taskEndH   = document.getElementById('em-end-h')?.value;
        const taskEndM   = document.getElementById('em-end-m')?.value;
        const ebdStartH = firstRow.querySelector('[id^="em-ebd-start-h-"]');
        const ebdStartM = firstRow.querySelector('[id^="em-ebd-start-m-"]');
        const ebdEndH   = firstRow.querySelector('[id^="em-ebd-end-h-"]');
        const ebdEndM   = firstRow.querySelector('[id^="em-ebd-end-m-"]');
        if (taskStartH && ebdStartH) {
          ebdStartH.value = taskStartH;
          if (ebdStartM) { ebdStartM.disabled = false; if (taskStartM) ebdStartM.value = taskStartM; }
        }
        if (taskEndH && ebdEndH) {
          ebdEndH.value = taskEndH;
          if (ebdEndM) { ebdEndM.disabled = false; if (taskEndM) ebdEndM.value = taskEndM; }
        }
        _recalcEbdRowHours(firstRow);   // 開始/終了が揃えば diff で上書き
      }
    }
  }
  document.querySelectorAll('[data-em-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.emMode === mode);
  });
  _updateEmHoursSum();
}

// 開始/終了時刻から行の時間（dur select）を自動算出して反映
function _recalcEbdRowHours(row) {
  if (!row) return;
  const startHEl = row.querySelector('[id^="em-ebd-start-h-"]');
  const startMEl = row.querySelector('[id^="em-ebd-start-m-"]');
  const endHEl   = row.querySelector('[id^="em-ebd-end-h-"]');
  const endMEl   = row.querySelector('[id^="em-ebd-end-m-"]');
  if (!startHEl?.value || !endHEl?.value) return;
  const startM = Number(startHEl.value) * 60 + Number(startMEl?.value || 0);
  const endM   = Number(endHEl.value)   * 60 + Number(endMEl?.value   || 0);
  const diffH  = (endM - startM) / 60;
  if (diffH <= 0) return;
  _setRowDuration(row, diffH);
}

function _onEmEbdStartHChange(sel) {
  _emEstTouched = true;
  const idx  = sel.id.replace('em-ebd-start-h-', '');
  const mSel = document.getElementById(`em-ebd-start-m-${idx}`);
  if (mSel) {
    const wasDisabled = mSel.disabled;
    mSel.disabled = (sel.value === '');
    if (wasDisabled && !mSel.disabled) mSel.value = '0';
  }
  _recalcEbdRowHours(sel.closest('[data-em-date]'));
  _updateEmHoursSum();
}
function _onEmEbdEndHChange(sel) {
  _emEstTouched = true;
  const idx  = sel.id.replace('em-ebd-end-h-', '');
  const mSel = document.getElementById(`em-ebd-end-m-${idx}`);
  if (mSel) {
    const wasDisabled = mSel.disabled;
    mSel.disabled = (sel.value === '');
    if (wasDisabled && !mSel.disabled) mSel.value = '0';
  }
  _recalcEbdRowHours(sel.closest('[data-em-date]'));
  _updateEmHoursSum();
}

function addEmHoursDate() {
  _emEstTouched = true;
  _addEmHoursDateRow(todayStr(), 1);
  _updateEmHoursSum();
}

function _updateEmHoursSum() {
  const rows = document.querySelectorAll('#em-hours-daily-rows [data-em-date]');
  const sum  = Array.from(rows).reduce((s, row) => s + _readRowDuration(row), 0);
  const sumEl = document.getElementById('em-hours-daily-sum');
  if (sumEl) sumEl.textContent = `合計：${_fmtH(sum)}`;
}

function _getEmHoursByDate() {
  const rows = document.querySelectorAll('#em-hours-daily-rows [data-em-date]');
  // method に関わらず各行の開始/終了は常に保持する（duration 表示中も隠れた select の値を消さない）。
  // 混在日別タスク（時刻あり行＋時間のみ行）でのデータ消失を防ぐ
  return Array.from(rows).map(row => {
    const hours = _readRowDuration(row);
    const startHEl = row.querySelector('[id^="em-ebd-start-h-"]');
    const startMEl = row.querySelector('[id^="em-ebd-start-m-"]');
    const endHEl   = row.querySelector('[id^="em-ebd-end-h-"]');
    const endMEl   = row.querySelector('[id^="em-ebd-end-m-"]');
    const startTime = (startHEl?.value && startMEl && startMEl.value !== '')
      ? `${String(Number(startHEl.value)).padStart(2, '0')}:${String(Number(startMEl.value)).padStart(2, '0')}` : null;
    const endTime   = (endHEl?.value && endMEl && endMEl.value !== '')
      ? `${String(Number(endHEl.value)).padStart(2, '0')}:${String(Number(endMEl.value)).padStart(2, '0')}` : null;
    return { date: row.dataset.emDate, hours, startTime, endTime };
  });
}

// ============================================================
// TOUCH D&D — TASK LIST (機能A)
// ============================================================

// ── Touch D&D state ──────────────────────────────────────────
let _touchDragTaskId   = null;
let _touchDragSlotDate = null;
let _touchDragSlotIdx  = -1;
let _touchDragGhost    = null;
let _touchDragTimer    = null;
let _touchDragStartX   = 0;
let _touchDragStartY   = 0;
let _touchDragging     = false;
const TOUCH_DRAG_DELAY = 300;
const TOUCH_MOVE_THRESHOLD = 8;

function attachTouchDragListeners() {
  document.querySelectorAll('.task-row[draggable="true"]').forEach(row => {
    if (row._touchDragBound) return;
    row._touchDragBound = true;
    row.addEventListener('touchstart',  _onTaskTouchStart,  { passive: false });
    row.addEventListener('touchmove',   _onTaskTouchMove,   { passive: false });
    row.addEventListener('touchend',    _onTaskTouchEnd,    { passive: false });
    row.addEventListener('touchcancel', _onTaskTouchCancel, { passive: false });
  });
}

function _onTaskTouchStart(e) {
  if (_somedayPointerActive) return;
  if (e.touches.length !== 1) return;
  const row   = e.currentTarget;
  const touch = e.touches[0];
  _touchDragStartX = touch.clientX;
  _touchDragStartY = touch.clientY;
  _touchDragging   = false;

  const taskId   = row.dataset.taskId   || null;
  const taskDate = row.dataset.taskDate || '';
  const slotIdx  = parseInt(row.dataset.slotIdx ?? '-1');

  _touchDragTimer = setTimeout(() => {
    _touchDragging     = true;
    _touchDragTaskId   = taskId;
    _touchDragSlotDate = taskDate || null;
    _touchDragSlotIdx  = slotIdx;

    dragTaskId   = taskId;
    dragSlotDate = taskDate || null;
    dragSlotIdx  = slotIdx;

    row.style.opacity = '0.4';
    _touchDragGhost = _createTouchGhost(row, touch.clientX, touch.clientY);
    document.body.appendChild(_touchDragGhost);
    document.body.classList.add('touch-dragging', 'drag-active');
    if (navigator.vibrate) navigator.vibrate(30);
  }, TOUCH_DRAG_DELAY);
}

function _onTaskTouchMove(e) {
  const touch = e.touches[0];
  if (!_touchDragging) {
    const dx = Math.abs(touch.clientX - _touchDragStartX);
    const dy = Math.abs(touch.clientY - _touchDragStartY);
    if (dx > TOUCH_MOVE_THRESHOLD || dy > TOUCH_MOVE_THRESHOLD) _cancelTouchDrag();
    return;
  }
  e.preventDefault();
  if (_touchDragGhost) {
    _touchDragGhost.style.left = (touch.clientX + 16) + 'px';
    _touchDragGhost.style.top  = (touch.clientY - 20) + 'px';
  }
  _touchUpdateDropTarget(touch.clientX, touch.clientY);
}

function _onTaskTouchEnd(e) {
  clearTimeout(_touchDragTimer);
  if (!_touchDragging) return;
  e.preventDefault();
  const touch = e.changedTouches[0];
  _touchExecuteDrop(touch.clientX, touch.clientY);
  _cleanupTouchDrag();
}

function _onTaskTouchCancel() {
  if (_touchDragging) _cleanupTouchDrag();
  else _cancelTouchDrag();
}

function _createTouchGhost(row, clientX, clientY) {
  const ghost = document.createElement('div');
  ghost.className = 'touch-drag-ghost';
  const titleEl = row.querySelector('.task-title');
  ghost.textContent = titleEl ? titleEl.textContent : '—';
  ghost.style.left = (clientX + 16) + 'px';
  ghost.style.top  = (clientY - 20) + 'px';
  return ghost;
}

function _touchUpdateDropTarget(clientX, clientY) {
  if (_touchDragGhost) _touchDragGhost.style.display = 'none';
  const el = document.elementFromPoint(clientX, clientY);
  if (_touchDragGhost) _touchDragGhost.style.display = '';
  clearDragIndicators();
  if (!el) return;

  const targetRow = el.closest('.task-row, .divider-row');
  if (targetRow) {
    // 完了タスクをいつかやるへドラッグ中はガイド線を出さない
    { const _drag = D().tasks.find(x => x.id === dragTaskId);
      if (_drag && _drag.status === 'completed' && targetRow.closest('.someday-section')) return; }
    const rect = targetRow.getBoundingClientRect();
    dragInsertAfter = clientY > rect.top + rect.height / 2;
    targetRow.classList.add(dragInsertAfter ? 'drag-insert-after' : 'drag-insert-before');
    _lastDragTaskId   = targetRow.dataset.taskId   || null;
    _lastDragTaskDate = targetRow.dataset.taskDate  ?? null;
    _lastDragSlotIdx  = parseInt(targetRow.dataset.slotIdx ?? '-1');
    return;
  }

  const sectionEl = el.closest('[data-section-date]');
  if (sectionEl) sectionEl.classList.add('drag-over-zone');
}

function _touchExecuteDrop(clientX, clientY) {
  if (_touchDragGhost) _touchDragGhost.style.display = 'none';
  const el = document.elementFromPoint(clientX, clientY);
  if (_touchDragGhost) _touchDragGhost.style.display = '';
  if (!el) { clearDragIndicators(); return; }

  const syntheticEvent = { preventDefault: () => {}, stopPropagation: () => {}, clientY };

  const targetRow = el.closest('.task-row, .divider-row');
  if (targetRow) {
    handleDropOnTask(syntheticEvent, targetRow.dataset.taskId, targetRow.dataset.taskDate || '', parseInt(targetRow.dataset.slotIdx ?? '-1'));
    return;
  }

  const sectionEl = el.closest('[data-section-date]');
  if (sectionEl) { handleDropOnSection(syntheticEvent, sectionEl.dataset.sectionDate); return; }

  const rightPanel = el.closest('.notes-panel');
  if (rightPanel) { handleDropOnSection(syntheticEvent, ''); return; }

  clearDragIndicators();
}

function _cancelTouchDrag() {
  clearTimeout(_touchDragTimer);
  _touchDragTimer = null;
  _touchDragging  = false;
}

function _cleanupTouchDrag() {
  clearTimeout(_touchDragTimer);
  if (_touchDragGhost) { _touchDragGhost.remove(); _touchDragGhost = null; }
  document.querySelectorAll('.task-row[style*="opacity"]').forEach(r => { r.style.opacity = ''; });
  document.body.classList.remove('touch-dragging', 'drag-active');
  clearDragIndicators();
  _touchDragTaskId = null; _touchDragSlotDate = null; _touchDragSlotIdx = -1;
  _touchDragging = false; _touchDragTimer = null;
  dragTaskId = null; dragSlotDate = null; dragSlotIdx = -1;
  _lastDragTaskId = null; _lastDragTaskDate = null; _lastDragSlotIdx = -1;
}

// ============================================================
// TIMELINE POINTER D&D — MOVE (機能B)
// ============================================================

// ── Timeline Pointer D&D state ────────────────────────────────
let _tlDragTaskId     = null;
let _tlDragGhost      = null;
let _tlDragSource     = null;
let _tlSnapIndicator  = null;
let _tlDropUnschedZone = null;
let _tlDragStartY     = 0;
let _tlDragOrigStartM = 0;
let _tlDragOrigEndM   = 0;
let _tlDragTimer      = null;
let _tlDragging       = false;
let _tlPointerType    = '';
let _tlRecentDrag     = false;
let _tlDragGrabOffsetY = 0;

function _onTlTaskClick(e, taskId, slotIdx = -1) {
  if (_tlRecentDrag) return;
  openEditModal(taskId, 'timeline', slotIdx);
}
function _onTlUnschedTaskClick(e, taskId) {
  if (_tlRecentDrag) return;
  openEditModal(taskId, 'timeline');
}
function _onTlCheck(taskId) {
  const t = D().tasks.find(x => x.id === taskId); if (!t) return;
  if (t.status === 'completed') {
    t.status = 'pending'; t.completedAt = null; t.actualHours = null;
    commit();
  } else {
    openCompletionModal(taskId);
  }
}
function _onTlGridClick(e) {
  if (_tlRecentDrag) return;
  if (e.target.closest('.timeline-task')) return;
  // .gcal-event は pointer-events:none のため closest() では弾けない → bounding rect で判定
  for (const ev of document.querySelectorAll('.gcal-event')) {
    const r = ev.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) return;
  }
  const rect  = e.currentTarget.getBoundingClientRect();
  const relY  = e.clientY - rect.top;
  const TL_S  = 7, PX = 75;
  const rawM  = TL_S * 60 + (relY / PX) * 60;
  const snapM = Math.round(rawM / 15) * 15;
  const startM = Math.max(TL_S * 60, Math.min(22 * 60, snapM));
  const sh = Math.floor(startM / 60), sm = startM % 60;
  openNewTaskModal();
  // _qaDate を変えず em-date をタイムライン表示日で上書き（日付チップの状態を保持）
  const _tlDateEl = document.getElementById('em-date');
  const _tlSdEl   = document.getElementById('em-someday');
  if (_tlDateEl && _tlSdEl) { _tlSdEl.checked = false; _tlDateEl.disabled = false; _tlDateEl.value = heroAnchorDate; }
  _setTimePair('em-start-h', 'em-start-m', `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`);
  _recalcEndTime();
}
const TL_DRAG_DELAY   = 300;
const TL_START_M      = 7 * 60;
const TL_END_M        = 23 * 60;
const TL_PX           = 75;

function attachTimelineDragListeners() {
  document.querySelectorAll('.timeline-task').forEach(card => {
    if (card._tlBound) return;
    card._tlBound = true;
    card.addEventListener('pointerdown', _onTlPointerDown, { passive: false });
  });
  document.querySelectorAll('.tl-resize-handle').forEach(handle => {
    if (handle._tlResizeBound) return;
    handle._tlResizeBound = true;
    handle.addEventListener('pointerdown', _onTlResizePointerDown, { passive: false });
  });
  document.querySelectorAll('.tl-resize-top-handle').forEach(handle => {
    if (handle._tlTopResizeBound) return;
    handle._tlTopResizeBound = true;
    handle.addEventListener('pointerdown', _onTlTopResizePointerDown, { passive: false });
  });

    if (card._tlUnschedBound) return;
    card._tlUnschedBound = true;
    card.addEventListener('pointerdown', _onUnschedPointerDown, { passive: false });
  });

  if (grid && !grid._tlGridClickBound) {

    grid.addEventListener('click', _onTlGridClick);
  }
}

function _onTlPointerDown(e) {
  if (e.target.classList.contains('tl-resize-handle') ||
      e.target.classList.contains('tl-resize-top-handle') ||
      e.target.closest('.tl-check-btn')) return;
  if (e.button !== 0 && e.pointerType !== 'touch' && e.pointerType !== 'pen') return;

  const card   = e.currentTarget;
  const taskId = card.dataset.id;
  if (!taskId) return;

  _tlDragStartY  = e.clientY;
  _tlDragging    = false;
  _tlPointerType = e.pointerType;

  if (e.pointerType !== 'mouse') {
    // Touch/pen: 300ms long-press timer
    _tlDragTimer = setTimeout(() => { _doStartTlDrag(e, card, taskId); }, TL_DRAG_DELAY);
  }
  // Mouse: drag starts on first significant movement in _onTlPointerMove

  card.addEventListener('pointermove',   _onTlPointerMove,   { passive: false });
  card.addEventListener('pointerup',     _onTlPointerUp);
  card.addEventListener('pointercancel', _onTlPointerCancel);
}

function _doStartTlDrag(ev, card, taskId) {
  if (_tlDragging || _tlDragGhost) return; // guard: prevent double ghost
  const d    = D();
  const task = d.tasks.find(x => x.id === taskId);
  if (!task || !task.startTime) return;

  // ポインターキャプチャを先に確立（ポインターが既に離れていたら中断してゴースト残存を防ぐ）
  try { card.setPointerCapture(ev.pointerId); } catch (err) { return; }

  _tlDragging   = true;
  _tlDragTaskId = taskId;

  const toM = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };
  _tlDragOrigStartM = toM(task.startTime);
  _tlDragOrigEndM   = task.endTime
    ? toM(task.endTime)
    : _tlDragOrigStartM + Math.round((task.estimatedHours || 1) * 60);

  _tlDragGrabOffsetY = _tlDragStartY - card.getBoundingClientRect().top;

  _tlDragSource = card;
  card.classList.add('tl-dragging-source');

  _tlDragGhost = document.createElement('div');
  _tlDragGhost.className = 'tl-drag-ghost';
  _tlDragGhost.textContent = task.title;
  _tlDragGhost.style.left = (ev.clientX + 8) + 'px';
  _tlDragGhost.style.top  = (ev.clientY - 10) + 'px';
  document.body.appendChild(_tlDragGhost);

  _tlSnapIndicator = document.createElement('div');
  _tlSnapIndicator.className = 'tl-snap-indicator';
  const grid = document.querySelector('.timeline-grid');
  if (grid) grid.appendChild(_tlSnapIndicator);

  // 時刻未設定ドロップゾーン: 既存エリアをハイライト、なければ動的生成
  const unschedEl = document.querySelector('.timeline-unscheduled');
  if (unschedEl) {
    _tlDropUnschedZone = unschedEl;
    unschedEl.classList.add('active');
  } else {
    _tlDropUnschedZone = null; // .timeline-unscheduled は常にレンダリング済みのためここには到達しない
  }

function _onTlPointerMove(e) {
  if (!_tlDragging) {
    if (_tlPointerType === 'mouse') {
      // Mouse: start drag once moved > 3px (no timer needed)
      if (Math.abs(e.clientY - _tlDragStartY) > 3) {
        _doStartTlDrag(e, e.currentTarget, e.currentTarget.dataset.id);
      }

      clearTimeout(_tlDragTimer); _tlDragTimer = null;
    }
    return;
  }
  e.preventDefault();
  if (_tlDragGhost) {
    _tlDragGhost.style.left = (e.clientX + 8) + 'px';
    _tlDragGhost.style.top  = (e.clientY - 10) + 'px';
  }
  const snapM = _tlYToSnapMinutes(e.clientX, e.clientY - _tlDragGrabOffsetY, true);

    if (isNaN(snapM)) {
      _tlSnapIndicator.style.display = 'none';
    } else {
      _tlSnapIndicator.style.display = '';
      _tlSnapIndicator.style.top = ((snapM - TL_START_M) / 60 * TL_PX) + 'px';
    }
  }

  const somedaySectionEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.someday-section') || null;
  if (somedaySectionEl) {
    // 完了タスクはいつかやるに移動不可 → ハイライトしない

    document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));

function _onTlPointerUp(e) {

  // _tlYToRawMinutes はグリッド内とみなせる座標を返してしまうため、
  // グリッド内判定より前に行わないと「いつかやるへドロップ」が再スケジュールに化けてしまう
  const somedaySectionEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.someday-section') || null;
  if (somedaySectionEl) {
    const d    = D();
    const task = d.tasks.find(x => x.id === _tlDragTaskId);
    if (task && task.status === 'completed') { _cleanupTlDrag(e.currentTarget); return; }
    if (task) {
      task.scheduledDate = null;
      task.startTime     = null;
      task.endTime       = null;
    }
    _cleanupTlDrag(e.currentTarget);
    if (task) commit();
    return;
  }

  const snapM = _tlYToSnapMinutes(e.clientX, e.clientY - _tlDragGrabOffsetY, true);
  if (!isNaN(snapM)) {

    const clampedStart = Math.max(TL_START_M, Math.min(TL_END_M - durM, snapM));
    const clampedEnd   = clampedStart + durM;
    const toHHMM = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    const d    = D();
    const task = d.tasks.find(x => x.id === _tlDragTaskId);
    if (task) {
      task.startTime = toHHMM(clampedStart);
      task.endTime   = toHHMM(clampedEnd);
    }

    _cleanupTlDrag(e.currentTarget);
    if (task) commit();
  } else {
    // グリッド外ドロップ → ゾーン判定
    let overZone = false;
    if (_tlDropUnschedZone) {
      const zRect = _tlDropUnschedZone.getBoundingClientRect();
      overZone = e.clientY >= zRect.top && e.clientY <= zRect.bottom;
    }
    if (overZone) {
      // 時刻未設定ゾーンへのドロップ → startTime/endTime をクリア
      const d    = D();
      const task = d.tasks.find(x => x.id === _tlDragTaskId);
      if (task) {
        task.startTime = null;
        task.endTime   = null;
      }
      _cleanupTlDrag(e.currentTarget);
      if (task) commit();
    } else {

    }

function _onTlPointerCancel(e) {
  clearTimeout(_tlDragTimer);
  _cleanupTlDrag(e.currentTarget);
}

function _tlYToRawMinutes(clientX, clientY, excludeUnschedZone = false) {
  const grid = document.querySelector('.timeline-grid');
  if (!grid) return NaN;
  // sticky な時刻未設定エリア（既存 or D&D中の動的生成ゾーン）が
  // 視覚的にグリッド上に重なっている場合はグリッド外として扱う
  // （スクロール時に座標が重複し、誤ってグリッドへドロップ判定されてしまうため）
  // ドラッグ元種別による分岐：機能B/E・機能D（タイムライン上 / 時刻未設定カードのドラッグ）は
  // ソースエリアとグリッドの視覚的重なりを除外する必要があるため true を渡す。
  // 機能2（いつかやるカードのドラッグ）はこの除外が無関係な領域に適用されると
  // グリッド内なのにガイド線が消えてしまうため false（デフォルト）とする。
  if (excludeUnschedZone) {
    const unsched = document.querySelector('.timeline-unscheduled') || document.querySelector('.tl-drop-unsched-zone');
    if (unsched) {
      const uRect = unsched.getBoundingClientRect();
      if (clientY >= uRect.top && clientY <= uRect.bottom) return NaN;
    }
  }
  const rect = grid.getBoundingClientRect();
  // コンテナ可視範囲外なら NaN を返す（スクロール量に関係なくキャンセル判定に使う）
  if (clientY < rect.top || clientY >= rect.bottom) return NaN;
  // X軸範囲外（.timeline-grid の左右範囲外＝右パネルの .someday-section 等）も除外する。
  // sticky除外（縦方向の視覚的重なり対策）とは独立した、横方向の範囲チェック
  if (clientX < rect.left || clientX >= rect.right) return NaN;
  // scrollTop を加算してスクロール済みグリッドでも正確な時刻を返す
  return TL_START_M + (clientY - rect.top + grid.scrollTop) / TL_PX * 60;
}

function _tlYToSnapMinutes(clientX, clientY, excludeUnschedZone = false) {
  const rawM = _tlYToRawMinutes(clientX, clientY, excludeUnschedZone);
  return isNaN(rawM) ? NaN : Math.round(rawM / 15) * 15;
}

function _cleanupTlDrag(card) {
  if (_tlDropUnschedZone) {
    if (_tlDropUnschedZone.classList.contains('timeline-unscheduled')) {
      _tlDropUnschedZone.classList.remove('active');
    } else {
      _tlDropUnschedZone.remove();
    }
    _tlDropUnschedZone = null;
  }
  document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));
  if (_tlDragGhost)     { _tlDragGhost.remove();     _tlDragGhost     = null; }
  if (_tlSnapIndicator) { _tlSnapIndicator.remove();  _tlSnapIndicator = null; }
  if (_tlDragSource)    { _tlDragSource.classList.remove('tl-dragging-source'); _tlDragSource = null; }
  document.body.classList.remove('touch-dragging');
  if (card) {
    // pointerdown は削除しない：キャンセル後も再ドラッグできるよう保持
    card.removeEventListener('pointermove',   _onTlPointerMove);
    card.removeEventListener('pointerup',     _onTlPointerUp);
    card.removeEventListener('pointercancel', _onTlPointerCancel);
  }
  _tlDragTaskId = null; _tlDragging = false; _tlDragTimer = null;
  _tlDragOrigStartM = 0; _tlDragOrigEndM = 0; _tlPointerType = ''; _tlDragGrabOffsetY = 0;
}

// ============================================================
// TIMELINE POINTER D&D — RESIZE (機能C)
// ============================================================

// ── Timeline Resize state ─────────────────────────────────────
let _tlResizeTaskId   = null;
let _tlResizeCard     = null;
let _tlResizeStartY   = 0;
let _tlResizeOrigEndM = 0;
let _tlResizeStartM   = 0;
let _tlResizing       = false;

// ── Timeline Top-Resize state ─────────────────────────────────
let _tlTopResizeTaskId     = null;
let _tlTopResizeCard       = null;
let _tlTopResizeHandle     = null;   // 安全網からの removeEventListener 用
let _tlTopResizeStartY     = 0;
let _tlTopResizeOrigStartM = 0;
let _tlTopResizeOrigEndM   = 0;
let _tlTopResizing         = false;

function _onTlResizePointerDown(e) {
  e.preventDefault();

  const d    = D();
  const task = d.tasks.find(x => x.id === taskId);
  if (!task || !task.startTime) return;

  const toM = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };

  _tlResizing       = true;
  _tlResizeTaskId   = taskId;
  _tlResizeCard     = card;
  _tlResizeStartY   = e.clientY;
  _tlResizeStartM   = toM(task.startTime);
  _tlResizeOrigEndM = task.endTime
    ? toM(task.endTime)
    : _tlResizeStartM + Math.round((task.estimatedHours || 1) * 60);

  handle.addEventListener('pointercancel', _onTlResizePointerCancel);
}

function _onTlResizePointerMove(e) {
  if (!_tlResizing) return;
  e.preventDefault();
  const dy            = e.clientY - _tlResizeStartY;
  const snappedDeltaM = Math.round((dy / TL_PX * 60) / 15) * 15;
  let newEndM = Math.max(_tlResizeStartM + 15, Math.min(TL_END_M, _tlResizeOrigEndM + snappedDeltaM));
  if (_tlResizeCard) {

function _onTlResizePointerUp(e) {
  if (!_tlResizing) return;
  _tlRecentDrag = true; setTimeout(() => { _tlRecentDrag = false; }, 400);
  const dy            = e.clientY - _tlResizeStartY;
  const snappedDeltaM = Math.round((dy / TL_PX * 60) / 15) * 15;
  const newEndM       = Math.max(_tlResizeStartM + 15, Math.min(TL_END_M, _tlResizeOrigEndM + snappedDeltaM));
  const newEstHours   = (newEndM - _tlResizeStartM) / 60;
  const toHHMM        = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;

  const d    = D();
  const task = d.tasks.find(x => x.id === _tlResizeTaskId);
  if (task) {
    task.endTime        = toHHMM(newEndM);
    task.estimatedHours = newEstHours;
  }

  _cleanupTlResize(e.currentTarget);

}

function _onTlResizePointerCancel(e) {
  if (_tlResizeCard) {
    const origHeight = Math.max((_tlResizeOrigEndM - _tlResizeStartM) / 60 * TL_PX - 3, 28);
    _tlResizeCard.style.height = origHeight + 'px';
  }
  _cleanupTlResize(e.currentTarget);
}

function _cleanupTlResize(handle) {
  if (_tlResizeCard) _tlResizeCard.classList.remove('tl-resizing');
  if (handle) {
    handle.removeEventListener('pointermove',   _onTlResizePointerMove);
    handle.removeEventListener('pointerup',     _onTlResizePointerUp);
    handle.removeEventListener('pointercancel', _onTlResizePointerCancel);
  }
  _tlResizing = false; _tlResizeTaskId = null; _tlResizeCard = null;
  _tlResizeOrigEndM = 0; _tlResizeStartM = 0;
}

// ============================================================
// TIMELINE POINTER D&D — TOP RESIZE (機能F)
// ============================================================

function _onTlTopResizePointerDown(e) {
  e.preventDefault();
  e.stopPropagation();

  const handle = e.currentTarget;
  const card   = handle.closest('.timeline-task');

  if (!taskId) return;

  const d    = D();
  const task = d.tasks.find(x => x.id === taskId);
  if (!task || !task.startTime) return;

  const toM = s => { const [h,m] = s.split(':').map(Number); return h*60+m; };

  try { handle.setPointerCapture(e.pointerId); } catch { return; }

  _tlTopResizing         = true;
  _tlTopResizeTaskId     = taskId;
  _tlTopResizeCard       = card;
  _tlTopResizeHandle     = handle;
  _tlTopResizeStartY     = e.clientY;
  _tlTopResizeOrigStartM = toM(task.startTime);
  _tlTopResizeOrigEndM   = task.endTime
    ? toM(task.endTime)
    : _tlTopResizeOrigStartM + Math.round((task.estimatedHours || 1) * 60);

  card.classList.add('tl-top-resizing');

  handle.addEventListener('pointermove', _onTlTopResizePointerMove, { passive: false });

function _onTlTopResizePointerMove(e) {
  if (!_tlTopResizing) return;
  e.preventDefault();

  const dy = e.clientY - _tlTopResizeStartY;
  const rawDeltaM     = dy / TL_PX * 60;
  const snappedDeltaM = Math.round(rawDeltaM / 15) * 15;

  const rawNewStartM  = _tlTopResizeOrigStartM + snappedDeltaM;
  // クランプ後の値で top・height を計算（rawNewStartM を直接使ってはいけない）
  const clampedStartM = Math.max(TL_START_M, Math.min(_tlTopResizeOrigEndM - 15, rawNewStartM));

  const newTop    = (clampedStartM - TL_START_M) / 60 * TL_PX + 2;
  const newHeight = Math.max((_tlTopResizeOrigEndM - clampedStartM) / 60 * TL_PX - 3, 28);

  if (_tlTopResizeCard) {
    _tlTopResizeCard.style.top    = newTop    + 'px';
    _tlTopResizeCard.style.height = newHeight + 'px';
  }

function _onTlTopResizePointerUp(e) {
  if (!_tlTopResizing) return;

  _tlRecentDrag = true;
  setTimeout(() => { _tlRecentDrag = false; }, 400);

  const rawDeltaM     = dy / TL_PX * 60;
  const snappedDeltaM = Math.round(rawDeltaM / 15) * 15;

  const rawNewStartM = _tlTopResizeOrigStartM + snappedDeltaM;
  const newStartM    = Math.max(TL_START_M, Math.min(_tlTopResizeOrigEndM - 15, rawNewStartM));
  const newEstHours  = (_tlTopResizeOrigEndM - newStartM) / 60;
  const toHHMM = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;

  // taskId・newEndTime を cleanup 前にローカルに退避（cleanup で null になる）
  const taskId       = _tlTopResizeTaskId;
  const newStartTime = toHHMM(newStartM);
  const newEndTime   = toHHMM(_tlTopResizeOrigEndM); // 固定 endTime を退避

  _cleanupTlTopResize(); // commit より先（B2ルール：DOM参照を手放してから commit）

  const d    = D();
  const task = d.tasks.find(x => x.id === taskId);
  if (task) {
    task.startTime      = newStartTime;
    task.estimatedHours = newEstHours;

function _onTlTopResizePointerCancel(e) {
  if (_tlTopResizeCard) {
    const origTop    = (_tlTopResizeOrigStartM - TL_START_M) / 60 * TL_PX + 2;

    _tlTopResizeCard.style.top    = origTop    + 'px';
    _tlTopResizeCard.style.height = origHeight + 'px';
  }
  _cleanupTlTopResize();
  // commit しない（変更破棄）
}

function _cleanupTlTopResize() {
  if (_tlTopResizeCard) _tlTopResizeCard.classList.remove('tl-top-resizing');

  if (_tlTopResizeHandle) {
    _tlTopResizeHandle.removeEventListener('pointermove', _onTlTopResizePointerMove);
    _tlTopResizeHandle.removeEventListener('pointerup',   _onTlTopResizePointerUp);
    _tlTopResizeHandle.removeEventListener('pointercancel', _onTlTopResizePointerCancel);
    // pointerdown は削除しない（B2ルール）
  }

  _tlTopResizing         = false;
  _tlTopResizeTaskId     = null;
  _tlTopResizeCard       = null;
  _tlTopResizeHandle     = null;
  _tlTopResizeOrigStartM = 0;
  _tlTopResizeOrigEndM   = 0;

  _tlDragGhost.style.top  = (ev.clientY - 10) + 'px';
  document.body.appendChild(_tlDragGhost);

  _tlSnapIndicator = document.createElement('div');
  _tlSnapIndicator.className = 'tl-snap-indicator';
  const grid = document.querySelector('.timeline-grid');

function _onUnschedPointerMove(e) {

      clearTimeout(_tlDragTimer); _tlDragTimer = null;
    }
    return;
  }

  if (_tlDragGhost) {
    _tlDragGhost.style.left = (e.clientX + 8) + 'px';
    _tlDragGhost.style.top  = (e.clientY - 10) + 'px';
  }

  // ドロップ先ハイライト更新：「いつかやる」セクションを最優先（elementFromPoint で先行判定）。
  // _onTlPointerMove(機能B/E)と全く同じ構造。該当すればグリッド内ガイド線は非表示にする
  const somedaySectionEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.someday-section') || null;
  if (somedaySectionEl) {

    if (!_tlTask || _tlTask.status !== 'completed') somedaySectionEl.classList.add('tl-drop-target');
    if (_tlSnapIndicator) _tlSnapIndicator.style.display = 'none';
  } else {
    document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));

      const rawM   = _tlYToRawMinutes(e.clientX, e.clientY, true);
      const inGrid = !isNaN(rawM) && rawM >= TL_START_M && rawM < TL_END_M;
      _tlSnapIndicator.style.display = inGrid ? 'block' : 'none';
      if (inGrid) {
        const snapM = Math.round(rawM / 15) * 15;

function _onUnschedPointerUp(e) {
  clearTimeout(_tlDragTimer);
  if (!_tlDragging) { _cleanupUnschedDrag(e.currentTarget); return; }
  _tlRecentDrag = true; setTimeout(() => { _tlRecentDrag = false; }, 400);

  // 最優先：「いつかやる」セクション上にドロップされたか先行判定（elementFromPoint）。
  // _onTlPointerUp(機能B/E)の構造を踏襲。グリッド内判定より前に行う
  const somedaySectionEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.someday-section') || null;
  if (somedaySectionEl) {
    const d    = D();
    const task = d.tasks.find(x => x.id === _tlDragTaskId);
    if (task && task.status === 'completed') { _cleanupUnschedDrag(e.currentTarget); return; }
    if (task) {
      task.scheduledDate = null;
      task.startTime     = null;
      task.endTime       = null;
    }
    _cleanupUnschedDrag(e.currentTarget);
    if (task) commit();
    return;
  }

  const durM = _tlDragOrigEndM; // estimatedHours * 60
  const rawM = _tlYToRawMinutes(e.clientX, e.clientY, true);
  // グリッド内（7:00〜23:00）にドロップした場合のみ startTime を設定
  // スナップ前のrawMで判定することで境界付近の誤判定（丸め込み）を防ぐ
  if (!isNaN(rawM) && rawM >= TL_START_M && rawM < TL_END_M) {
    const snapM        = Math.round(rawM / 15) * 15;
    const clampedStart = Math.max(TL_START_M, Math.min(TL_END_M - durM, snapM));
    const clampedEnd   = clampedStart + durM;
    const toHHMM = m => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
    const d    = D();
    const task = d.tasks.find(x => x.id === _tlDragTaskId);
    if (task) {
      task.startTime = toHHMM(clampedStart);
      task.endTime   = toHHMM(clampedEnd);
    }
    _cleanupUnschedDrag(e.currentTarget);
    if (task) commit();
    return;
  }

  _cleanupUnschedDrag(e.currentTarget);
}

function _onUnschedPointerCancel(e) {
  clearTimeout(_tlDragTimer);
  _cleanupUnschedDrag(e.currentTarget);
}

function _cleanupUnschedDrag(card) {
  document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));
  if (_tlDragGhost)     { _tlDragGhost.remove();     _tlDragGhost     = null; }
  if (_tlSnapIndicator) { _tlSnapIndicator.remove();  _tlSnapIndicator = null; }
  if (_tlDragSource)    { _tlDragSource.classList.remove('tl-dragging-source'); _tlDragSource = null; }
  document.body.classList.remove('touch-dragging');
  if (card) {
    // pointerdown は削除しない：キャンセル後も再ドラッグできるよう保持
    card.removeEventListener('pointermove',   _onUnschedPointerMove);
    card.removeEventListener('pointerup',     _onUnschedPointerUp);
    card.removeEventListener('pointercancel', _onUnschedPointerCancel);
  }
  _tlDragTaskId = null; _tlDragging = false; _tlDragTimer = null;
  _tlDragOrigStartM = 0; _tlDragOrigEndM = 0; _tlPointerType = ''; _tlDragGrabOffsetY = 0;
}

// ============================================================
// SOMEDAY → TIMELINE POINTER D&D（機能2・新規）
// ============================================================

// ── Someday drag state ───────────────────────────────────────
let _somedayDragTaskId    = null;
let _somedayDragging      = false;
let _somedayDragGhost     = null;
let _somedayDragSource    = null;
let _somedayDragStartX    = 0;
let _somedayDragStartY    = 0;
let _somedayPointerType   = '';
let _somedayDragTimer     = null;
let _somedayRecentDrag    = false;
let _somedaySnapIndicator = null;
let _somedayDragDurM      = 0;
// 時刻未設定ドロップゾーン（機能2専用。機能B/E専用の _tlDropUnschedZone とは
// 完全に分離する。命名規則 _tl* / _someday* を踏襲し状態の衝突を避ける）
let _somedayDropUnschedZone = null;
// 機能Aタッチブリッジ（_onTaskTouchStart）との競合回避フラグ。
// Pointer Events は仕様上 Touch Events より先に発火するため、
// _onSomedayPointerDown の最初の同期処理でセットすれば _onTaskTouchStart 側で参照可能
let _somedayPointerActive = false;

function attachSomedayDragListeners() {
  document.querySelectorAll('.someday-task-list .task-row[data-id]').forEach(row => {
    if (row._somedayBound) return;
    row._somedayBound = true;
    row.addEventListener('pointerdown', _onSomedayPointerDown, { passive: false });
  });
}

function _onSomedayPointerDown(e) {
  if (e.button !== 0 && e.pointerType !== 'touch' && e.pointerType !== 'pen') return;
  const card   = e.currentTarget;
  const taskId = card.dataset.id;
  if (!taskId) return;

  // Pointer Events は Touch Events より先に発火する前提のもと、
  // 機能A（_onTaskTouchStart）との競合を避けるため、早期returnガードを
  // すべて通過した後・リスナー登録確定直前の最初の同期処理でフラグを立てる
  _somedayPointerActive = true;

  // レース対策は handleDragStart 側（関数本体の先頭）で一元的に行う。
  // 理由：.task-row は renderItems により毎回 innerHTML で再生成されるため、
  // ここで card に addEventListener('dragstart',...) や card.draggable=false を
  // 行っても、再描画（render/renderNotes）がドラッグ開始までの間に走ると
  // 古いDOMノードに対してのみ効いた状態になり、新ノードでは無防備になる
  // （「OKの時とNGの時がある」という間欠的な再現として実機確認済み）。
  // inline属性 ondragstart="handleDragStart(...)" は再描画のたびに新ノードへ
  // 必ず再アタッチされるため、関数本体でガードするのが再描画に強い唯一の方法。

  _somedayDragStartX  = e.clientX;
  _somedayDragStartY  = e.clientY;
  _somedayDragging    = false;
  _somedayPointerType = e.pointerType;

  if (e.pointerType !== 'mouse') {
    // touch/pen: 長押し300ms後にドラッグ開始（機能D・機能Aと同じ方式）
    _somedayDragTimer = setTimeout(() => { _doStartSomedayDrag(e, card, taskId); }, TL_DRAG_DELAY);
  }
  // mouse: _onSomedayPointerMove での移動量閾値判定でドラッグ開始（setTimeout(fn,0)は使わない）

  card.addEventListener('pointermove',   _onSomedayPointerMove,   { passive: false });
  card.addEventListener('pointerup',     _onSomedayPointerUp);
  card.addEventListener('pointercancel', _onSomedayPointerCancel);
}

function _doStartSomedayDrag(ev, card, taskId) {
  if (viewMode !== 'timeline') return;
  if (_somedayDragging || _somedayDragGhost) return; // guard: prevent double ghost
  const d    = D();
  const task = d.tasks.find(x => x.id === taskId);
  if (!task) return;

  // B1ルール：setPointerCapture を最初に呼ぶ。失敗時は早期return
  try { card.setPointerCapture(ev.pointerId); } catch (err) { return; }

  // 直前の dragstart ガード（handleDragStart）が e.preventDefault() でネイティブD&Dを
  // キャンセルしても、ブラウザのタイミングによっては dragover が1回だけ先行発火し
  // .drag-over-zone（緑破線）が残存することがある。機能2ドラッグ開始時点で一括クリア。
  clearDragIndicators();

  // ネイティブHTML5 D&Dの抑止は taskRow テンプレート側（renderItems、render時点で
  // viewMode==='timeline' なら draggable="false" を出力）が主担当。ここでの代入は
  // 念のための保険（idempotent）として残す。
  card.draggable = false;
  // CSS恒久付与ではなく動的付与：機能A（長押し前は通常スクロール可能）の前提を壊さない
  card.style.touchAction = 'none';

  _somedayDragging   = true;
  _somedayDragTaskId = taskId;
  _somedayDragDurM   = Math.round((task.estimatedHours || 1) * 60);

  _somedayDragSource = card;
  card.classList.add('someday-dragging-source');

  _somedayDragGhost = document.createElement('div');
  _somedayDragGhost.className = 'tl-drag-ghost';
  _somedayDragGhost.textContent = task.title;
  _somedayDragGhost.style.left = (ev.clientX + 8) + 'px';
  _somedayDragGhost.style.top  = (ev.clientY - 10) + 'px';
  document.body.appendChild(_somedayDragGhost);

  _somedaySnapIndicator = document.createElement('div');
  _somedaySnapIndicator.className = 'tl-snap-indicator';
  const grid = document.querySelector('.timeline-grid');
  if (grid) grid.appendChild(_somedaySnapIndicator);

  // 時刻未設定ドロップゾーン: 既存エリアをハイライト、なければ動的生成
  // （_doStartTlDrag(機能B/E)と同様の処理。ただし状態変数は専用の _somedayDropUnschedZone を使う）
  const unschedEl = document.querySelector('.timeline-unscheduled');
  if (unschedEl) {
    _somedayDropUnschedZone = unschedEl;
    unschedEl.classList.add('active');
  } else {
    _somedayDropUnschedZone = null; // .timeline-unscheduled は常にレンダリング済みのためここには到達しない
  }

  document.body.classList.add('touch-dragging');
  if (navigator.vibrate) navigator.vibrate(30);
}

function _onSomedayPointerMove(e) {
  if (!_somedayDragging) {
    if (_somedayPointerType === 'mouse') {

      if (Math.abs(e.clientX - _somedayDragStartX) > 3 || Math.abs(e.clientY - _somedayDragStartY) > 3) {
        _doStartSomedayDrag(e, e.currentTarget, e.currentTarget.dataset.id);
      }
    } else if (Math.abs(e.clientX - _somedayDragStartX) > 8 || Math.abs(e.clientY - _somedayDragStartY) > 8) {
      clearTimeout(_somedayDragTimer); _somedayDragTimer = null;
    }
    return;
  }
  e.preventDefault();

  if (_somedayDragGhost) {
    _somedayDragGhost.style.left = (e.clientX + 8) + 'px';
    _somedayDragGhost.style.top  = (e.clientY - 10) + 'px';
  }

  const gridEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.timeline-grid') || null;
  if (_somedaySnapIndicator) {
    if (gridEl) {
      const rawM   = _tlYToRawMinutes(e.clientX, e.clientY);
      const inGrid = !isNaN(rawM) && rawM >= TL_START_M && rawM < TL_END_M;
      _somedaySnapIndicator.style.display = inGrid ? 'block' : 'none';
      if (inGrid) {
        const snapM = Math.round(rawM / 15) * 15;
        _somedaySnapIndicator.style.top = ((snapM - TL_START_M) / 60 * TL_PX) + 'px';
      }
    } else {
      _somedaySnapIndicator.style.display = 'none';
    }
  }

  // 時刻未設定ゾーンハイライト: getBoundingClientRect() ベースで判定（elementFromPoint 不使用）
  // visibility:hidden 要素はブラウザのヒットテストから除外されるため、
  // elementFromPoint に頼るとゾーンが非表示のときグリッドを返してしまう。
  // bounding rect は visibility に関わらず正確な座標を返すため、常にこちらで判定する。
  if (_somedayDropUnschedZone) {
    const zRect = _somedayDropUnschedZone.getBoundingClientRect();
    const overZone = e.clientX >= zRect.left && e.clientX <= zRect.right &&
                     e.clientY >= zRect.top  && e.clientY <= zRect.bottom;
    _somedayDropUnschedZone.classList.toggle('active', overZone);
  }
}

function _onSomedayPointerUp(e) {
  clearTimeout(_somedayDragTimer);
  if (!_somedayDragging) { _cleanupSomedayDrag(e.currentTarget); return; }
  _somedayRecentDrag = true; setTimeout(() => { _somedayRecentDrag = false; }, 400);

  // ①ゾーン先行判定（bounding rect ベース）: visibility:hidden 要素は elementFromPoint
  // のヒットテストから除外されるため、ゾーンが非表示の状態でもポインター座標と
  // bounding rect を比較することで確実にドロップを検出する。
  // ゾーンは sticky で常にグリッドの上に表示されるため、ゾーン座標 = グリッドより優先。
  if (_somedayDropUnschedZone) {
    const zRect = _somedayDropUnschedZone.getBoundingClientRect();
    const overZone = e.clientX >= zRect.left && e.clientX <= zRect.right &&
                     e.clientY >= zRect.top  && e.clientY <= zRect.bottom;
    if (overZone) {
      const d    = D();
      const task = d.tasks.find(x => x.id === _somedayDragTaskId);
      if (task) {
        task.scheduledDate = heroAnchorDate;
        task.startTime     = null;
        task.endTime       = null;
      }
      _cleanupSomedayDrag(e.currentTarget);
      if (task) commit();
      return;
    }
  }

  // ②グリッド判定: ゾーン外に落とした場合のみ到達
  const gridEl = document.elementFromPoint(e.clientX, e.clientY)?.closest('.timeline-grid') || null;
  const rawM   = gridEl ? _tlYToRawMinutes(e.clientX, e.clientY) : NaN;

  if (gridEl && !isNaN(rawM) && rawM >= TL_START_M && rawM < TL_END_M) {
    const snapM        = Math.round(rawM / 15) * 15;
    const durM         = _somedayDragDurM;
    const clampedStart = Math.max(TL_START_M, Math.min(TL_END_M - durM, snapM));
    const clampedEnd   = clampedStart + durM;
    const toHHMM = m => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
    const d    = D();
    const task = d.tasks.find(x => x.id === _somedayDragTaskId);
    if (task) {
      task.scheduledDate = heroAnchorDate;
      task.startTime     = toHHMM(clampedStart);
      task.endTime       = toHHMM(clampedEnd);
    }
    // cleanup → commit の順序厳守
    _cleanupSomedayDrag(e.currentTarget);
    if (task) commit();
    return;
  }

  _cleanupSomedayDrag(e.currentTarget);
}

function _onSomedayPointerCancel(e) {
  clearTimeout(_somedayDragTimer);
  _cleanupSomedayDrag(e.currentTarget);
}

function _cleanupSomedayDrag(card) {
  if (_somedayDropUnschedZone) {
    if (_somedayDropUnschedZone.classList.contains('timeline-unscheduled')) {
      _somedayDropUnschedZone.classList.remove('active');
    } else {
      _somedayDropUnschedZone.remove();
    }
    _somedayDropUnschedZone = null;
  }
  if (_somedayDragGhost)     { _somedayDragGhost.remove();     _somedayDragGhost     = null; }
  if (_somedaySnapIndicator) { _somedaySnapIndicator.remove(); _somedaySnapIndicator = null; }
  if (_somedayDragSource) {
    _somedayDragSource.classList.remove('someday-dragging-source');
    // timelineビューのままなら draggable=false を維持する（true に戻すとレンダリング
    // を挟まずに再ドラッグした際、再びネイティブD&Dが起動できてしまいレースが復活する）
    _somedayDragSource.draggable = (viewMode !== 'timeline');
    _somedayDragSource.style.touchAction = '';
    _somedayDragSource = null;
  }
  document.body.classList.remove('touch-dragging');
  if (card) {
    // pointerdown は削除しない（B2ルール）：キャンセル後も再ドラッグできるよう保持
    card.removeEventListener('pointermove',   _onSomedayPointerMove);
    card.removeEventListener('pointerup',     _onSomedayPointerUp);
    card.removeEventListener('pointercancel', _onSomedayPointerCancel);
    card.draggable = (viewMode !== 'timeline');
    card.style.touchAction = '';
  }
  _somedayDragTaskId  = null;
  _somedayDragging    = false;
  _somedayDragTimer   = null;
  _somedayDragStartX  = 0;
  _somedayDragStartY  = 0;
  _somedayPointerType = '';
  _somedayDragDurM    = 0;
  _somedayPointerActive = false;
}

// ── グローバル D&D セーフティネット ──────────────────────────────────
// pointerup/cancel がカード要素のリスナーに届かなかった場合のフォールバック。

      } else {
        _tlDropUnschedZone.remove();
      }
      _tlDropUnschedZone = null;
    }
    document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));
    if (_tlDragGhost)     { _tlDragGhost.remove();     _tlDragGhost     = null; }
    if (_tlSnapIndicator) { _tlSnapIndicator.remove();  _tlSnapIndicator = null; }
    if (_tlDragSource)    { _tlDragSource.classList.remove('tl-dragging-source'); _tlDragSource = null; }
    document.body.classList.remove('touch-dragging');
    _tlDragTaskId = null; _tlDragging = false; _tlDragTimer = null;
    _tlDragOrigStartM = 0; _tlDragOrigEndM = 0; _tlPointerType = ''; _tlDragGrabOffsetY = 0;
  }
  if (_somedayDragging || _somedayDragGhost) {
    document.querySelectorAll('.someday-section.tl-drop-target').forEach(el => el.classList.remove('tl-drop-target'));
    if (_somedayDropUnschedZone) {
      if (_somedayDropUnschedZone.classList.contains('timeline-unscheduled')) {
        _somedayDropUnschedZone.classList.remove('active');
      } else {
        _somedayDropUnschedZone.remove();
      }
      _somedayDropUnschedZone = null;
    }
    if (_somedayDragGhost)      { _somedayDragGhost.remove();      _somedayDragGhost      = null; }
    if (_somedaySnapIndicator)  { _somedaySnapIndicator.remove();  _somedaySnapIndicator  = null; }
    if (_somedayDragSource) {
      _somedayDragSource.classList.remove('someday-dragging-source');
      // _cleanupSomedayDrag と同じ理由で viewMode に応じて復元する
      _somedayDragSource.draggable = (viewMode !== 'timeline');
      _somedayDragSource.style.touchAction = '';
      _somedayDragSource = null;
    }
    document.body.classList.remove('touch-dragging');
    _somedayDragTaskId = null; _somedayDragging = false; _somedayDragTimer = null;
    _somedayDragStartX = 0; _somedayDragStartY = 0; _somedayPointerType = ''; _somedayDragDurM = 0;
    _somedayPointerActive = false;
  }
  if (_tlResizing) {
    if (_tlResizeCard) _tlResizeCard.classList.remove('tl-resizing');
    _tlResizing = false; _tlResizeTaskId = null; _tlResizeCard = null;
    _tlResizeOrigEndM = 0; _tlResizeStartM = 0;

  if (_tlTopResizing || _tlTopResizeCard) {
    if (_tlTopResizeCard) _tlTopResizeCard.classList.remove('tl-top-resizing');
    if (_tlTopResizeHandle) {
      _tlTopResizeHandle.removeEventListener('pointermove', _onTlTopResizePointerMove);
      _tlTopResizeHandle.removeEventListener('pointerup',   _onTlTopResizePointerUp);
      _tlTopResizeHandle.removeEventListener('pointercancel', _onTlTopResizePointerCancel);
    }
    _tlTopResizing = false; _tlTopResizeTaskId = null; _tlTopResizeCard = null;
    _tlTopResizeHandle = null; _tlTopResizeOrigStartM = 0; _tlTopResizeOrigEndM = 0;
    _tlTopResizeStartY = 0;

window.addEventListener('pointerup',     _tlGlobalPointerEnd);
window.addEventListener('pointercancel', _tlGlobalPointerEnd);

  if (demoMode) {
    el.classList.remove('off');
    el.classList.add('demo');
    lb.textContent = 'DEMO MODE';
    return;
  }
  el.classList.remove('demo');
  el.classList.toggle('off', !connected);
  lb.textContent = connected ? `${Storage.vaultName} 接続済み` : '未接続';
}

// ============================================================
// CONNECT SCREEN
// ============================================================
function _showGDriveExpiredToast() {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2)';
  t.textContent = '接続が切れました。再読み込みしてサインインしてください。';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

function showConnect(title, desc, btnText, action) {
  document.getElementById('connect-screen').style.display = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('connect-title').textContent = title;
  document.getElementById('connect-desc').innerHTML = desc;
  const btn = document.getElementById('connect-btn');
  btn.textContent = btnText; btn.onclick = action;
}
function showApp() {
  document.getElementById('connect-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  setVaultUI(true); refreshRecurringInstances(); render(); checkReview();
  _loadGCalForDate(heroAnchorDate); // 今日分をバックグラウンドで先行フェッチ
}

function onTryDemoClick() {
  Storage.enterDemoMode();
  document.body.classList.add('demo-mode');
  showApp();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  const result = await Storage.tryRestore();
  if (result === true) {
    showApp();
  } else if (result === 'prompt') {
    showConnect(
      'Vaultへの接続を再開',
      'データを読み込むために、Vaultフォルダへのアクセスを再度許可してください。',
      'アクセスを許可する',
      async () => { if (await Storage.requestPermission()) showApp(); }
    );
  } else if (result === 'gdrive-restore') {
    showConnect(
      'Google Driveに再接続',
      'データを読み込むために、Googleアカウントへのサインインが必要です。',
      'Googleでサインイン',
      async () => {
        try { await Storage.reconnectGDrive(); showApp(); }
        catch (e) { alert('接続に失敗しました: ' + e.message); }
      }
    );
  } else if (result === 'gdrive-new') {
    showConnect(
      'Google Driveに接続',
      'Googleアカウントにサインインして、タスクデータをGoogle Driveに保存します。<br><small style="color:var(--gray-400)">データは Google Drive の <code>Achievia/data.json</code> に保存されます。</small>',
      'Googleでサインイン',
      async () => {
        try { await Storage.connectGDrive(); showApp(); }
        catch (e) { alert('接続に失敗しました: ' + e.message); }
      }
    );
  } else {
    showConnect(
      'Vaultに接続',
      'ObsidianのVaultフォルダを選択してください。タスクデータはVault内の <code>Achievia/data.json</code> に保存されます。',
      'フォルダを選択して接続',
      async () => {
        try { await Storage.connect(); showApp(); }
        catch (e) { if (e.name !== 'AbortError') alert('接続に失敗しました: ' + e.message); }
      }
    );
  }
}

init();
</script>
</body>
</html>
