}

function _expandFutureLabel(cur) {
  if (cur < 7)  return { label: `さらに1週間後までを表示`, next: 7 };
  const nextWeeks = Math.floor((cur + 7) / 7);
  return { label: `さらに1週間分を表示（${nextWeeks}週間後まで）`, next: cur + 7 };
}

function _expandPastLabel(cur) {
  if (cur < 7)  return { label: `さらに1週間前までを表示`, next: 7 };
  const nextWeeks = Math.floor((cur + 7) / 7);
  return { label: `さらに1週間分を表示（${nextWeeks}週間前まで）`, next: cur + 7 };
}

function expandFutureWindow(n) {
  _futureWindow = n;
  if (recurringWindow < n + 3) { recurringWindow = n + 3; refreshRecurringInstances(); }
  renderTaskList();
}

function expandPastWindow(n) { _pastWindow = n; renderTaskList(); }

function togglePastSection()   { _pastShown   = !_pastShown;   renderTaskList(); }
function toggleFutureSection() { _futureShown = !_futureShown; renderTaskList(); }

function resetTaskWindows() { _futureWindow = 3; _futureShown = true; _pastShown = false; _pastWindow = 3; renderTaskList(); }

function renderTaskList() {
  const el = document.getElementById('task-list'); if (!el) return;
  const d = D();
  if (viewMode === 'timeline') { el.innerHTML = renderTimeline(d); return; }

  const t = todayStr();
  const byDate = {};
  d.tasks.forEach(task => {
    if (!task.scheduledDate) return;
    // 複数日タスク：estimatedHoursByDate の各日にスロットとして配置（重複日付は最初の1件のみ）
    const ebd = task.estimatedHoursByDate;
    if (Array.isArray(ebd) && ebd.length >= 2 && task.type !== 'divider' && task.status !== 'completed') {
      ebd.forEach((entry, idx) => {
        const slot = Object.assign({}, task, { _slotIdx: idx, _slotTotal: ebd.length, _slotHours: entry.hours, _slotDate: entry.date, order: entry.order ?? task.order });
        (byDate[entry.date] = byDate[entry.date] || []).push(slot);
      });
      return;
    }
    (byDate[task.scheduledDate] = byDate[task.scheduledDate] || []).push(task);
  });

  let html = '';

  // ── 過去セクション ────────────────────────────────────────
  const allPastDates = Object.keys(byDate).filter(d => d < t).sort((a,b) => a > b ? -1 : 1); // 新しい順
  const totalPastCount = allPastDates.reduce((s, d) => s + (byDate[d]||[]).filter(x=>x.type!=='divider').length, 0);

  html += `
    <div class="past-section">
      <div class="past-section-header" onclick="togglePastSection()">
        <span class="section-toggle ${_pastShown?'':'closed'}">▼</span>
        <span style="font-size:13px;font-weight:600;color:var(--gray-500)">過去のタスク</span>
      </div>`;

  if (_pastShown) {
    const pastCutoff  = _offsetDate(-_pastWindow);
    const hiddenOlder = allPastDates.some(d => d < pastCutoff);
    // 「さらに古い日を表示」ボタン（上部）
    if (hiddenOlder) {
      const { label, next } = _expandPastLabel(_pastWindow);
      html += `<div style="padding:4px 12px 2px"><button class="recurring-more-btn" onclick="expandPastWindow(${next})">▲ ${label}</button></div>`;
    }
    // ウィンドウ内の全日付を古い順に表示（タスク0件でも表示）
    for (let i = _pastWindow; i >= 1; i--) {
      const date  = _offsetDate(-i);
      const tasks = (byDate[date] || []).sort((a, b) => a.order - b.order);
      html += _renderDateSection(date, tasks, d, true);
    }
  }

  html += `</div>`;

  // ── 今日 ──────────────────────────────────────────────────
  const todayTasks = (byDate[t] || []).sort((a, b) => a.order - b.order);
  html += _renderDateSection(t, todayTasks, d, false);

  // ── 今後のタスク セクション ───────────────────────────────
  const futureTotalCount = (() => {
    let n = 0;
    for (let i = 1; i <= _futureWindow; i++) {
      n += (byDate[_offsetDate(i)] || []).filter(x => x.type !== 'divider').length;
    }
    return n;
  })();

  html += `
    <div class="future-section">
      <div class="past-section-header" onclick="toggleFutureSection()">
        <span class="section-toggle ${_futureShown ? '' : 'closed'}">▼</span>
        <span style="font-size:13px;font-weight:600;color:var(--gray-500)">今後のタスク</span>
      </div>`;

  if (_futureShown) {
    for (let i = 1; i <= _futureWindow; i++) {
      const date  = _offsetDate(i);
      const tasks = (byDate[date] || []).sort((a, b) => a.order - b.order);
      // 0件でもセクションを表示（D&Dのドロップ先として機能）
      html += _renderDateSection(date, tasks, d, false);
    }

    const { label: futureLabel, next: futureNext } = _expandFutureLabel(_futureWindow);
    const hasReset = _futureWindow > 3 || _pastShown;
    html += `<div style="padding:4px 12px 8px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="recurring-more-btn" onclick="expandFutureWindow(${futureNext})">${futureLabel} ▼</button>
      ${hasReset ? `<button class="recurring-more-btn" onclick="resetTaskWindows()" style="color:var(--gray-400)">表示をリセット ✕</button>` : ''}
    </div>`;
  }

  html += `</div>`;

  if (!html) html = `<div class="empty-state">タスクがありません</div>`;
  el.innerHTML = html;

  if (editingTaskId) {
    const inp = el.querySelector(`[data-edit="${editingTaskId}"]`);
    if (inp) {
      if (!_editCache[editingTaskId]) {
        const t = D().tasks.find(x => x.id === editingTaskId);
        if (t) _editCache[editingTaskId] = { title: t.title, notes: t.notes || '' };
      }
      inp.focus(); inp.select();
    }
  }
}

function taskRow(task, d) {
  const proj = d.projects.find(p => p.id === task.projectId);
  const wt   = d.workTypes.find(w => w.id === task.workType);
  const done = task.status === 'completed';
  const editing = editingTaskId === task.id;
  const recTmpl = task.recurringId ? (d.recurringTemplates||[]).find(t => t.id === task.recurringId) : null;
  const recBadge = recTmpl?.recurring
    ? `<span class="tag" style="background:rgba(99,102,241,.1);color:#6366f1">🔁 ${_recurringLabel(recTmpl.recurring)}</span>`
    : '';
  const today = todayStr();
  const isSlot = task._slotIdx !== undefined;
  const isUnscheduled = !task.scheduledDate && !isSlot;
  const slotDate = task._slotDate || today;
  const slotDone = isSlot ? (task.completedSlots || []).includes(task._slotIdx) : false;
  const effectiveDone = isSlot ? slotDone : done;
  // スロットタスクは slotIdx で partialHours を特定（同日複数スロット対応）
  const _getSlotPartial = (ph, idx) => isSlot
    ? (ph || []).find(p => p.slotIdx === idx)?.hours ?? 0
    : (ph || []).filter(p => p.date === slotDate).reduce((s, p) => s + p.hours, 0);
  const partialOnDate = _getSlotPartial(task.partialHours, task._slotIdx);
  const slotH = task._slotHours ?? task.estimatedHours;
  const slotBadge = isSlot
    ? `<span class="tag" style="background:rgba(99,102,241,.08);color:#6366f1;font-size:10px">${task._slotIdx + 1}/${task._slotTotal}</span>`
    : '';
  const slotIdxParam = isSlot ? task._slotIdx : '';
  // いつかやる欄は予定時間のみ表示・クリックで予定時間のみ編集
  const hoursBadge = isUnscheduled
    ? `<button class="tag-hours" onclick="openEstModal('${task.id}');event.stopPropagation()">${task.estimatedHours || 0}h</button>`
    : effectiveDone
    ? `<span class="tag-hours" style="cursor:default;color:var(--green-600)">${partialOnDate > 0 ? partialOnDate : slotH}h</span>`
    : partialOnDate > 0
    ? `<button class="tag-hours" onclick="openPartialModal('${task.id}','${slotDate}',${slotIdxParam});event.stopPropagation()" style="color:var(--amber-500)">${partialOnDate}h / ${slotH}h</button>`
    : `<button class="tag-hours" onclick="openPartialModal('${task.id}','${slotDate}',${slotIdxParam});event.stopPropagation()">${slotH}h</button>`;
  // ステータスバッジ（いつかやる欄・showStatus:false の作業種類は非表示、完了時は「● 完了」を表示）
  const wtShowStatus = wt ? (wt.showStatus !== false) : true;
  const statusLabel = { pending: '未着手', in_progress: '進行中', waiting: '待ち', completed: '完了' };
  const statusBadge = (!isUnscheduled && wtShowStatus)
    ? (effectiveDone
      ? `<span class="tag-status" data-status="completed">● 完了</span>`
      : (task.status && task.status !== 'completed')
        ? `<button class="tag-status" data-status="${task.status}" onclick="toggleTaskStatus('${task.id}');event.stopPropagation()" title="クリックでステータス変更">● ${statusLabel[task.status] || task.status}</button>`
        : '')
    : '';

  return `
    <div class="task-row${editing?' editing':''}" data-id="${task.id}" data-task-id="${task.id}" data-task-date="${isSlot ? slotDate : (task.scheduledDate || '')}" data-slot-idx="${isSlot ? task._slotIdx : -1}"
      draggable="${editing?'false':'true'}"
      ondragstart="handleDragStart(event,'${task.id}','${isSlot?slotDate:''}',${isSlot?task._slotIdx:''})"
      ondragend="handleDragEnd(event)"
      ondragover="handleDragOver(event)"
      ondrop="handleDropOnTask(event,'${task.id}','${isSlot ? slotDate : (task.scheduledDate || '')}',${isSlot ? task._slotIdx : -1})">
      <div class="task-card">
        <span class="drag-handle">⋮⋮</span>
        <button class="task-check${effectiveDone?' done':''}"${(!effectiveDone && proj) ? ` style="border-color:${proj.color}"` : ''} onclick="${isSlot ? `toggleSlotComplete('${task.id}',${task._slotIdx})` : `toggleTask('${task.id}')`}">
          <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8"><path d="M2 5l2.5 2.5L8 3"/></svg>
        </button>
        <div class="task-title-wrap">
          ${editing
            ? `<input type="text" class="task-title-input" data-edit="${task.id}" value="${esc(task.title)}"
                 oninput="_cacheEdit('${task.id}','title',this.value)"
                 onkeydown="handleTitleEditKey(event,'${task.id}')"
                 onclick="event.stopPropagation()">
               <textarea class="task-memo-edit" data-memo="${task.id}" rows="2"
                 placeholder="メモ..."
                 oninput="_cacheEdit('${task.id}','notes',this.value)"
                 onkeydown="handleMemoEditKey(event,'${task.id}')"
                 onclick="event.stopPropagation()">${esc(task.notes||'')}</textarea>`
            : `<div class="task-title${effectiveDone?' done':''}" onclick="startEdit('${task.id}')">${esc(task.title)}</div>
               ${task.notes
                 ? `<div class="task-memo-preview" onclick="startEdit('${task.id}')">${esc(task.notes.split('\n')[0])}</div>`
                 : ''}`}
        </div>
        <div class="task-tags">
          ${proj ? `<span class="tag" style="background:${proj.color}20;color:${proj.color}">${esc(proj.name)}</span>` : ''}
          ${wt   ? `<span class="tag" style="background:${wt.color}20;color:${wt.color}">${esc(wt.label)}</span>` : ''}
          ${recBadge}
          ${slotBadge}
          ${statusBadge}
        </div>
        <div class="task-actions">
          <button class="task-action-btn" onclick="openEditModal('${task.id}');event.stopPropagation()" title="編集">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10.5h2.5l5.5-5.5-2.5-2.5L2 8v2.5zm6.5-6.5 1 1"/></svg>
          </button>
          ${!isUnscheduled ? `<button class="task-action-btn" onclick="taskToNote('${task.id}');event.stopPropagation()" title="Noteに複製 →">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5h9M8 3.5l3 3-3 3"/></svg>
          </button>` : ''}
          <button class="task-action-btn danger" onclick="${isSlot ? `deleteSlotTask('${task.id}','${slotDate}',${task._slotIdx})` : `deleteTaskWithRecurringCheck('${task.id}')`};event.stopPropagation()" title="削除">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2.5 2.5l8 8M10.5 2.5l-8 8"/></svg>
          </button>
        </div>
      </div>
      <div class="task-time"${isUnscheduled ? ' style="min-width:40px"' : ''}>${hoursBadge}</div>
    </div>`;
}

function startEdit(id) { if (editingTaskId && editingTaskId !== id) saveInlineEdit(editingTaskId); editingTaskId = id; renderTaskList(); renderNotes(); }

// ── Inline edit helpers ──────────────────────────────────────
let _editCache = {};

function _cacheEdit(id, field, val) {
  if (!_editCache[id]) _editCache[id] = {};
  _editCache[id][field] = val;
}

function handleTitleEditKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveInlineEdit(id); }
  else if (e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    const memo = document.querySelector(`[data-memo="${id}"]`);
    if (memo) { memo.focus(); memo.setSelectionRange(memo.value.length, memo.value.length); }
  }
  else if (e.key === 'Escape') { e.preventDefault(); saveInlineEdit(id); }
}

function handleMemoEditKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveInlineEdit(id); }
  else if (e.key === 'Escape') { e.preventDefault(); saveInlineEdit(id); }
}

function saveInlineEdit(id) {
  const d = D();
  const task = d.tasks.find(t => t.id === id);
  if (task && _editCache[id]) {
    if (_editCache[id].title !== undefined && _editCache[id].title.trim()) task.title = _editCache[id].title.trim();
    if (_editCache[id].notes !== undefined) task.notes = _editCache[id].notes;
  }
  delete _editCache[id];
  editingTaskId = null;
  commit();
}

// Capture-phase outside-click to close inline edit
document.addEventListener('click', function(e) {
  if (!editingTaskId) return;
  const row = document.querySelector(`.task-row[data-id="${editingTaskId}"]`);
  if (row && !row.contains(e.target)) saveInlineEdit(editingTaskId);
}, true);
function toggleMultiDay(id) {
  _multidayExpanded.has(id) ? _multidayExpanded.delete(id) : _multidayExpanded.add(id);
  renderMultiDay();
}

function toggleSec(key) {
  collapsedSections[key] = !collapsedSections[key];
  if (key === '_unsched') renderNotes();
  else if (key === '_multiday') renderMultiDay();
  else renderTaskList();
}

// ============================================================
// RENDER — TIMELINE
// ============================================================
function renderTimeline(d) {
  const t = todayStr();
  const tasks = d.tasks.filter(x => x.scheduledDate === t && x.type !== 'divider').sort((a,b) => a.order - b.order);
  const hours = Array.from({length:14},(_,i)=>i+9);

  let slot = 0;
  const cards = tasks.map(task => {
    const h = task.estimatedHours || 1;
    const top = slot * 50, height = Math.max(h * 50 - 4, 24);
    slot += h;
    const proj = d.projects.find(p => p.id === task.projectId);
    const done = task.status === 'completed';
    return `<div class="timeline-task" data-id="${task.id}"
      style="top:${top}px;height:${height}px;cursor:pointer;opacity:${done?'.5':'1'}"
      draggable="true"
      ondragstart="handleDragStart(event,'${task.id}')"
      ondragend="handleDragEnd(event)"
      ondragover="handleDragOver(event)"
      ondrop="handleDropOnTask(event,'${task.id}','${task.scheduledDate || ''}')"
      onclick="toggleTask('${task.id}')">
      <div style="font-weight:600;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${done?'text-decoration:line-through':''}">${esc(task.title)}</div>
      ${proj ? `<div style="font-size:10px;opacity:.65">${esc(proj.name)}</div>` : ''}
      <div style="font-size:10px;opacity:.65">${task.estimatedHours}h</div>
    </div>`;
  }).join('');

  return `<div style="padding:12px">
    <div class="timeline-wrap">
      <div class="timeline-hours">${hours.map(h=>`<div class="timeline-hour-label">${h}:00</div>`).join('')}</div>
      <div class="timeline-grid">
        ${hours.map(()=>`<div class="timeline-grid-line"></div>`).join('')}
        ${cards}
      </div>
    </div>
  </div>`;
}

// ============================================================
// RENDER — NOTES
// ============================================================
function renderMultiDay() {
  const el = document.getElementById('multiday-panel'); if (!el) return;
  const d = D();
  const multiTasks = d.tasks.filter(x =>
    x.type !== 'divider' && x.status !== 'completed' &&
    Array.isArray(x.estimatedHoursByDate) && x.estimatedHoursByDate.length >= 2
  );
  if (multiTasks.length === 0) {
    const col = collapsedSections['_multiday'];
    el.innerHTML = `<div class="multiday-section">
      <div class="multiday-header" onclick="toggleSec('_multiday')">
        <span class="section-toggle ${col?'closed':''}">▼</span>
        <span>分割タスク</span>
        <span style="color:var(--gray-400);font-weight:400">0件</span>
      </div>
      ${col ? '' : `<div style="padding:10px 4px 10px 14px;font-size:12px;color:var(--gray-400)">分割タスクはありません</div>`}
    </div>`;
    return;
  }

  const col = collapsedSections['_multiday'];
  const wd = ['日','月','火','水','木','金','土'];

  const cards = multiTasks.map(task => {
    const ebd = task.estimatedHoursByDate;
    const totalDays = ebd.length;
    const doneDays = ebd.filter((_, i) => (task.completedSlots || []).includes(i)).length;
    const isExp = _multidayExpanded.has(task.id);
    const toggleIcon = isExp ? '▼' : '▶';

    const dayRows = ebd.map((e, i) => {
      // slotIdx ベース（分割タスクの正規キー）→ date ベース（旧形式 fallback）の順で検索
      const ph = (task.partialHours || []).find(p => p.slotIdx === i)
              || (task.partialHours || []).find(p => p.date === e.date && p.slotIdx === undefined);
      const actual = ph ? ph.hours : null;
      const slotChecked = (task.completedSlots || []).includes(i);
      const [y,m,dd] = e.date.split('-').map(Number);
      const dayW = wd[new Date(y, m-1, dd).getDay()];
      const label = `${m}/${dd}（${dayW}）`;
      const actualStr = actual !== null ? `${_fmtH(actual)}h` : '—h';
      return `<div class="multiday-day-row">
        <span class="task-check${slotChecked?' done':''}" style="width:16px;height:16px;min-width:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;pointer-events:none">
          <svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="1.8"><path d="M2 5l2.5 2.5L8 3"/></svg>
        </span>
        <span class="multiday-day-date">${label}</span>
        <span class="multiday-day-hours">${actualStr}/${_fmtH(e.hours)}h</span>
      </div>`;
    }).join('');

    return `<div class="multiday-card">
      <div class="multiday-card-row">
        <span class="multiday-toggle" onclick="toggleMultiDay('${task.id}')">${toggleIcon}</span>
        <span class="multiday-title">${esc(task.title)}</span>
        <span class="multiday-meta">${doneDays}/${totalDays}</span>
        ${(() => {
          const hasPartial = (task.partialHours || []).some(p => p.hours > 0);
          if (doneDays === totalDays) return `<span class="multiday-status done">完了</span>`;
          if (doneDays > 0 || hasPartial) return `<span class="multiday-status doing">進行中</span>`;
          return `<span class="multiday-status todo">未着手</span>`;
        })()}
      </div>
      ${isExp ? `<div class="multiday-days">${dayRows}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="multiday-section">
      <div class="multiday-header" onclick="toggleSec('_multiday')">
        <span class="section-toggle ${col?'closed':''}">▼</span>
        <span>分割タスク</span>
        <span style="color:var(--gray-400);font-weight:400">${multiTasks.length}件</span>
      </div>
      ${col ? '' : cards}
    </div>`;
}

function expandNote(id) {
  // 既存の外側クリックハンドラを解除
  if (_noteOutsideClickFn) {
    document.removeEventListener('click', _noteOutsideClickFn, true);
    _noteOutsideClickFn = null;
  }
  // 別のカードを開く場合は現在の編集を保存
  if (expandedNoteId && expandedNoteId !== id) _flushNoteEdit(expandedNoteId);
  expandedNoteId = expandedNoteId === id ? null : id;
  if (expandedNoteId === null && arguments[1] !== 'silent') {
    // カードを閉じるなら保存（第2引数'silent'のときはスキップ）
  }
  renderNotes();
  // 展開後に外側クリックで閉じるハンドラを設定
  if (expandedNoteId) {
    _noteOutsideClickFn = function(e) {
      const card = document.querySelector('.note-card.expanded');
      if (card && !card.contains(e.target)) closeExpandedNote();
    };
    setTimeout(() => document.addEventListener('click', _noteOutsideClickFn, true), 0);
  }
}
function _flushNoteEdit(id) {
  const content = _noteEditContent[id];
  if (content === undefined) return false;
  delete _noteEditContent[id];
  const n = D().notes.find(x => x.id === id);
  if (!n) return false;
  n.content = content; n.updatedAt = new Date().toISOString();
  return true;
}
function closeExpandedNote() {
  if (_noteOutsideClickFn) {
    document.removeEventListener('click', _noteOutsideClickFn, true);
    _noteOutsideClickFn = null;
  }
  if (expandedNoteId) {
    const changed = _flushNoteEdit(expandedNoteId);
    if (changed) Storage.save();
  }
  expandedNoteId = null;
  renderNotes();
}
function handleNoteTextareaKey(e, id) {
  if (e.isComposing) return;
  if (e.key === 'Escape') { e.preventDefault(); closeExpandedNote(); }
  else if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); closeExpandedNote(); }
}
function handleSomedayAdd() {
  const inp = document.getElementById('someday-add-input');
  const notesEl = document.getElementById('someday-notes');
  const title = inp ? inp.value.trim() : '';
  if (!title) return;
  const notes = notesEl ? notesEl.value.trim() : '';
  const d = D();
  d.tasks.push({ id: genId(), type: 'task', title, notes,
    projectId: _somedayProjectId, workType: _somedayWorkTypeId,
    priority: 'medium', estimatedHours: 1, actualHours: null, partialHours: [],
    startTime: null, deadline: null, status: 'pending', tagIds: [], scheduledDate: null,
    recurring: null, recurringId: null, order: d.tasks.length,
    completedAt: null, createdAt: new Date().toISOString() });
  commit();
  _resetSomedayState();
  if (inp) inp.value = '';
  if (notesEl) notesEl.value = '';
  const detail = document.getElementById('someday-detail');
  if (detail) detail.style.display = 'none';
}
function handleAddNote() {
  const inp = document.getElementById('note-input');
  if (!inp.value.trim()) return;
  addNote(inp.value, _noteProjectId, _noteWorkTypeId);
  inp.value = '';
  _resetNoteState();
}

// ── Calendar helpers ──────────────────────────────────────────
function _calDateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function _getCalViewDays(view, anchor) {
  const base = new Date(anchor + 'T00:00:00');
  const days = [];
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let cols = 7;

  if (view === 'month') {
    const y = base.getFullYear(), m = base.getMonth();
    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const daysInPrev  = new Date(y, m, 0).getDate();
    for (let i = firstDay-1; i >= 0; i--) {
      const dt = new Date(y, m-1, daysInPrev-i);
      days.push({ date: _calDateToStr(dt), cur: false });
    }
    for (let i = 1; i <= daysInMonth; i++) days.push({ date: `${y}-${pad(m+1)}-${pad(i)}`, cur: true });
    while (days.length % 7) {
      const dt = new Date(y, m+1, days.length - daysInMonth - firstDay + 1);
      days.push({ date: _calDateToStr(dt), cur: false });
    }
    cols = 7;
  } else if (view === '2week') {
    const ws = new Date(base); ws.setDate(base.getDate() - base.getDay());
    for (let i = 0; i < 14; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 7;
  } else if (view === 'week') {
    const ws = new Date(base); ws.setDate(base.getDate() - base.getDay());
    for (let i = 0; i < 7; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 7;
  } else if (view === 'workday') {
    const ws = new Date(base); ws.setDate(base.getDate() - ((base.getDay()||7) - 1)); // Monday
    for (let i = 0; i < 5; i++) { const d = new Date(ws); d.setDate(ws.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 5;
  } else if (view === '3day') {
    for (let i = -1; i <= 1; i++) { const d = new Date(base); d.setDate(base.getDate()+i); days.push({ date: _calDateToStr(d), cur: true }); }
    cols = 3;
  } else if (view === 'day') {
    days.push({ date: anchor, cur: true });
    cols = 1;
  }
  return { days, cols };
}
function _calViewTitle(view, anchor) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const base = new Date(anchor + 'T00:00:00');
  if (view === 'month') return `${base.getFullYear()}年${months[base.getMonth()]}`;
  const { days } = _getCalViewDays(view, anchor);
  if (!days.length) return '';
  const first = new Date(days[0].date + 'T00:00:00');
  const last  = new Date(days[days.length-1].date + 'T00:00:00');
  const fmt = d => `${d.getFullYear()}年${months[d.getMonth()]}${d.getDate()}日`;
  if (view === 'day') return fmt(first);
  // 全範囲：「2026年5月25日 - 2026年5月29日」形式（月またぎ・年またぎも同様）
  return `${fmt(first)} - ${fmt(last)}`;
}

function renderCalendar() {
  const el = document.getElementById('calendar-card'); if (!el) return;
  const d = D(); const t = todayStr();
  const wdaysAll = ['日','月','火','水','木','金','土'];
  const views = ['month','2week','week','workday','3day','day'];
  const viewLabels = { month:'月', '2week':'2週', week:'週', workday:'稼働日', '3day':'3日間', day:'日' };

  // Sync month view anchor
  if (calView === 'month') {
    const base = new Date(calAnchorDate + 'T00:00:00');
    calYear = base.getFullYear(); calMonth = base.getMonth();
  }

  const viewBtns = views.map(v =>
    `<button class="cal-view-btn${calView===v?' active':''}" onclick="setCalView('${v}')">${viewLabels[v]}</button>`
  ).join('');
  const title = _calViewTitle(calView, calAnchorDate);

  const { days, cols } = _getCalViewDays(calView, calAnchorDate);

  let gridHtml;
  if (calView === 'day') {
    // Day view: detailed list
    const dateStr = calAnchorDate;
    const dayTasks = d.tasks.filter(x => x.scheduledDate === dateStr && x.type !== 'divider').sort((a,b)=>(a.order||0)-(b.order||0));
    const review = (d.reviews||[]).find(r => r.date === dateStr);
    gridHtml = `<div class="cal-day-view">
      ${review ? `<div class="cal-day-review">★ ${review.score}/100 &nbsp;${review.scoreLabel}&nbsp;&nbsp;稼働 ${_fmtH(review.actualHours)}h${review.reviewMemo ? `<div class="cal-day-memo">${esc(review.reviewMemo)}</div>` : ''}</div>` : ''}
      ${dayTasks.length ? dayTasks.map(task => `
        <div class="cal-day-task">
          <span class="cal-day-task-status">${task.status==='completed'?'✅':'○'}</span>
          <span class="cal-day-task-title">${esc(task.title)}</span>
          <span class="cal-day-task-h">${task.actualHours ? _fmtH(task.actualHours)+'h' : _fmtH(task.estimatedHours||1)+'h'}</span>
        </div>`).join('')
      : `<div style="color:var(--gray-400);font-size:13px;padding:16px;text-align:center">タスクなし</div>`}
    </div>`;
  } else {
    // Grid view
    const wdayHdr = calView === 'workday'
      ? ['月','火','水','木','金'].map(w=>`<div class="cal-weekday">${w}</div>`).join('')
      : calView === '3day'
      ? days.map(({date})=>{ const dt=new Date(date+'T00:00:00'); return `<div class="cal-weekday">${wdaysAll[dt.getDay()]}</div>`; }).join('')
      : wdaysAll.map(w=>`<div class="cal-weekday">${w}</div>`).join('');

    const cellsHtml = days.map(({ date: ds, cur }) => {
      const dayTasks = d.tasks.filter(x => x.scheduledDate === ds && x.type !== 'divider');
      const doneCount = dayTasks.filter(x => x.status === 'completed').length;
      const review = (d.reviews||[]).find(r => r.date === ds);
      const dots = dayTasks.slice(0,5).map(x => `<div class="cal-dot${x.status==='completed'?' done':''}"></div>`).join('');
      return `<div class="cal-cell${ds===t?' today':''}${!cur?' other-month':''}" onclick="openDayDetail('${ds}')">
        <div class="cal-day-num">${new Date(ds+'T00:00:00').getDate()}</div>
        ${dayTasks.length ? `<div class="cal-dot-row">${dots}</div><div class="cal-count">${doneCount}/${dayTasks.length}</div>` : ''}
        ${review ? `<div class="cal-score">★${review.score}</div>` : ''}
      </div>`;
    }).join('');

    gridHtml = `<div class="cal-grid" style="grid-template-columns:repeat(${cols},1fr)">${wdayHdr}${cellsHtml}</div>`;
  }

  el.innerHTML = `
    <div class="cal-header" style="flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="goCalToday()" title="今日を含む期間へ">今日</button>
        <button class="btn btn-outline btn-sm" onclick="moveCalView(-1)">←</button>
        <button class="btn btn-outline btn-sm" onclick="moveCalView(1)">→</button>
        <span class="cal-title">${title}</span>
      </div>
      <div class="cal-view-btns">${viewBtns}</div>
    </div>
    ${gridHtml}`;
}

function setCalView(view) {
  calView = view;
  if (view === 'month') calAnchorDate = `${calYear}-${pad(calMonth+1)}-01`;
  renderCalendar();
}
function moveCalView(delta) {
  const base = new Date(calAnchorDate + 'T00:00:00');
  switch (calView) {
    case 'month': base.setMonth(base.getMonth()+delta); base.setDate(1); break;
    case '2week': base.setDate(base.getDate()+delta*14); break;
    case 'week':
    case 'workday': base.setDate(base.getDate()+delta*7); break;
    case '3day': base.setDate(base.getDate()+delta*3); break;
    case 'day':  base.setDate(base.getDate()+delta); break;
  }
  calAnchorDate = _calDateToStr(base);
  if (calView === 'month') { calYear = base.getFullYear(); calMonth = base.getMonth(); }
  renderCalendar();
}
// Keep old moveMonth/selDate as aliases for safety
function moveMonth(delta) { moveCalView(delta); }
function goCalToday() {
  calAnchorDate = todayStr();
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  renderCalendar();
}
function selDate(ds) { openDayDetail(ds); }

// ── Day detail popup ──────────────────────────────────────────
function openDayDetail(dateStr) {
  const d = D();
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const wdays  = ['日','月','火','水','木','金','土'];
  const dt = new Date(dateStr + 'T00:00:00');
  const titleStr = `${dt.getMonth()+1}月${dt.getDate()}日（${wdays[dt.getDay()]}）`;

  const tasks    = d.tasks.filter(x => x.scheduledDate === dateStr && x.type !== 'divider').sort((a,b)=>(a.order||0)-(b.order||0));
  const done     = tasks.filter(t => t.status === 'completed');
  const pending  = tasks.filter(t => t.status !== 'completed');
  const review   = (d.reviews||[]).find(r => r.date === dateStr);
  const totalH   = done.reduce((s, t) => s + (t.actualHours ?? t.estimatedHours ?? 0), 0);

  const taskLine = t => {
    const proj = t.projectId ? d.projects.find(p=>p.id===t.projectId) : null;
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--gray-100);font-size:13px">
      <span style="color:var(--green-500);flex-shrink:0">${t.status==='completed'?'✅':'○'}</span>
      <span style="flex:1">${esc(t.title)}</span>
      ${proj ? `<span style="font-size:10px;padding:1px 6px;border-radius:100px;background:${proj.color}20;color:${proj.color};font-weight:600">${esc(proj.name)}</span>` : ''}
      <span style="font-size:11px;color:var(--gray-400);flex-shrink:0">${t.actualHours ? _fmtH(t.actualHours)+'h' : _fmtH(t.estimatedHours||1)+'h'}</span>
    </div>`;
  };

  const statsHtml = `<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">
    合計 ${_fmtH(totalH)}h &nbsp;·&nbsp; 完了 ${done.length}/${tasks.length}件${review ? ` &nbsp;·&nbsp; ★ ${review.score}/100` : ''}
  </div>`;

  const doneHtml  = done.length  ? `<div style="font-size:11px;font-weight:600;color:var(--gray-400);margin:8px 0 4px">✓ 完了（${done.length}件）</div>${done.map(taskLine).join('')}`  : '';
  const pendHtml  = pending.length ? `<div style="font-size:11px;font-weight:600;color:var(--gray-400);margin:8px 0 4px">未完了（${pending.length}件）</div>${pending.map(taskLine).join('')}` : '';
  const memoHtml  = review?.reviewMemo ? `<div style="margin-top:12px;font-size:12px;color:var(--gray-600);background:var(--gray-50);border-radius:7px;padding:8px 12px"><span style="font-weight:600">振り返りメモ</span><div style="margin-top:4px;white-space:pre-wrap">${esc(review.reviewMemo)}</div></div>` : '';

  document.getElementById('cal-day-popup-title').textContent = titleStr + ' のタスク';
  document.getElementById('cal-day-popup-content').innerHTML = tasks.length
    ? statsHtml + doneHtml + pendHtml + memoHtml
    : `<div style="color:var(--gray-400);font-size:13px;text-align:center;padding:16px">タスクなし</div>${memoHtml}`;
  document.getElementById('cal-day-popup').style.display = 'flex';
}
function closeDayDetail() {
  document.getElementById('cal-day-popup').style.display = 'none';
}

    }`;
}

function renderReviewRecurring() {
  const el = document.getElementById('review-recurring-card'); if (!el) return;
  const d = D();
  const templates = d.recurringTemplates || [];
  const DN = ['日','月','火','水','木','金','土'];
  const freqLabel = rec => {
    if (!rec) return '';
    switch (rec.frequency) {
      case 'daily':    return '毎日';
      case 'weekdays': return '平日';
      case 'weekly':   return `毎週${(rec.days||[]).map(i=>DN[i]).join('')}`;
      case 'biweekly': return `隔週${(rec.days||[]).map(i=>DN[i]).join('')}`;
      case 'monthly':  return '毎月';
      default: return rec.frequency;
    }
  };

  const rows = templates.map(tmpl => {
    const proj = tmpl.projectId ? d.projects.find(p=>p.id===tmpl.projectId) : null;
    const instances = d.tasks.filter(t => t.recurringId === tmpl.id);
    const doneCount = instances.filter(t => t.status === 'completed').length;
    const freq = freqLabel(tmpl.recurring);
    const startDate = tmpl.recurring?.startDate || null;
    return `
      <div class="review-rec-row">
        <span class="review-freq-badge">🔁 ${esc(freq)}</span>
        <span class="review-rec-title">${esc(tmpl.title)}</span>
        ${proj ? `<span style="font-size:10px;padding:1px 6px;border-radius:100px;background:${proj.color}20;color:${proj.color};font-weight:600">${esc(proj.name)}</span>` : ''}
        <span class="review-rec-meta">${startDate ? `開始 ${startDate} · ` : ''}完了 ${doneCount}回</span>
        <button class="btn btn-outline btn-sm" onclick="openRecurringTemplateEdit('${tmpl.id}')" style="flex-shrink:0">✎</button>
        <button class="btn btn-outline btn-sm" onclick="deleteRecurringTemplate('${tmpl.id}')" style="color:var(--red-500,#ef4444);flex-shrink:0">×</button>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="review-section-hdr">
      <h3>🔁 繰り返しタスク（${templates.length}件）</h3>
    </div>
    ${templates.length
      ? rows
      : `<div style="color:var(--gray-400);font-size:13px;padding:8px 0">繰り返しタスクがありません。タスク編集モーダル（✎）から設定できます。</div>`
    }`;
}

function deleteRecurringTemplate(tmplId) {
  if (!confirm('このテンプレートと今日以降のすべての未完了繰り返しを削除しますか？\n（完了済みは保持されます）')) return;
  const d = D();
  const today = todayStr();
  d.recurringTemplates = (d.recurringTemplates||[]).filter(t => t.id !== tmplId);
  d.tasks = d.tasks.filter(t => {
    if (t.recurringId !== tmplId) return true;          // 無関係なタスクは保持
    if (t.status === 'completed') return true;           // 完了済みは保持
    if (t.scheduledDate && t.scheduledDate < today) return true;  // 過去の未完了は保持
    return false;                                        // 今日以降の未完了を削除
  });
  commit();
  renderReviewRecurring();
}

function handleSettingsDragStart(e, type, id) {
  _settingsDragType = type;
  _settingsDragId   = id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
}
function handleSettingsDragEnd(e) {
  e.currentTarget.style.opacity = '';
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  _settingsDragType = null;
  _settingsDragId   = null;
}
function handleSettingsDragOver(e, type, id) {
  if (_settingsDragType !== type) return;
  e.preventDefault();
  e.stopPropagation();
  const rect = e.currentTarget.getBoundingClientRect();
  _settingsDragAfter = e.clientY > rect.top + rect.height / 2;
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  e.currentTarget.classList.add(_settingsDragAfter ? 'drag-insert-after' : 'drag-insert-before');
}
function handleSettingsDrop(e, type, targetId) {
  e.preventDefault();
  document.querySelectorAll('.settings-item').forEach(el =>
    el.classList.remove('drag-insert-before', 'drag-insert-after')
  );
  if (!_settingsDragId || _settingsDragId === targetId || _settingsDragType !== type) return;
  const d = D();
  const arr = type === 'worktype' ? d.workTypes : d.projects;
  const fromIdx = arr.findIndex(x => x.id === _settingsDragId);
  if (fromIdx === -1) return;
  const [item] = arr.splice(fromIdx, 1);       // 元の位置から取り出す
  let insertIdx = arr.findIndex(x => x.id === targetId);
  if (insertIdx === -1) insertIdx = arr.length;
  if (_settingsDragAfter) insertIdx++;
  arr.splice(insertIdx, 0, item);              // ターゲットの前/後に挿入
  commit();
}

// ============================================================
// REVIEW MODAL  (3-step: 振り返り → スコア → 今日の計画)
// ============================================================
let _reviewDate = null;
let _reviewMemo  = '';
let _reviewStep  = 1;

function _fmtH(h) { return String(parseFloat(h.toFixed(1))); } // 1.0→"1"  1.5→"1.5"

function checkReview() {
  const d = D(); const yest = yesterdayStr(); const t = todayStr();
  if (d.lastReviewShown === t) return;
  const yTasks = d.tasks.filter(x => x.scheduledDate === yest && x.type !== 'divider');
  if (!yTasks.length) return;
  if (d.reviews.some(r => r.date === yest)) return;
  openReview(yest);
}

function openReview(date) {
  _reviewDate = date;
  _reviewMemo  = '';
  _reviewStep  = 1;
  _renderReviewStep1();
  document.getElementById('review-modal').style.display = '';
}

// ── Step 1: 振り返り ──────────────────────────────────────
function _renderReviewStep1() {
  _reviewStep = 1;
  const date  = _reviewDate;
  const tasks = D().tasks.filter(x => x.scheduledDate === date && x.type !== 'divider');
  const done    = tasks.filter(t => t.status === 'completed');
  const pending = tasks.filter(t => t.status !== 'completed');
  const doneActualH = done.reduce((s,t) => s + (t.actualHours ?? t.estimatedHours ?? 0), 0);
  const dt = new Date(date + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'][dt.getDay()];
  const dl = `${dt.getMonth()+1}/${dt.getDate()}（${wd}）`;

  const doneRows = done.map(t => `
    <div class="review-task-row">
      <span class="review-check" style="color:var(--green-500)">✓</span>
      <span class="review-title done">${esc(t.title)}</span>
      <span class="review-hours">${t.actualHours ?? t.estimatedHours}h</span>
    </div>`).join('');

  const pendingRows = pending.map(t => `
    <div class="review-task-row">
      <span class="review-check" style="color:var(--gray-400)">◯</span>
      <span class="review-title">${esc(t.title)}</span>
      <div class="review-task-actions">
        <input type="number" id="rp-${t.id}" class="review-partial-input no-spin"
          placeholder="${t.estimatedHours}" min="0" max="24" step="0.5">
        <span style="font-size:11px;color:var(--gray-400)">h</span>
        <button class="btn btn-outline btn-sm" onclick="reviewMarkDone('${t.id}')">完了</button>
        <button class="btn btn-outline btn-sm" onclick="reviewPostpone('${t.id}')">→今日</button>
        <button class="btn btn-outline btn-sm" style="color:var(--red-500)" onclick="reviewDelete('${t.id}')">🗑</button>
      </div>
    </div>`).join('');

  document.getElementById('review-modal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">${dl} の振り返り</span>
          <span style="font-size:12px;color:var(--gray-500)">合計労働時間 ${_fmtH(doneActualH)}h</span>
        </div>
        <div class="modal-body">
          <div style="font-size:12px;color:var(--gray-500);margin-bottom:12px">完了済みタスクの確認 &amp; 未完了タスクの処理</div>
          ${done.length ? `<div class="review-section-title">✅ 完了（${done.length}件）</div>${doneRows}` : ''}
          ${pending.length ? `<div class="review-section-title">○ 未完了（${pending.length}件）</div>${pendingRows}` : ''}
          ${!done.length && !pending.length ? `<div class="empty-state">昨日のタスクはありません</div>` : ''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="skipReview()">スキップ</button>
          <button class="btn btn-primary" onclick="_renderReviewStep2()">次へ →</button>
        </div>
      </div>
    </div>`;
}

function reviewMarkDone(taskId) {
  const inp = document.getElementById(`rp-${taskId}`);
  const hours = inp && inp.value !== '' ? parseFloat(inp.value) : null;
  const t = D().tasks.find(x => x.id === taskId);
  if (!t) return;
  t.status = 'completed';
  t.completedAt = new Date().toISOString();
  t.actualHours = hours ?? t.estimatedHours;
  Storage.save();
  _renderReviewStep1();
}

function reviewPostpone(taskId) {
  const t = D().tasks.find(x => x.id === taskId);
  if (t) { t.scheduledDate = todayStr(); }
  Storage.save();
  _renderReviewStep1();
}

function reviewDelete(taskId) {
  const d = D();
  d.tasks = d.tasks.filter(x => x.id !== taskId);
  Storage.save();
  _renderReviewStep1();
}

// ── Step 2: スコア ────────────────────────────────────────
function _calcScore(date) {
  const d = D();
  const tasks   = d.tasks.filter(x => x.scheduledDate === date && x.type !== 'divider');
  const done    = tasks.filter(t => t.status === 'completed');
  const totalCount = tasks.length;
  const doneCount  = done.length;

  // 完了率スコア（40点満点）
  const completionRate  = totalCount > 0 ? doneCount / totalCount : 0;
  const completionScore = completionRate * 40;

  // 予実精度スコア（30点満点）
  const withData = done.filter(t => t.actualHours != null && (t.estimatedHours || 0) > 0);
  let predAccuracy = 1.0;
  if (withData.length > 0) {
    const accs = withData.map(t => {
      const a = t.actualHours, e = t.estimatedHours;
      return Math.max(0, 1 - Math.abs(a - e) / Math.max(a, e, 0.1));
    });
    predAccuracy = accs.reduce((s,v) => s + v, 0) / accs.length;
  }
  const predScore = predAccuracy * 30;

  // 稼働時間スコア（30点満点）
  const actualH  = done.reduce((s,t) => s + (t.actualHours ?? 0), 0);
  const past30   = d.reviews.filter(r => r.date < date).slice(-30);
  const baseH    = past30.length > 0
    ? past30.reduce((s,r) => s + (r.actualHours || 0), 0) / past30.length
    : 6;
  const workScore = Math.min(1, actualH / Math.max(baseH, 0.1)) * 30;

  const total = Math.round(completionScore + predScore + workScore);
  const label = total >= 90 ? '優秀！' : total >= 75 ? '良い調子' : total >= 60 ? 'まずまず' : total >= 40 ? 'もう一歩' : '振り返ろう';

  return { score: total, label, completionRate, doneCount, totalCount, actualH, baseH, predAccuracy, doneTasks: done, past30Len: past30.length };
}

function savePartialHours(taskId, targetDate, slotIdx) {
  const inp = document.getElementById('partial-hours-input');
  const estSel = document.getElementById('partial-est-select');
  const hours = parseFloat(inp.value) || 0;
  const t = D().tasks.find(x => x.id === taskId); if (!t) return;
  const date = targetDate || todayStr();
  const hasSlotIdx = slotIdx !== undefined && slotIdx !== 'undefined';
  const idx = hasSlotIdx ? Number(slotIdx) : -1;
  // 予定時間の変更を反映
  if (estSel) {
    const newEst = parseFloat(estSel.value);
    const ebdEntry = hasSlotIdx ? (t.estimatedHoursByDate || [])[idx] : (t.estimatedHoursByDate || []).find(e => e.date === date);
    if (ebdEntry) {
      ebdEntry.hours = newEst;
      t.estimatedHours = t.estimatedHoursByDate.reduce((s, e) => s + e.hours, 0);
    } else {
      t.estimatedHours = newEst;
    }
  }
  if (!t.partialHours) t.partialHours = [];
  if (hasSlotIdx) {
    const existing = t.partialHours.find(p => p.slotIdx === idx);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date, hours, slotIdx: idx });
  } else {
    const existing = t.partialHours.find(p => p.date === date);
    if (existing) existing.hours = hours;
    else t.partialHours.push({ date, hours });
  }
  // partialHours 記録 → 自動的に in_progress に遷移（pending の場合のみ）
  if (hours > 0 && t.status === 'pending') t.status = 'in_progress';
  commit();
  closeCompletionModal();
}

// ============================================================
// DRAG & DROP
// ============================================================
function handleDragStart(e, taskId, slotDate, slotIdx) {
  dragTaskId = taskId;
  dragSlotDate = slotDate || null;
  dragSlotIdx = (slotIdx !== undefined && slotIdx !== '') ? Number(slotIdx) : -1;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
  document.body.classList.add('drag-active');
}
function handleDragEnd(e) {
  e.currentTarget.style.opacity = '';
  clearDragIndicators();
  dragTaskId = null;
  dragSlotDate = null;
  dragSlotIdx = -1;
  _lastDragTaskId = null;
  _lastDragTaskDate = null;
  _lastDragSlotIdx = -1;
  document.body.classList.remove('drag-active');
}
function clearDragIndicators() {
  document.querySelectorAll('.drag-insert-before, .drag-insert-after, .drag-over-zone').forEach(el => {
    el.classList.remove('drag-insert-before', 'drag-insert-after', 'drag-over-zone');
  });
  document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
}
function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const isTaskEl = e.currentTarget.classList.contains('task-row') ||
                   e.currentTarget.classList.contains('timeline-task') ||
                   e.currentTarget.classList.contains('divider-row');
  if (isTaskEl) {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    dragInsertAfter = e.clientY > rect.top + rect.height / 2;
    clearDragIndicators();
    e.currentTarget.classList.add(dragInsertAfter ? 'drag-insert-after' : 'drag-insert-before');
    // セクションドロップ時の挿入位置引き継ぎ用（セクション側では絶対に上書きしない）
    _lastDragTaskId = e.currentTarget.dataset.taskId || null;
    _lastDragTaskDate = e.currentTarget.dataset.taskDate ?? null;
    _lastDragSlotIdx = parseInt(e.currentTarget.dataset.slotIdx ?? '-1');
  } else {
    // タスクのない空セクション・セクション余白へのホバー
    // task-row のガイド線インジケーターはそのまま保持し、zone ハイライトのみ更新
    document.querySelectorAll('.drag-over-zone').forEach(el => el.classList.remove('drag-over-zone'));
    e.currentTarget.classList.add('drag-over-zone');
    // _lastDragTaskId / _lastDragTaskDate は保持（task-row hover のみが更新する）
  }
}
function handleDropOnTask(e, targetTaskId, dateStr, targetSlotIdx) {
  e.preventDefault();
  e.stopPropagation();
  clearDragIndicators();
  if (!dragTaskId) return;
  // 同タスク内スロット並び替え（同一日付のスロット同士のみ → entry.order ベース）
  if (dragTaskId === targetTaskId && dragSlotDate !== null && dragSlotDate === (dateStr || null) && targetSlotIdx >= 0) {
    const d = D();
    const task = d.tasks.find(x => x.id === dragTaskId); if (!task) return;
    const ebd = task.estimatedHoursByDate || [];
    const dragEbdIdx = dragSlotIdx >= 0 ? dragSlotIdx : ebd.findIndex(e2 => e2.date === dragSlotDate);
    // 同日エントリを order でソートした作業リスト
    const sameDayItems = ebd
      .map((en, ei) => ({ en, ei, ord: en.order ?? ei }))
      .filter(({ en }) => en.date === dragSlotDate)
      .sort((a, b) => a.ord - b.ord);
    const fromPos = sameDayItems.findIndex(({ ei }) => ei === dragEbdIdx);
    const toPos   = sameDayItems.findIndex(({ ei }) => ei === targetSlotIdx);
    if (fromPos < 0 || toPos < 0 || fromPos === toPos) return;
    const [moved] = sameDayItems.splice(fromPos, 1);
    const insertAt = dragInsertAfter ? toPos : Math.max(0, toPos - (fromPos < toPos ? 1 : 0));
    sameDayItems.splice(insertAt, 0, moved);
    sameDayItems.forEach(({ en }, pos) => { en.order = pos; }); // entry.order を更新（配列インデックスは変えない）
    commit(); return;
  }
  // 同タスクへのドロップ：スロットのクロス日付移動（dragSlotDate != targetDate）以外はスキップ
  if (dragTaskId === targetTaskId && (!dragSlotDate || dragSlotDate === (dateStr || null))) return;
  const date = dateStr || null;
  const d = D();
  const drag = d.tasks.find(x => x.id === dragTaskId);
  if (!drag) return;
  let movedEntry = null;
  if (dragSlotDate && date) {
    movedEntry = (drag.estimatedHoursByDate || []).find(e2 => e2.date === dragSlotDate);

// ── AI Hours Prediction (heuristic) ────────────────────────
function _predictHoursData(title) {
  const d = D();
  const words = title.toLowerCase().split(/[\s　]+/).filter(w => w.length >= 1);
  if (!words.length) return null;

  const completed = d.tasks.filter(t =>
    t.status === 'completed' && t.actualHours && t.actualHours > 0 && !t.recurringId
  );

  const scored = completed.map(t => {
    const tw = t.title.toLowerCase().split(/[\s　]+/);
    const matches = words.filter(w => tw.some(x => x === w || x.includes(w) || w.includes(x))).length;
    return { task: t, score: matches };
  }).filter(x => x.score > 0);

  scored.sort((a, b) => b.score !== a.score
    ? b.score - a.score
    : new Date(b.task.completedAt||0) - new Date(a.task.completedAt||0)
  );

  const top6 = scored.slice(0, 6);
  if (!top6.length) return null;
  const avg = top6.reduce((s, x) => s + x.task.actualHours, 0) / top6.length;
  return { avg: Math.max(0.5, Math.round(avg * 2) / 2), count: top6.length };
}

document.addEventListener('keydown', e => {
  if (e.isComposing) return;
  const id = e.target.id;
  const isQaInput = id === 'quick-add-input' || id === 'someday-add-input' || id === 'note-input';
  if (!isQaInput) return;

  // Popover navigation (all shortcut-enabled inputs)
  if (_qsTrigger && _qsItems.length) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      _qsPopoverIdx = (_qsPopoverIdx + 1) % _qsItems.length;
      _renderQsPopover(); return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      _qsPopoverIdx = (_qsPopoverIdx - 1 + _qsItems.length) % _qsItems.length;
      _renderQsPopover(); return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); _selectQsItem(_qsPopoverIdx); return;
    }
    if (e.key === 'Escape') { _closeQsPopover(); return; }
  }

  if (id === 'quick-add-input') {
    if (e.key === 'Enter' && !e.shiftKey) handleQuickAdd();
    else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); toggleQuickAddDetail(); }
  }
  // note-input and someday-add-input handle Enter via oninput onkeydown attrs in HTML
});
document.addEventListener('click', e => {
  if (!_qsTrigger) return;
  const p = document.getElementById('qa-popover');
  const isShortcutInput = e.target.id === 'quick-add-input' || e.target.id === 'someday-add-input' || e.target.id === 'note-input';
  if (p && !p.contains(e.target) && !isShortcutInput) _closeQsPopover();
});

// RECURRING TASKS ENGINE
// ============================================================
function _recurringLabel(rec) {
  if (!rec) return '';
  const DN = ['日','月','火','水','木','金','土'];
  switch (rec.frequency) {
    case 'daily':    return '毎日';
    case 'weekdays': return '平日';
    case 'weekly':   return '毎週' + (rec.days||[]).map(i=>DN[i]).join('');
    case 'biweekly': return '隔週' + (rec.days||[]).map(i=>DN[i]).join('');
    case 'monthly':  return '毎月';
    default: return '繰り返し';
  }
}

function _shouldOccur(rec, date) {
  if (!rec) return false;
  const ds = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  if (rec.endDate && ds > rec.endDate) return false;
  const dow = date.getDay();
  switch (rec.frequency) {
    case 'daily':    return true;
    case 'weekdays': return dow >= 1 && dow <= 5;
    case 'weekly':
    case 'biweekly': return (rec.days||[]).includes(dow);
    case 'monthly':  return date.getDate() === (rec.startDay || 1);
    default: return false;
  }
}

function refreshRecurringInstances() {
  const d = D();
  if (!d.recurringTemplates) d.recurringTemplates = [];
  if (!d.recurringTemplates.length) return;

  const todayS = todayStr();

  // Remove old pending instances (keep completed ones)
  d.tasks = d.tasks.filter(t =>
    !t.recurringId ||
    t.status === 'completed' ||
    (t.scheduledDate && t.scheduledDate >= todayS)
  );

  const existingSet = new Set(
    d.tasks.filter(t => t.recurringId).map(t => `${t.recurringId}_${t.scheduledDate}`)
  );

  const todayDate = new Date();
  for (const tmpl of d.recurringTemplates) {
    if (!tmpl.recurring) continue;
    for (let i = 0; i <= recurringWindow; i++) {
      const dt = new Date(todayDate);
      dt.setDate(todayDate.getDate() + i);
      const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      const key = `${tmpl.id}_${dateStr}`;
      if (!_shouldOccur(tmpl.recurring, dt) || existingSet.has(key)) continue;
      existingSet.add(key);
      d.tasks.push({
        id: genId(), type: 'task', title: tmpl.title, notes: tmpl.notes || '',
        projectId: tmpl.projectId || null, workType: tmpl.workType || null,
        estimatedHours: tmpl.estimatedHours || 1, actualHours: null,
        partialHours: [], status: 'pending', tagIds: [], scheduledDate: dateStr,
        priority: tmpl.priority || 'medium', recurringId: tmpl.id,
        order: d.tasks.length, completedAt: null, createdAt: new Date().toISOString()
      });
    }
  }
  Storage.save();
}
function showMoreRecurring() {
  recurringWindow += 7;
  refreshRecurringInstances();
  render();
}

function saveEditModal() {
  if (!_editModalId) return;
  const d = D();

  // ── Recurring template edit ───────────────────────────────
  if (_editModalType === 'recurring-template') {
    const tmpl = (d.recurringTemplates || []).find(t => t.id === _editModalId);
    if (!tmpl) { closeEditModal(); return; }
    const title = document.getElementById('em-title')?.value.trim();
    if (title) tmpl.title = title;
    tmpl.projectId     = document.getElementById('em-project')?.value || null;
    tmpl.workType      = document.getElementById('em-worktype')?.value || null;
    tmpl.estimatedHours = parseFloat(document.getElementById('em-hours')?.value || '1');
    const freq      = document.getElementById('em-freq')?.value || 'weekly';
    const days      = ['日','月','火','水','木','金','土']
      .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
      .filter(i => i >= 0);
    const startDate = document.getElementById('em-startdate')?.value || null;
    const endDate   = document.getElementById('em-enddate')?.value || null;
    tmpl.recurring  = { frequency: freq, days, startDate, endDate };
    // 今日以降の未完了インスタンスに反映
    const today = todayStr();
    d.tasks.forEach(t => {
      if (t.recurringId !== tmpl.id) return;
      if (t.status === 'completed') return;
      if (t.scheduledDate && t.scheduledDate < today) return;
      t.title         = tmpl.title;
      t.projectId     = tmpl.projectId;
      t.workType      = tmpl.workType;
      t.estimatedHours = tmpl.estimatedHours;
    });
    commit();
    refreshRecurringInstances();
    closeEditModal();
    render();
    return;
  }

  // ── New task creation ────────────────────────────────────
  if (_editModalId === '__new__') {
    const title = document.getElementById('em-title')?.value.trim();
    if (!title) return;
    const someday = document.getElementById('em-someday')?.checked;
    const scheduledDate = someday ? null : (document.getElementById('em-date')?.value || todayStr());
    const _emMode = document.getElementById('em-hours-total')?.style.display === 'none' ? 'daily' : 'total';
    const _emByDate = _emMode === 'daily' ? _getEmHoursByDate() : [];
    const _emTotal  = _emMode === 'daily'
      ? _emByDate.reduce((s, p) => s + p.hours, 0) || 1
      : parseFloat(document.getElementById('em-hours')?.value || '1');
    const newTask = {
      id: genId(), title,
      notes:          document.getElementById('em-notes')?.value || '',
      projectId:      document.getElementById('em-project')?.value   || null,
      workType:       document.getElementById('em-worktype')?.value  || null,
      priority:       document.getElementById('em-priority')?.value  || 'medium',
      estimatedHours: _emTotal,
      estimatedHoursMode: _emMode,
      estimatedHoursByDate: _emByDate,
      actualHours: null, partialHours: [], status: 'pending', tagIds: [],
      scheduledDate, order: d.tasks.length,
      completedAt: null, createdAt: new Date().toISOString()
    };

    // Handle recurring for new task
    const recurringOn = document.getElementById('em-recurring-toggle')?.checked;
    if (recurringOn) {
      if (!d.recurringTemplates) d.recurringTemplates = [];
      const freq    = document.getElementById('em-freq')?.value || 'weekly';
      const days    = ['日','月','火','水','木','金','土']
        .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
        .filter(i => i >= 0);
      const startDate = document.getElementById('em-startdate')?.value || null;
      const endDate = document.getElementById('em-enddate')?.value || null;
      const tmplId = genId();
      d.recurringTemplates.push({
        id: tmplId, title: newTask.title, notes: newTask.notes,
        projectId: newTask.projectId, workType: newTask.workType,
        estimatedHours: newTask.estimatedHours, priority: newTask.priority,
        recurring: { frequency: freq, days, startDate, endDate }
      });
      newTask.recurringId = tmplId;
    }

    d.tasks.push(newTask);
    _resetQaState();
    // Clear quick-add input if it had a value
    const qaInp = document.getElementById('quick-add-input');
    if (qaInp) qaInp.value = '';
    commit(); closeEditModal();
    if (recurringOn) refreshRecurringInstances();
    return;
  }

  // ── Edit existing task ───────────────────────────────────
  const task = d.tasks.find(t => t.id === _editModalId);
  if (!task) return;

  const title = document.getElementById('em-title')?.value.trim();
  if (title) task.title = title;
  const someday = document.getElementById('em-someday')?.checked;
  task.scheduledDate = someday ? null : (document.getElementById('em-date')?.value || todayStr());
  task.priority      = document.getElementById('em-priority')?.value  || 'medium';
  task.projectId     = document.getElementById('em-project')?.value   || null;
  task.workType      = document.getElementById('em-worktype')?.value  || null;
  const _emMode2 = document.getElementById('em-hours-total')?.style.display === 'none' ? 'daily' : 'total';
  const _emByDate2 = _emMode2 === 'daily' ? _getEmHoursByDate() : [];
  task.estimatedHoursMode   = _emMode2;
  task.estimatedHoursByDate = _emByDate2;
  task.estimatedHours = _emMode2 === 'daily'
    ? (_emByDate2.reduce((s, p) => s + p.hours, 0) || 1)
    : parseFloat(document.getElementById('em-hours')?.value || '1');
  task.notes         = document.getElementById('em-notes')?.value     || '';
  const newStatus = document.getElementById('em-status')?.value;
  if (newStatus && task.status !== 'completed') task.status = newStatus;

  const recurringOn = document.getElementById('em-recurring-toggle')?.checked;
  if (!d.recurringTemplates) d.recurringTemplates = [];

  if (recurringOn) {
    const freq    = document.getElementById('em-freq')?.value || 'weekly';
    const days    = ['日','月','火','水','木','金','土']
      .map((_, i) => document.getElementById(`em-day-${i}`)?.classList.contains('active') ? i : -1)
      .filter(i => i >= 0);
    const startDate = document.getElementById('em-startdate')?.value || null;
    const endDate = document.getElementById('em-enddate')?.value || null;

    if (task.recurringId) {
      const tmpl = d.recurringTemplates.find(t => t.id === task.recurringId);
      if (tmpl) { tmpl.recurring = { frequency: freq, days, startDate, endDate }; tmpl.title = task.title; }
    } else {
      const tmplId = genId();
      d.recurringTemplates.push({
        id: tmplId, title: task.title, notes: task.notes,
        projectId: task.projectId, workType: task.workType,
        estimatedHours: task.estimatedHours, priority: task.priority,
        recurring: { frequency: freq, days, startDate, endDate }
      });
      task.recurringId = tmplId;
    }
    refreshRecurringInstances();
  } else if (task.recurringId) {
    task.recurringId = null; // Remove from recurring without deleting template
  }

  commit(); closeEditModal();
}

// ============================================================
// ESTIMATED HOURS MODE (total / daily)
// ============================================================
function _emHoursSelectOpts(selected) {
  return [0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8].map(h =>
    `<option value="${h}"${selected===h?' selected':''}>${h}</option>`
  ).join('');
}

function toggleEmHoursMode() {
  const btn   = document.getElementById('em-hours-mode-btn');
  const total = document.getElementById('em-hours-total');
  const daily = document.getElementById('em-hours-daily');
  if (!btn || !total || !daily) return;
  const isDaily = total.style.display === 'none';
  if (isDaily) {
    // switch to total
    total.style.display = '';
    daily.style.display = 'none';
    btn.textContent = '日別で入力 ▼';
  } else {
    // switch to daily — seed with today if empty
    if (!daily.querySelector('[data-em-date]')) {
      _addEmHoursDateRow(todayStr(), 1);
    }
    total.style.display = 'none';
    daily.style.display = '';
    btn.textContent = '合計で入力 ▼';
  }
  _updateEmHoursSum();
}

function _addEmHoursDateRow(dateStr, hours) {
  const container = document.getElementById('em-hours-daily-rows');
  if (!container) return;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:4px';
  row.dataset.emDate = dateStr;
  row.innerHTML = `
    <input type="date" value="${dateStr}" style="flex:1;font-size:12px" onchange="this.closest('[data-em-date]').dataset.emDate=this.value;_updateEmHoursSum()">
    <select style="width:70px;font-size:12px" onchange="_updateEmHoursSum()">${_emHoursSelectOpts(hours)}</select>
    <button type="button" onclick="this.closest('[data-em-date]').remove();_updateEmHoursSum()" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:14px;padding:0 2px">×</button>
  `;
  container.appendChild(row);
}

function addEmHoursDate() {
  _addEmHoursDateRow(todayStr(), 1);
  _updateEmHoursSum();
}

function _updateEmHoursSum() {
  const rows = document.querySelectorAll('#em-hours-daily-rows [data-em-date]');
  const sum  = Array.from(rows).reduce((s, row) => {
    const sel = row.querySelector('select');
    return s + parseFloat(sel?.value || 0);
  }, 0);
  const sumEl = document.getElementById('em-hours-daily-sum');
  if (sumEl) sumEl.textContent = `合計：${sum}h`;
}

function _getEmHoursByDate() {
  const rows = document.querySelectorAll('#em-hours-daily-rows [data-em-date]');
  return Array.from(rows).map(row => ({
    date: row.dataset.emDate,
    hours: parseFloat(row.querySelector('select')?.value || 0)
  }));
}

function _buildEmHoursUI(task) {
  const mode  = task?.estimatedHoursMode || 'total';
  const hOpts = _emHoursSelectOpts(task?.estimatedHours || 1);
  const daily = task?.estimatedHoursByDate || [];
  const dailySum = daily.reduce((s, p) => s + p.hours, 0);
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <button type="button" id="em-hours-mode-btn" onclick="toggleEmHoursMode()"
        style="font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:6px;background:var(--gray-50);cursor:pointer;white-space:nowrap">
        ${mode==='daily' ? '合計で入力 ▼' : '日別で入力 ▼'}
      </button>
    </div>
    <div id="em-hours-total" style="${mode==='daily'?'display:none':''}">
      <select id="em-hours">${hOpts}</select>
    </div>
    <div id="em-hours-daily" style="${mode==='total'?'display:none':''}">
      <div id="em-hours-daily-rows"></div>
      <button type="button" onclick="addEmHoursDate()" style="font-size:11px;padding:2px 8px;border:1px dashed var(--border);border-radius:6px;background:none;cursor:pointer;margin-top:2px;color:var(--gray-500)">+ 日付を追加</button>
      <div id="em-hours-daily-sum" style="font-size:11px;color:var(--gray-500);margin-top:4px">合計：${dailySum}h</div>
    </div>
  `;
}

function _initEmHoursDailyRows(task) {
  if ((task?.estimatedHoursMode || 'total') !== 'daily') return;
  const dates = task?.estimatedHoursByDate || [];
  if (dates.length === 0) { _addEmHoursDateRow(todayStr(), 1); return; }
  dates.forEach(p => _addEmHoursDateRow(p.date, p.hours));
}

// ============================================================
// MASTER RENDER
// ============================================================
function render() {
  if (!Storage.connected) return;
  renderHero(); renderTaskList(); renderNotes(); renderMultiDay();
  if (activeTab === 'review') renderReview();
  if (activeTab === 'settings') renderSettings();
}

// ============================================================
// VAULT INDICATOR
// ============================================================
function setVaultUI(connected) {
  const el = document.getElementById('vault-indicator');
  const lb = document.getElementById('vault-label');
  el.classList.toggle('off', !connected);
  lb.textContent = connected ? `${Storage.vaultName} 接続済み` : '未接続';
}

// ============================================================
// CONNECT SCREEN
// ============================================================
function _showGDriveExpiredToast() {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#ef4444;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.2)';
  t.textContent = '接続が切れました。再読み込みしてサインインしてください。';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 6000);
}

function showConnect(title, desc, btnText, action) {
  document.getElementById('connect-screen').style.display = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('connect-title').textContent = title;
  document.getElementById('connect-desc').innerHTML = desc;
  const btn = document.getElementById('connect-btn');
  btn.textContent = btnText; btn.onclick = action;
}
function showApp() {
  document.getElementById('connect-screen').style.display = 'none';
  document.getElementById('app').style.display = '';
  setVaultUI(true); refreshRecurringInstances(); render(); checkReview();
}

// ============================================================
// INIT
// ============================================================
async function init() {
  const result = await Storage.tryRestore();
  if (result === true) {
    showApp();
  } else if (result === 'prompt') {
    showConnect(
      'Vaultへの接続を再開',
      'データを読み込むために、Vaultフォルダへのアクセスを再度許可してください。',
      'アクセスを許可する',
      async () => { if (await Storage.requestPermission()) showApp(); }
    );
  } else if (result === 'gdrive-restore') {
    showConnect(
      'Google Driveに再接続',
      'データを読み込むために、Googleアカウントへのサインインが必要です。',
      'Googleでサインイン',
      async () => {
        try { await Storage.reconnectGDrive(); showApp(); }
        catch (e) { alert('接続に失敗しました: ' + e.message); }
      }
    );
  } else if (result === 'gdrive-new') {
    showConnect(
      'Google Driveに接続',
      'Googleアカウントにサインインして、タスクデータをGoogle Driveに保存します。<br><small style="color:var(--gray-400)">データは Google Drive の <code>Achievia/data.json</code> に保存されます。</small>',
      'Googleでサインイン',
      async () => {
        try { await Storage.connectGDrive(); showApp(); }
        catch (e) { alert('接続に失敗しました: ' + e.message); }
      }
    );
  } else {
    showConnect(
      'Vaultに接続',
      'ObsidianのVaultフォルダを選択してください。タスクデータはVault内の <code>Achievia/data.json</code> に保存されます。',
      'フォルダを選択して接続',
      async () => {
        try { await Storage.connect(); showApp(); }
        catch (e) { if (e.name !== 'AbortError') alert('接続に失敗しました: ' + e.message); }
      }
    );
  }
}

init();
</script>
